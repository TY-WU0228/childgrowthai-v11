<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#eff6ff" />
  <title>ChildGrowth AI v46 Stable Clean Build</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#f4f8ff;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbeafe;
      --blue:#2563eb;--purple:#7c3aed;--pink:#db2777;--green:#15803d;--orange:#9a3412;
      --soft-blue:#eff6ff;--soft-purple:#f5f3ff;--soft-green:#ecfdf5;--soft-orange:#fff7ed;
      --shadow:0 16px 45px rgba(15,23,42,.07);--r:28px;--navh:86px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC","PingFang TC",sans-serif;
      font-weight:800;-webkit-font-smoothing:antialiased;padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom));
    }
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .app{max-width:860px;margin:0 auto;}
    .top{
      position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
      border-bottom:1px solid #e5e7eb;padding:calc(14px + env(safe-area-inset-top)) 18px 14px;text-align:center;
    }
    .brand{font-size:34px;font-weight:1000;letter-spacing:-.06em;line-height:1}
    .sub{font-size:16px;color:var(--muted);font-weight:900;margin-top:7px;line-height:1.25}
    .version{font-size:13px;color:var(--muted);font-weight:900;margin-top:4px}
    .page{display:none;padding:18px 16px 28px}.page.active{display:block}
    .card{
      background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);
      padding:18px;margin:14px 0;box-shadow:var(--shadow);overflow:hidden;
    }
    .card h2{font-size:28px;margin:0 0 8px;letter-spacing:-.05em;color:var(--ink)}
    .card h3{font-size:21px;margin:16px 0 8px;letter-spacing:-.04em;color:var(--ink)}
    .muted{color:var(--muted);line-height:1.45;font-weight:850}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .metric{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:14px;min-width:0}
    .metric b{display:block;color:var(--pink);font-size:30px;line-height:1.05;word-break:break-word}
    .metric span{display:block;color:var(--muted);font-size:13px;margin-top:5px;font-weight:900}
    .notice,.insight{
      border-radius:18px;padding:12px;margin-top:12px;line-height:1.45;font-weight:900
    }
    .insight{background:#ecfeff;border:1px solid #67e8f9;color:#155e75}
    .notice{background:var(--soft-orange);border:1px solid #fed7aa;color:var(--orange)}
    .good{background:var(--soft-green);border:1px solid #bbf7d0;color:var(--green)}
    .bluebox{background:var(--soft-blue);border:1px solid #bfdbfe;color:#1e3a8a}
    label{display:block;color:var(--muted);font-weight:950;margin:12px 0 6px}
    input,textarea,select{
      width:100%;border:1px solid #e5e7eb;border-radius:18px;background:#fff;padding:14px 15px;
      color:var(--ink);outline:none;font-weight:850;min-height:54px;
    }
    textarea{min-height:120px;resize:vertical}
    input:focus,textarea:focus,select:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(147,197,253,.22)}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .btn{
      border:1px solid #dbeafe;background:#fff;color:#1d4ed8;border-radius:999px;
      padding:10px 14px;font-weight:1000;width:auto;margin:0;white-space:nowrap;
    }
    .btn.primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none}
    .btn.danger{background:#fee2e2;color:#991b1b;border:none}
    .btn.soft{background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe}
    .row{
      background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:12px;margin-top:10px;
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;
    }
    .row b{color:var(--ink);font-weight:1000}
    .row small{display:block;color:var(--muted);line-height:1.45;margin-top:4px;font-weight:850}
    .rowActions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
    .chip{display:inline-flex;align-items:center;border-radius:999px;background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;padding:6px 10px;margin:4px 4px 0 0;font-size:13px;font-weight:950}
    .bottomnav{
      position:fixed;left:0;right:0;bottom:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
      border-top:1px solid #e5e7eb;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
      display:flex;justify-content:center;gap:6px;
    }
    .navbtn{
      border:0;background:transparent;color:#64748b;border-radius:24px;padding:8px 9px;min-width:64px;font-weight:1000;
      display:flex;flex-direction:column;align-items:center;gap:3px;font-size:14px
    }
    .navbtn .ico{font-size:24px;line-height:1}
    .navbtn.active{background:#eef2ff;color:#3730a3}
    .modal{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.38);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
    .modal.show{display:flex}
    .sheet{width:min(100%,860px);max-height:88vh;overflow:auto;background:#fff;border-radius:30px 30px 0 0;padding:20px 16px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -24px 70px rgba(15,23,42,.22)}
    .sheetHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
    .sheetHead h2{margin:0;font-size:26px;letter-spacing:-.04em}
    .weekDay{background:#f8fafc;border:1px solid #e5e7eb;border-radius:20px;padding:12px;margin-top:10px}
    .weekDay.today{background:#eff6ff;border-color:#93c5fd}
    .weekHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.weekTitle{font-size:18px;font-weight:1000}
    .count{border:1px solid #c7d2fe;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:950}
    .collapsed .weekDay:not(.today):not(.hasItems){display:none}
    .preview{max-width:100%;max-height:260px;border:1px solid #e5e7eb;border-radius:18px;object-fit:contain;background:#f8fafc;margin-top:10px;display:none}
    .hidden{display:none!important}
    @media(max-width:430px){
      .brand{font-size:30px}.card{border-radius:24px;padding:16px}.card h2{font-size:24px}
      .grid,.grid3{grid-template-columns:1fr}.navbtn{min-width:56px;font-size:13px}
      .row{align-items:flex-start}.metric b{font-size:25px}
    }
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">🌸 ChildGrowth AI</div>
    <div class="sub" id="headerProfile">Your child · Learning + Emotion + Routine</div>
    <div class="version">v46 Stable Clean Build · Clean data / no auto jumping</div>
  </header>

  <main>
    <section id="home" class="page active"></section>
    <section id="record" class="page"></section>
    <section id="homework" class="page"></section>
    <section id="analytics" class="page"></section>
    <section id="profile" class="page"></section>
  </main>
</div>

<nav class="bottomnav">
  <button class="navbtn active" data-tab="home"><span class="ico">🏠</span><span>首頁</span></button>
  <button class="navbtn" data-tab="record"><span class="ico">🎙️</span><span>記錄</span></button>
  <button class="navbtn" data-tab="homework"><span class="ico">📚</span><span>功課</span></button>
  <button class="navbtn" data-tab="analytics"><span class="ico">🤖</span><span>分析</span></button>
  <button class="navbtn" data-tab="profile"><span class="ico">👤</span><span>我的</span></button>
</nav>

<div id="routineModal" class="modal"><div class="sheet" id="routineSheet"></div></div>
<div id="setupModal" class="modal"><div class="sheet" id="setupSheet"></div></div>

<script>
(function(){
'use strict';

const DATA_KEY='cg_app_v46';
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_LABEL={Monday:'星期一',Tuesday:'星期二',Wednesday:'星期三',Thursday:'星期四',Friday:'星期五',Saturday:'星期六',Sunday:'星期日'};
let currentTab='home';
let routineEditId=null;
let taskEditId=null;
let noticePending=null;
let homeworkImage='';

const DEFAULT_DATA={
  version:46,
  profile:{
    childName:'Janice', year:'Year 2', age:'8 歲左右', school:'Oakleigh South Primary School',
    region:'Australia / Victoria', language:'繁體中文 / Cantonese',
    focus:'Academic + Emotional Balance',
    strengths:['記憶力好','音感 / piano 潛能','畫畫 / 創意'],
    watchAreas:['數學規律可培養','閱讀細節要慢慢練'],
    parentGoals:['穩定節奏','清楚步驟','保持自信']
  },
  routines:[],
  todayTasks:[],
  schoolNotices:[],
  emotions:[],
  teacherComments:[],
  homeworkReports:[],
  settings:{weekExpanded:false, onboardingDone:true}
};

function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function readJSON(k,f){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch(e){return f}}
function save(){app.version=46;localStorage.setItem(DATA_KEY,JSON.stringify(app));mirrorLegacy();}
function todayISO(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10)}
function dayName(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toLocaleDateString('en-AU',{weekday:'long'})}
function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,'').replace(/[^\w\u4e00-\u9fff]/g,'')}
function timeToMin(t){
  if(!t)return null;let s=String(t).trim().toLowerCase().replace(/\s+/g,'').replace('：',':');
  s=s.replace(/上午|早上/g,'am').replace(/下午|晚上|夜晚/g,'pm').replace(/點半|点半/g,':30').replace(/點|点|時|时/g,':00');
  const m=s.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/); if(!m)return null;
  let h=+m[1],mm=+(m[2]||0),ap=m[3]||''; if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;if(!ap&&h>=1&&h<=7)h+=12; return h*60+mm;
}
function minText(m){m=((m%1440)+1440)%1440;let h=Math.floor(m/60),mm=m%60,ap=h>=12?'PM':'AM';let hh=h%12;if(!hh)hh=12;return `${hh}:${String(mm).padStart(2,'0')} ${ap}`}
function sortByTime(a,b){const am=timeToMin(a.start||a.time),bm=timeToMin(b.start||b.time);if(am===null&&bm===null)return String(a.name||a.title).localeCompare(String(b.name||b.title));if(am===null)return 1;if(bm===null)return -1;return am-bm}
function nextFutureTime(preferred='6:30 PM'){
  const now=new Date(), cur=now.getHours()*60+now.getMinutes(); let pref=timeToMin(preferred)??1110;
  if(cur<pref-10)return minText(pref); let next=Math.ceil((cur+10)/30)*30; if(next>21*60)next=21*60; return minText(next);
}
function routineKey(r){return [r.day||'',norm(r.name),r.start||'',r.oneOffDate||''].join('|')}

function migrate(){
  let existing=readJSON(DATA_KEY,null);
  let data=existing || JSON.parse(JSON.stringify(DEFAULT_DATA));

  // Profile migration
  const p30=readJSON('cg_child_profile_v30',null);
  const old=readJSON('childgrowthai-v8',null);
  if(!existing){
    if(p30&&typeof p30==='object'){
      data.profile.childName=p30.childName||data.profile.childName;
      data.profile.year=p30.currentYear||data.profile.year;
      data.profile.age=p30.age||data.profile.age;
      data.profile.school=p30.school||data.profile.school;
      data.profile.region=p30.region||data.profile.region;
      data.profile.language=p30.mainLanguage||data.profile.language;
      data.profile.strengths=Array.isArray(p30.strengths)?p30.strengths:data.profile.strengths;
      data.profile.watchAreas=Array.isArray(p30.watchAreas)?p30.watchAreas:data.profile.watchAreas;
      data.profile.parentGoals=Array.isArray(p30.parentGoals)?p30.parentGoals:data.profile.parentGoals;
    } else if(old&&old.profile){
      data.profile.childName=old.profile.name||old.profile.childName||data.profile.childName;
      data.profile.year=old.profile.year||old.profile.currentYear||data.profile.year;
      data.profile.school=old.profile.school||data.profile.school;
    }
  }

  // Routine migration
  const routineSources=[
    readJSON('cg_v33_weekly_routines',[]),
    readJSON('cg_v24_custom_activities',[])
  ];
  const routineList=existing?.routines?.length?existing.routines:[];
  routineSources.flat().forEach(x=>{
    if(!x || typeof x!=='object')return;
    let r={
      id:x.id||('r_'+Date.now()+Math.random()),
      day:x.day||'Monday',
      name:x.name||x.title||'Activity',
      start:x.start||x.time||'',
      end:x.end||'',
      prep:x.prep||x.note||'',
      reminder:x.reminder||'前一晚 8:00 PM',
      impact:x.impact||'正常',
      oneOffDate:x.oneOffDate||'',
      source:x.source||'migrated'
    };
    if(!routineList.some(y=>routineKey(y)===routineKey(r)))routineList.push(r);
  });
  data.routines=routineList;

  // Tasks
  const taskSources=[readJSON('cg_v28_today_tasks',[]),readJSON('cg_today_tasks',[]),readJSON('cg_v45_today_tasks',[])];
  const tasks=existing?.todayTasks?.length?existing.todayTasks:[];
  taskSources.flat().forEach(x=>{
    if(!x||typeof x!=='object')return;
    const t={id:x.id||('task_'+Date.now()+Math.random()),date:x.date||todayISO(),title:x.title||x.name||x.task||'Today task',time:x.time||'',note:x.note||x.notes||''};
    if(!tasks.some(y=>y.id===t.id || (y.date===t.date&&y.title===t.title&&y.time===t.time)))tasks.push(t);
  });
  data.todayTasks=tasks;

  // Notices
  const ns=readJSON('cg_v44_school_notices',[]);
  const notices=existing?.schoolNotices?.length?existing.schoolNotices:[];
  ns.forEach(n=>{if(!notices.some(x=>x.id===n.id || (x.date===n.date&&x.title===n.title)))notices.push(n)});
  data.schoolNotices=notices;

  // Emotions
  const recs=readJSON('childgrowth_records',[]);
  const emotions=existing?.emotions?.length?existing.emotions:[];
  if(Array.isArray(recs)){
    recs.filter(x=>x.type==='emotion').forEach(x=>{
      emotions.push({id:x.id||('em_'+Date.now()+Math.random()),date:x.date||x.createdAt||new Date().toISOString(),mood:x.mood||x.value||'Normal',context:x.context||''});
    });
  }
  data.emotions=emotions.slice(-80);

  return data;
}
let app=migrate();
save();

function mirrorLegacy(){
  localStorage.setItem('cg_v33_weekly_routines',JSON.stringify(app.routines));
  localStorage.setItem('cg_v28_today_tasks',JSON.stringify(app.todayTasks));
  localStorage.setItem('cg_today_tasks',JSON.stringify(app.todayTasks));
  localStorage.setItem('cg_v44_school_notices',JSON.stringify(app.schoolNotices));
  localStorage.setItem('cg_child_profile_v30',JSON.stringify({
    childName:app.profile.childName,currentYear:app.profile.year,age:app.profile.age,school:app.profile.school,region:app.profile.region,mainLanguage:app.profile.language,
    strengths:app.profile.strengths,watchAreas:app.profile.watchAreas,parentGoals:app.profile.parentGoals
  }));
}

function updateHeader(){
  $('headerProfile').textContent=`${app.profile.childName} · ${app.profile.year} · ${app.profile.focus||'Learning + Emotion'}`;
}
function go(tab){
  currentTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===tab));
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  renderCurrent();
  window.scrollTo({top:0,behavior:'auto'});
}
window.go=go;
document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>go(b.dataset.tab));

function routinesForDay(day, includeOneOff=true){
  const iso = DAYS.includes(day) ? null : day;
  const d = iso ? new Date(iso+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long'}) : day;
  return app.routines.filter(r=>r.day===d && (includeOneOff || !r.oneOffDate) && (!r.oneOffDate || !iso || r.oneOffDate===iso)).sort(sortByTime);
}
function todayTasks(){return app.todayTasks.filter(t=>!t.date||t.date===todayISO()).sort(sortByTime)}
function upcomingNotices(){const now=todayISO();return app.schoolNotices.filter(n=>!n.date||n.date>=now).sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999'))).slice(0,5)}
function rowHTML(title,small,actions=''){return `<div class="row"><div><b>${title}</b><small>${small||''}</small></div>${actions?`<div class="rowActions">${actions}</div>`:''}</div>`}
function freeWindows(day,items){
  const weekday=!['Saturday','Sunday'].includes(day); const start=weekday?15*60+30:9*60, end=20*60+30;
  const blocks=items.map(r=>{let s=timeToMin(r.start),e=timeToMin(r.end);if(s===null)return null;if(e===null||e<=s)e=s+60;return{s,e}}).filter(Boolean).sort((a,b)=>a.s-b.s);
  let cur=start,free=[];blocks.forEach(b=>{if(b.s>cur+20)free.push([cur,b.s]);cur=Math.max(cur,b.e)}); if(end>cur+20)free.push([cur,end]); return free;
}

function renderHome(){
  const today=dayName(0), tomorrow=dayName(1);
  const tr=routinesForDay(today), tm=routinesForDay(tomorrow);
  const tasks=todayTasks(), notices=upcomingNotices();

  $('home').innerHTML=`
    <div class="card">
      <h2>🌸 ${esc(app.profile.childName)} Today</h2>
      <div class="muted">${new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'})}</div>
      <div class="grid" style="margin-top:12px">
        <div class="metric"><b>${tasks.length}</b><span>今日任務</span></div>
        <div class="metric"><b>${tr.length}</b><span>今日固定行程</span></div>
      </div>
      <div class="insight">🤖 Parent Insight：${tr.length>=3?'今日活動較多，功課建議輕量，先完成最重要一項。':tr.length?'今日有活動，建議短時間高質練習。':'今日暫時較空，可以安排閱讀、練琴或溫習 spelling。'}</div>
      <div class="actions">
        <button class="btn primary" onclick="go('homework')">📚 Upload 功課</button>
        <button class="btn" onclick="go('record')">🎙️ 記錄 / School Notice</button>
        <button class="btn" onclick="go('profile')">🗓️ 一週總覽</button>
      </div>
    </div>

    <div class="card">
      <h2>📌 今日 / 明日提醒</h2>
      <h3>今日 ${DAY_LABEL[today]||today}</h3>
      ${tr.length?tr.map(routineRow).join(''):'<div class="notice bluebox">今日未有固定行程。</div>'}
      <h3>明日 ${DAY_LABEL[tomorrow]||tomorrow} 準備</h3>
      ${tm.length?tm.map(routineRow).join(''):'<div class="notice bluebox">明日暫時未有固定行程。</div>'}
    </div>

    <div class="card">
      <h2>🎯 今日任務 / Today Plan</h2>
      <div class="muted">一次性任務，例如今晚練琴、reading log、spelling。快速加入會避開已過時間。</div>
      <div class="insight" id="taskHint">時間會按你手機目前時區判斷；加入後可修改。</div>
      <div class="grid">
        <div><label>今日任務</label><input id="taskTitle" placeholder="例：Piano practice / Reading log / Spelling"></div>
        <div><label>時間</label><input id="taskTime" placeholder="${nextFutureTime('6:30 PM')}"></div>
      </div>
      <label>備註</label><input id="taskNote" placeholder="例：10–15分鐘，慢練一小段">
      <div class="actions">
        <button class="btn primary" onclick="saveTaskFromForm()">${taskEditId?'💾 保存修改':'➕ 加入今日任務'}</button>
        ${taskEditId?'<button class="btn" onclick="cancelTaskEdit()">取消修改</button>':''}
        <button class="btn" onclick="quickTask('🎹 Piano practice','6:30 PM','10–15分鐘，慢練一小段')">🎹 快速加練琴</button>
        <button class="btn" onclick="quickTask('📚 Reading log','7:00 PM','讀一本書或完成 reading log')">📚 快速加 Reading</button>
      </div>
      <div id="taskList">${tasks.length?tasks.map(taskRow).join(''):'<div class="notice bluebox">今日未有任務。</div>'}</div>
    </div>

    <div class="card">
      <h2>📣 學校通知提醒</h2>
      <div class="muted">由 School Notice AI 加入的 Compass / 學校提醒。</div>
      ${notices.length?notices.map(noticeRow).join(''):'<div class="notice bluebox">暫時未有學校通知提醒。</div>'}
      <div class="actions"><button class="btn" onclick="go('record')">新增學校通知</button></div>
    </div>
  `;
}

function routineRow(r){
  const time=[r.start,r.end].filter(Boolean).join(' – ');
  return rowHTML(`${time?esc(time)+' · ':''}${esc(r.name)}`,

function parseNaturalDate(text){
  const now=new Date(); const t=String(text||''); const l=t.toLowerCase(); const fmt=d=>d.toISOString().slice(0,10);
  if(/today|今日|今天/.test(l))return fmt(now); if(/tomorrow|聽日|明天/.test(l)){let d=new Date(now);d.setDate(d.getDate()+1);return fmt(d)}
  const map=[['monday',1,'星期一'],['tuesday',2,'星期二'],['wednesday',3,'星期三'],['thursday',4,'星期四'],['friday',5,'星期五'],['saturday',6,'星期六'],['sunday',0,'星期日']];
  for(const [en,idx,cn] of map){if(l.includes(en)||t.includes(cn)){let d=new Date(now),diff=(idx-d.getDay()+7)%7;if(/next|下個|下星期|下周/.test(l+t)||diff===0)diff+=7;d.setDate(d.getDate()+diff);return fmt(d)}}
  let m=t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/); if(m){let y=m[3]?+m[3]:now.getFullYear(); if(y<100)y+=2000; return fmt(new Date(y,+m[2]-1,+m[1]));}
  return '';
}
function fallbackNotice(text){
  const l=text.toLowerCase(); let title='School notice';
  if(/ice\s*pops?|icy\s*pole|雪條|冰條/.test(l))title='Ice pops / icy pole event';
  else if(/dress|costume|book week|打扮/.test(l))title='Dress up / Book Week event';
  else if(/excursion|incursion|camp|旅行/.test(l))title='Excursion / school activity';
  else if(/photo|照片|相/.test(l))title='School photo day';
  const money=(text.match(/\$\s?\d+(?:\.\d{1,2})?|\d+\s?(?:dollars?|元|蚊)/i)||[])[0]||'';
  const bring=[]; if(money)bring.push(money); if(/dress|costume|打扮/.test(l))bring.push('dress-up / costume'); if(/water|水樽|snack|hat|帽/.test(l))bring.push('water bottle / snack / hat if needed');
  return {id:'notice_'+Date.now(),title,date:parseNaturalDate(text),time:(text.match(/(\d{1,2}(?::\d{2})?\s?(?:am|pm|AM|PM))/)||[])[1]||'',category:money?'payment':'school event',bringItems:bring.length?bring:['請按通知內容準備'],payment:money,deadline:'',reminders:['前一晚 8:00 PM','當日早上 7:30 AM'],confidence:parseNaturalDate(text)?'medium':'low',summary:text.slice(0,320),parentAction:bring.length?'準備：'+bring.join('、'):'請檢查通知日期和要帶物品'};
}
window.analyzeNotice=async()=>{
  const text=$('noticeText').value.trim(), image=window._noticeImage||''; if(!text&&!image){$('noticeStatus').innerHTML='<div class="notice">請先上載截圖或貼上通知文字。</div>';return}

    ${routineEditId?'<button class="btn" onclick="cancelRoutineEdit()">取消修改</button>':''}
    <button class="btn" onclick="prefillSchool()">Oakleigh South PS</button>
    <button class="btn" onclick="prefill('🏊 Swimming','6:00 PM','6:45 PM','泳衣、毛巾、goggles、水樽','輕量功課日')">Swimming</button>
    <button class="btn" onclick="prefill('♟️ Chess','3:30 PM','4:30 PM','水樽、snack、chess book 如需要','正常')">Chess</button>
  </div>
  <h3>已加入固定行程</h3>
  ${app.routines.filter(x=>!x.oneOffDate).sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||sortByTime(a,b)).map(routineManageRow).join('')||'<div class="notice bluebox">未有固定行程。</div>'}`;
}
function routineManageRow(r){return rowHTML(`${esc(r.day)} ${[r.start,r.end].filter(Boolean).join(' – ')} · ${esc(r.name)}`,`${r.prep?'準備：'+esc(r.prep)+'<br>':''}提醒：${esc(r.reminder||'前一晚 8:00 PM')}<br>功課安排：${esc(r.impact||'正常')}`,`<button class="btn" onclick="editRoutine('${esc(r.id)}')">修改</button><button class="btn danger" onclick="deleteRoutine('${esc(r.id)}')">刪除</button>`)}
window.prefill=(n,s,e,p,i)=>{$('rName').value=n;$('rStart').value=s;$('rEnd').value=e;$('rPrep').value=p;$('rImpact').value=i}
window.prefillSchool=()=>{$('rName').value='🏫 Oakleigh South Primary School';$('rStart').value='8:45 AM';$('rEnd').value='3:30 PM';$('rPrep').value='書包、lunch box、水樽、帽、reader bag';$('rReminder').value='前一晚 8:00 PM';$('rImpact').value='正常';$('rDay').value='Monday–Friday'}
window.saveRoutineFromForm=()=>{
  const name=$('rName').value.trim(), day=$('rDay').value, start=$('rStart').value.trim(), end=$('rEnd').value.trim(), prep=$('rPrep').value.trim(), reminder=$('rReminder').value.trim()||'前一晚 8:00 PM', impact=$('rImpact').value;
  if(!name||!start){alert('請最少填活動名稱和開始時間。');return}
  if(routineEditId){const r=app.routines.find(x=>x.id===routineEditId); if(r)Object.assign(r,{day:day==='Monday–Friday'?'Monday':day,name,start,end,prep,reminder,impact,updatedAt:new Date().toISOString()}); routineEditId=null;}
  else{
    const ds=day==='Monday–Friday'?DAYS.slice(0,5):[day];
    const keys=new Set(app.routines.map(routineKey));
    ds.forEach(d=>{const item={id:'r_'+Date.now()+'_'+d+'_'+Math.random().toString(36).slice(2,5),day:d,name,start,end,prep,reminder,impact,createdAt:new Date().toISOString()}; if(!keys.has(routineKey(item))){app.routines.push(item);keys.add(routineKey(item))}})
  }
  save();renderRoutineSheet();renderProfile();renderHome();
}
window.editRoutine=(id)=>{routineEditId=id;renderRoutineSheet();$('rName').scrollIntoView({behavior:'smooth',block:'center'})}
window.cancelRoutineEdit=()=>{routineEditId=null;renderRoutineSheet()}
window.deleteRoutine=(id)=>{if(confirm('刪除這個固定行程？')){app.routines=app.routines.filter(r=>r.id!==id);save();renderRoutineSheet();renderProfile();renderHome()}}
function addRoutines(items){const keys=new Set(app.routines.map(routineKey));let added=0;items.forEach(item=>{if(!keys.has(routineKey(item))){app.routines.push({id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2),createdAt:new Date().toISOString(),...item});keys.add(routineKey(item));added++}});save();return added}
window.quickWeekdaySchool=()=>{const added=addRoutines(DAYS.slice(0,5).map(day=>({day,name:'🏫 Oakleigh South Primary School',start:'8:45 AM',end:'3:30 PM',prep:'書包、lunch box、水樽、帽、reader bag',reminder:'前一晚 8:00 PM',impact:'正常'})));alert(`已加入 ${added} 個返學行程，已存在的不會重複。`);renderProfile();renderHome()}
window.syncJanice=()=>{const added=addRoutines([
  ...DAYS.slice(0,5).map(day=>({day,name:'🏫 Oakleigh South Primary School',start:'8:45 AM',end:'3:30 PM',prep:'書包、lunch box、水樽、帽、reader bag',reminder:'前一晚 8:00 PM',impact:'正常'})),
  {day:'Thursday',name:'⚽ Soccer',start:'3:30 PM',end:'4:30 PM',prep:'水樽、運動鞋、外套',reminder:'前一晚 8:00 PM',impact:'輕量功課日'},
  {day:'Thursday',name:'🏊 Swimming',start:'6:00 PM',end:'6:45 PM',prep:'泳衣、毛巾、goggles、水樽',reminder:'前一晚 8:00 PM',impact:'輕量功課日'},
  {day:'Friday',name:'♟️ Chess',start:'3:30 PM',end:'4:30 PM',prep:'水樽、snack、chess book 如需要',reminder:'前一晚 8:00 PM',impact:'正常'}
]);alert(`已同步 Janice 常用行程：新增 ${added} 項，已存在不重複。`);renderProfile();renderHome()}

function openSetup(){
  const p=app.profile;
  $('setupModal').classList.add('show');
  $('setupSheet').innerHTML=`<div class="sheetHead"><h2>👤 修改小朋友設定</h2><button class="btn" onclick="closeSetup()">關閉</button></div>
    <div class="grid">
      <div><label>小朋友名字</label><input id="pName" value="${esc(p.childName)}"></div>
      <div><label>目前年級</label><input id="pYear" value="${esc(p.year)}"></div>
      <div><label>年齡</label><input id="pAge" value="${esc(p.age)}"></div>
      <div><label>地區 / 學制</label><input id="pRegion" value="${esc(p.region)}"></div>
    </div>
    <label>學校</label><input id="pSchool" value="${esc(p.school)}">
    <label>強項（用逗號分隔）</label><input id="pStrengths" value="${esc((p.strengths||[]).join('、'))}">
    <label>需要留意（用逗號分隔）</label><input id="pWatch" value="${esc((p.watchAreas||[]).join('、'))}">
    <label>家長目標（用逗號分隔）</label><input id="pGoals" value="${esc((p.parentGoals||[]).join('、'))}">
    <div class="actions"><button class="btn primary" onclick="saveSetup()">保存</button></div>`;
}
window.openSetup=openSetup;
window.closeSetup=()=>{$('setupModal').classList.remove('show')}
window.saveSetup=()=>{
  Object.assign(app.profile,{childName:$('pName').value.trim()||app.profile.childName,year:$('pYear').value.trim()||app.profile.year,age:$('pAge').value.trim(),region:$('pRegion').value.trim(),school:$('pSchool').value.trim(),strengths:$('pStrengths').value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean),watchAreas:$('pWatch').value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean),parentGoals:$('pGoals').value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean)});
  save();updateHeader();window.closeSetup();renderProfile();renderHome();
}

function renderCurrent(){updateHeader();({home:renderHome,record:renderRecord,homework:renderHomework,analytics:renderAnalytics,profile:renderProfile}[currentTab]||renderHome)()}
window.renderCurrent=renderCurrent;
renderCurrent();

})();
</script>
</body>
</html>
