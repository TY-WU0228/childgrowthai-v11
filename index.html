<!doctype html>
<html lang="zh-Hant">
<head>
<!-- V73 Slogan Fix Only -->
  <meta name="childgrowth-version" content="v60-routine-restore-click-fix">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#eff6ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>ChildGrowth AI V93 Report Integrity + Parent Fail-safe Fix</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#f4f8ff;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbeafe;
      --blue:#2563eb;--purple:#7c3aed;--pink:#db2777;--green:#15803d;--orange:#9a3412;
      --soft-blue:#eff6ff;--soft-purple:#f5f3ff;--soft-green:#ecfdf5;--soft-orange:#fff7ed;
      --shadow:0 16px 45px rgba(15,23,42,.07);--r:28px;--navh:86px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC","PingFang TC",sans-serif;
      font-weight:800;-webkit-font-smoothing:antialiased;padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom));
    }
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .app{max-width:860px;margin:0 auto;}
    .top{
      display:none!important;
    }
    .brand{font-size:34px;font-weight:1000;letter-spacing:-.06em;line-height:1}
    .sub{font-size:16px;color:var(--muted);font-weight:900;margin-top:7px;line-height:1.25}
    .version{font-size:13px;color:var(--muted);font-weight:900;margin-top:4px}
    .page{display:none;padding:calc(14px + env(safe-area-inset-top)) 16px 28px}.page.active{display:block}
    .card{
      background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);
      padding:18px;margin:14px 0;box-shadow:var(--shadow);overflow:hidden;
    }
    .card h2{font-size:28px;margin:0 0 8px;letter-spacing:-.05em;color:var(--ink)}
    .card h3{font-size:21px;margin:16px 0 8px;letter-spacing:-.04em;color:var(--ink)}
    .muted{color:var(--muted);line-height:1.45;font-weight:850}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .metric{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:14px;min-width:0}
    .metric b{display:block;color:var(--pink);font-size:30px;line-height:1.05;word-break:break-word}
    .metric span{display:block;color:var(--muted);font-size:13px;margin-top:5px;font-weight:900}
    .notice,.insight{
      border-radius:18px;padding:12px;margin-top:12px;line-height:1.45;font-weight:900
    }
    .insight{background:#ecfeff;border:1px solid #67e8f9;color:#155e75}
    .notice{background:var(--soft-orange);border:1px solid #fed7aa;color:var(--orange)}
    .good{background:var(--soft-green);border:1px solid #bbf7d0;color:var(--green)}
    .bluebox{background:var(--soft-blue);border:1px solid #bfdbfe;color:#1e3a8a}
    label{display:block;color:var(--muted);font-weight:950;margin:12px 0 6px}
    input,textarea,select{
      width:100%;border:1px solid #e5e7eb;border-radius:18px;background:#fff;padding:14px 15px;
      color:var(--ink);outline:none;font-weight:850;min-height:54px;
    }
    textarea{min-height:120px;resize:vertical}
    input:focus,textarea:focus,select:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(147,197,253,.22)}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .btn{
      border:1px solid #dbeafe;background:#fff;color:#1d4ed8;border-radius:999px;
      padding:10px 14px;font-weight:1000;width:auto;margin:0;white-space:nowrap;
    }
    .btn.primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .hwAnalyzing .notice.bluebox{border-color:#93c5fd;animation:hwPulse 1.2s ease-in-out infinite}
    @keyframes hwPulse{0%,100%{opacity:1}50%{opacity:.72}}
    .debugPill,.growthTag,.parentSkill,.parentMini,.wowSentence{max-width:100%;overflow-wrap:anywhere;word-break:break-word}
    .btn.danger{background:#fee2e2;color:#991b1b;border:none}
    .btn.soft{background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe}
    .row{
      background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:12px;margin-top:10px;
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;
    }
    .row b{color:var(--ink);font-weight:1000}
    .row small{display:block;color:var(--muted);line-height:1.45;margin-top:4px;font-weight:850}
    .rowActions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
    .chip{display:inline-flex;align-items:center;border-radius:999px;background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;padding:6px 10px;margin:4px 4px 0 0;font-size:13px;font-weight:950}
    .bottomnav{
      position:fixed;left:0;right:0;bottom:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
      border-top:1px solid #e5e7eb;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
      display:flex;justify-content:center;gap:6px;
    }
    .navbtn{
      border:0;background:transparent;color:#64748b;border-radius:24px;padding:8px 9px;min-width:64px;font-weight:1000;
      display:flex;flex-direction:column;align-items:center;gap:3px;font-size:14px
    }
    .navbtn .ico{font-size:24px;line-height:1}
    .navbtn.active{background:#eef2ff;color:#3730a3}
    .modal{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.38);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
    .modal.show{display:flex}
    .sheet{width:min(100%,860px);max-height:88vh;overflow:auto;background:#fff;border-radius:30px 30px 0 0;padding:20px 16px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -24px 70px rgba(15,23,42,.22)}
    .sheetHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
    .sheetHead h2{margin:0;font-size:26px;letter-spacing:-.04em}
    .weekDay{background:#f8fafc;border:1px solid #e5e7eb;border-radius:20px;padding:12px;margin-top:10px}
    .weekDay.today{background:#eff6ff;border-color:#93c5fd}
    .weekHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.weekTitle{font-size:18px;font-weight:1000}
    .count{border:1px solid #c7d2fe;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:950}
    .collapsed .weekDay:not(.today):not(.hasItems){display:none}
    .preview{max-width:100%;max-height:260px;border:1px solid #e5e7eb;border-radius:18px;object-fit:contain;background:#f8fafc;margin-top:10px;display:none}
    .hidden{display:none!important}
    @media(max-width:430px){
      .brand{font-size:30px}.card{border-radius:24px;padding:16px}.card h2{font-size:24px}
      .grid,.grid3{grid-template-columns:1fr}.navbtn{min-width:56px;font-size:13px}
      .row{align-items:flex-start}.metric b{font-size:25px}
    }
  
    input[type="time"]{
      -webkit-appearance:none;
      appearance:none;
      min-height:56px;
      letter-spacing:.02em;
      background:#fff;
    }
    .top .version{display:none!important}

  
    /* V48 UI Polish + Report Quality */
    body{font-weight:760}
    .card{padding:17px;margin:13px 0}
    .card h2{font-size:25px;line-height:1.12}

    .heroSummary{

    }

    }

    .premiumDivider{
      height:1px;
      background:linear-gradient(90deg,transparent,#dbeafe,transparent);

    }
    @media(max-width:430px){
      .card h2{font-size:23px}
      .heroSummary .big{font-size:18px}
      .priority{font-size:12px}
    }

  
    /* V49 Activity Progress AI */
    .activityModeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
    .modeBtn{border:1px solid #dbeafe;background:#fff;color:#1d4ed8;border-radius:18px;padding:10px 8px;font-weight:950;text-align:center;min-height:58px}
    .modeBtn.active{background:#eef2ff;color:#3730a3;border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.10)}
    .activityPreview{max-width:100%;max-height:240px;object-fit:contain;border:1px solid #e5e7eb;border-radius:18px;background:#f8fafc;margin-top:10px;display:none}
    .activityFrameGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    .activityFrameGrid img{width:100%;height:90px;object-fit:cover;border:1px solid #e5e7eb;border-radius:14px;background:#f8fafc}
    @media(max-width:430px){.activityModeGrid{grid-template-columns:1fr 1fr}.activityFrameGrid{grid-template-columns:1fr 1fr 1fr}.activityFrameGrid img{height:72px}}

  
    /* V50 Coach Voice Notes */
    .coachVoiceBox{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #bfdbfe;color:#1e3a8a;border-radius:20px;padding:13px;margin:12px 0}
    .coachVoiceBox b{display:block;color:#0f172a;margin-bottom:6px;font-size:17px}
    .coachVoiceRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .coachVoiceRow select{width:auto;min-width:145px;min-height:44px;padding:8px 12px;border-radius:999px;background:#fff}
    .voiceStatus{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:10px;color:#334155;font-weight:850;line-height:1.45;margin-top:10px;min-height:42px}
    .voiceLive{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .voiceWarn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}

  
    /* V51 Home Repair + Splash */
    .splashScreen{
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:#0f172a;text-align:center;
      transition:opacity .45s ease, visibility .45s ease;
    }
    .splashScreen.hide{opacity:0;visibility:hidden;pointer-events:none}
    .splashLogo{font-size:54px;line-height:1;margin-bottom:12px;animation:splashFloat 1.3s ease-in-out infinite alternate}
    .splashTitle{font-size:34px;font-weight:1000;letter-spacing:-.06em;margin-bottom:8px}
    .splashSlogan{font-size:18px;font-weight:950;color:#334155;margin-bottom:6px}
    .splashSub{font-size:14px;font-weight:850;color:#64748b}
    @keyframes splashFloat{from{transform:translateY(0)}to{transform:translateY(-7px)}}
    .bootError{
      margin:calc(18px + env(safe-area-inset-top)) 16px;
      background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;
      border-radius:22px;padding:16px;font-weight:850;line-height:1.45;
    }

  
    /* V52 Splash Timeout + Purple Cover */
    .splashScreen{
      position:fixed!important;
      inset:0!important;
      z-index:9999!important;
      display:flex!important;
      align-items:center!important;
      justify-content:center!important;
      overflow:hidden!important;
      background:
        radial-gradient(circle at 20% 18%, rgba(216,180,254,.45), transparent 32%),
        radial-gradient(circle at 82% 70%, rgba(244,114,182,.32), transparent 28%),

      color:#0f172a!important;
      text-align:center!important;
      transition:opacity .55s ease, visibility .55s ease!important;
    }
    .splashScreen.hide{
      opacity:0!important;
      visibility:hidden!important;
      pointer-events:none!important;
    }
    .splashContent{
      position:relative;
      z-index:2;
      width:min(86vw,520px);
      padding:34px 24px;
      border-radius:34px;
      background:rgba(255,255,255,.34);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:0 24px 80px rgba(88,28,135,.14);
      backdrop-filter:blur(12px);
    }
    .splashLogo{
      font-size:62px!important;
      line-height:1!important;
      margin-bottom:14px!important;
      animation:splashFloat 1.2s ease-in-out infinite alternate!important;
      filter:drop-shadow(0 10px 18px rgba(219,39,119,.22));
    }
    .splashTitle{
      font-size:38px!important;
      font-weight:1000!important;
      letter-spacing:-.065em!important;
      margin-bottom:12px!important;
      color:#0f172a!important;
    }
    .splashSlogan{
      font-size:20px!important;
      font-weight:950!important;
      color:#334155!important;
      margin-bottom:8px!important;
    }
    .splashSub{
      font-size:15px!important;
      font-weight:850!important;
      color:#64748b!important;
    }
@keyframes splashFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.03)}}
    @keyframes splashSlow{from{transform:translateY(0) rotate(-12deg)}to{transform:translateY(-12px) rotate(8deg)}}

  
    /* V53 Voice + Activity Mode Fix */
    .voiceMiniBox{
      background:linear-gradient(135deg,#eff6ff,#f5f3ff);
      border:1px solid #bfdbfe;
      border-radius:18px;
      padding:12px;
      margin:10px 0 12px;
      color:#1e3a8a;
    }
    .voiceMiniBox b{
      display:block;
      color:#0f172a;
      margin-bottom:5px;
      font-size:16px;
    }
    .voiceMiniRow{
      display:flex;

      margin-top:9px;
    }
    .voiceMiniRow select{

    }

    .voiceMiniStatus.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
    .modeBtn{touch-action:manipulation}
    .modeBtn:active{transform:scale(.98)}

      background:linear-gradient(135deg,#eff6ff,#f5f3ff);

      border-radius:22px;
      padding:14px;
      margin:14px 0;

    /* Hide duplicated V50/V53 voice UI inside Activity Progress only. Teacher voice remains visible. */
    #activityUnifiedInput ~ .coachVoiceBox,
    #activityUnifiedInput ~ .voiceMiniBox{
      display:none!important;
    }

  
    /* V55 Activity Clean DOM */
    #activityProgressCard > #activityFileWrap,
    #activityProgressCard > .coachVoiceBox,
    #activityProgressCard > .voiceMiniBox,
    #activityProgressCard > textarea#activityNote,
    #activityProgressCard > textarea#activityNote + .actions{
      display:none!important;
    }
    #activityProgressCard > label:has(+ textarea#activityNote),
    #activityProgressCard > label:has(+ #activityFileWrap){
      display:none!important;
    }

    .splashScreen{

    .captureHero{
      background:linear-gradient(135deg,#eff6ff,#ecfeff);
      border:1px solid #bfdbfe;
      border-radius:24px;
      padding:15px;
      margin-top:13px;
    }
    .captureHero h3{margin:0 0 7px;font-size:21px;color:#0f172a;letter-spacing:-.04em}
    .captureExamples{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .captureExample{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:10px;
      color:#334155;
      font-weight:850;

function todayISO(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10)}
function dayName(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toLocaleDateString('en-AU',{weekday:'long'})}
function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,'').replace(/[^\w\u4e00-\u9fff]/g,'')}
function timeToMin(t){
  if(!t)return null;let s=String(t).trim().toLowerCase().replace(/\s+/g,'').replace('´╝Ü',':');
  s=s.replace(/ńŞŐňŹł|ŠŚęńŞŐ/g,'am').replace(/ńŞőňŹł|ŠÖÜńŞŐ|ňĄťŠÖÜ/g,'pm').replace(/Ú╗×ňŹŐ|šé╣ňŹŐ/g,':30').replace(/Ú╗×|šé╣|ŠÖé|ŠŚÂ/g,':00');
  const m=s.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/); if(!m)return null;
  let h=+m[1],mm=+(m[2]||0),ap=m[3]||''; if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;if(!ap&&h>=1&&h<=7)h+=12; return h*60+mm;
}
function minText(m){m=((m%1440)+1440)%1440;let h=Math.floor(m/60),mm=m%60,ap=h>=12?'PM':'AM';let hh=h%12;if(!hh)hh=12;return `${hh}:${String(mm).padStart(2,'0')} ${ap}`}
function timeInputValue(t){
  const m=timeToMin(t);
  if(m===null) return '';
  const h=Math.floor(m/60), mm=m%60;
  return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function timeInputDisplay(v){
  if(!v) return '';
  const m=String(v).match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return v;
  return minText((+m[1])*60+(+m[2]));
}

}

}

}

function freeWindows(day,items){
  const weekday=!['Saturday','Sunday'].includes(day); const start=weekday?15*60+30:9*60, end=20*60+30;
  const blocks=items.map(r=>{let s=timeToMin(r.start),e=timeToMin(r.end);if(s===null)return null;if(e===null||e<=s)e=s+60;return{s,e}}).filter(Boolean).sort((a,b)=>a.s-b.s);

}

function v85CleanBulletArray(items, max=8){
  const out=[]; const seen=new Set();
  (items||[]).forEach(x=>{
    let s=v85CleanBulletText(x);
    if(!s || v85IsSectionHeadingLine(s) || (/ÚťÇŔŽüŔŽćŠáŞšÜäńŻŹšŻ«|ňĚ▓ňüÜňżŚňąŻšÜäňť░Šľ╣|ňĆ»ŔâŻňç║Úî»ňÄčňŤá|šÁŽň«ÂÚĽĚšÜäš░íščşŔžúŔ«Ç|ń╗ŐŠÖÜňĆ¬ňüÜńŞÇń╗Âń║ő/.test(s) && s.length<28)) return;
    if(/^(ŠÜźŠť¬ŔŽőŠśÄšó║Úî»Úíî|ŠÜźŠť¬ŔŽőÚî»Úíî|Šť¬ŔŽőŠśÄšó║Úî»Úíî)[ŃÇé.]?$/.test(s) && out.some(y=>/ŠÜźŠť¬ŔŽőŠśÄšó║Úî»Úíî/.test(y))) return;
    const k=s.toLowerCase().replace(/\s+/g,' ');
    if(seen.has(k)) return;
    seen.add(k); out.push(s);
  });
  return out.slice(0,max);
}
function compactList(items, empty='ŠÜźŠÖéŠť¬ŠťëŔ│çŠľÖ'){

}

function icsEscape(s){
  const raw=String(s||'').replace(/\\n/g,'\n');
  return raw.replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
}
function pad2(n){return String(n).padStart(2,'0')}
function dateForDay(day){
  const today=new Date();
  const idx=DAYS.indexOf(day);
  if(idx<0) return today;
  const target=(idx+1)%7; // JS Sunday=0; our Monday index=0
  let diff=(target-today.getDay()+7)%7;
  if(diff===0) diff=7;
  const d=new Date(today); d.setDate(today.getDate()+diff); return d;
}
function parseTimeParts(t, fallback='09:00'){
  const m=timeToMin(t);
  const mins=m===null?timeToMin(fallback):m;
  return {h:Math.floor(mins/60),m:mins%60};
}
function icsDateTime(date, timeText){
  const p=parseTimeParts(timeText);
  return `${date.getFullYear()}${pad2(date.getMonth()+1)}${pad2(date.getDate())}T${pad2(p.h)}${pad2(p.m)}00`;
}
function icsStamp(){
  return new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
}
function icsTitle(s, fallback='Activity'){

}
function icsUID(id, prefix='childgrowthai'){
  return `${String(id||Date.now()).replace(/[^\w-]/g,'_')}@${prefix}`;
}
function icsBuild(lines){
  return lines.filter(x=>x!==null && x!==undefined && x!=='').join('\r\n') + '\r\n';
}
function downloadICS(filename, content){
  const blob=new Blob([content],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},800);
}

/* V58 clean Activity Progress + shared voice dictation */
let v58ActivityMode = 'photo';
let v58ActivityImage = '';
let v58ActivityVideoFrames = [];
let v58Recognition = null;
let v58VoiceTimer = null;
let v58VoiceStatusId = null;

function v58Status(id, text, mode=''){
  const el=$(id);
  if(!el) return;
  el.className='activityStatusLine ' + (mode==='live'?'live':mode==='warn'?'warn':'');
  el.innerHTML=text;
}
function v58AppendText(textareaId, text){
  const area=$(textareaId);
  if(!area || !text) return;
  const current=area.value.trim();
  area.value=current ? current + '\n' + text.trim() : text.trim();
  area.dispatchEvent(new Event('input',{bubbles:true}));
}
function v53StartDictation(textareaId, statusId, langSelectId, label='Ŕ¬×Úč│Ŕ╝Şňůą'){
  const SR=window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    v58Status(statusId,'ÔÜá´ŞĆ ňĹóňÇő browser ŠÜźŠÖéňööŠö»ŠĆ┤Ŕ¬×Úč│´╝îŔźőšŤ┤ŠÄąŠëôňşŚŃÇé','warn');
    return;
  }
  v53StopDictation(false);
  v58VoiceStatusId=statusId;
  const lang=($(langSelectId)?.value)||'zh-HK';
  v58Recognition=new SR();
  v58Recognition.lang=lang;
  v58Recognition.interimResults=true;
  v58Recognition.continuous=false;
  v58Recognition.maxAlternatives=1;
  let finalText='';
  let interimText='';
  v58Status(statusId,`­čÄÖ´ŞĆ ŠşúňťĘŔüŻ ${label}´╝îňĆ»ń╗ąńŞşŔő▒ňĄżÚŤť´╝îŠťÇňĄÜš┤ä 25 šžĺŃÇé`,'live');

  v58VoiceTimer=setTimeout(()=>{
    const text=(finalText || interimText || '').trim();
    try{v58Recognition && v58Recognition.stop();}catch(e){}
    if(text){
      v58AppendText(textareaId,text);
      v58Status(statusId,'Ôťů ňĚ▓ňŐáňůąŔ¬×Úč│ŠľçňşŚ´╝îŔźőŠ¬óŠčąňżîňćŹňä▓ňşś / AnalyzeŃÇé','live');
    }else{
      v58Status(statusId,'Šť¬ŔüŻňł░ŠŞůŠąÜňůžň«╣´╝îňĆ»ń╗ąňćŹŔęŽńŞÇŠČíŠłľšŤ┤ŠÄąŠëôňşŚŃÇé','warn');
    }
    v58Recognition=null;
  },25000);

  v58Recognition.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const part=e.results[i][0].transcript || '';
      if(e.results[i].isFinal) finalText += part;
      else interim += part;
    }
    interimText=interim;
    const display=(finalText || interim || '').trim();
    if(display) v58Status(statusId,'­čÄÖ´ŞĆ ŔüŻňł░´╝Ü'+esc(display),'live');
  };
  v58Recognition.onerror=(e)=>{
    clearTimeout(v58VoiceTimer);
    v58Recognition=null;
    v58Status(statusId,'ÔÜá´ŞĆ Ŕ¬×Úč│Ŕ╝ŞňůąŠť¬ŠłÉňŐč´╝Ü'+esc(e.error||'unknown')+'ŃÇéňĆ»ń╗ąňćŹŔęŽŠłľšŤ┤ŠÄąŠëôňşŚŃÇé','warn');
  };
  v58Recognition.onend=()=>{
    clearTimeout(v58VoiceTimer);
    const text=(finalText || interimText || '').trim();
    if(text){
      v58AppendText(textareaId,text);
      v58Status(statusId,'Ôťů ňĚ▓ňŐáňůąŔ¬×Úč│ŠľçňşŚ´╝îŔźőŠ¬óŠčąňżîňćŹňä▓ňşś / AnalyzeŃÇé','live');
    }else{
      v58Status(statusId,'Ŕ¬×Úč│ňĚ▓ňüťŠşóŃÇéňŽéŠť¬ňŐáňůąŠľçňşŚ´╝îňĆ»ń╗ąňćŹŔęŽńŞÇŠČíŃÇé','warn');
    }
    v58Recognition=null;
  };
  try{v58Recognition.start();}catch(e){
    v58Recognition=null;
    v58Status(statusId,'ÔÜá´ŞĆ Ŕ¬×Úč│ňŐčŔâŻňĽčňőĽňĄ▒ŠĽŚ´╝îŔźőšŤ┤ŠÄąŠëôňşŚŃÇé','warn');
  }
}
function v53StopDictation(show=true){
  if(v58VoiceTimer) clearTimeout(v58VoiceTimer);
  v58VoiceTimer=null;
  try{ if(v58Recognition) v58Recognition.stop(); }catch(e){}
  v58Recognition=null;
  if(show && v58VoiceStatusId) v58Status(v58VoiceStatusId,'ňĚ▓ňüťŠşóŔ¬×Úč│ŃÇé','warn');
}
function v53ClearTextarea(textareaId, statusId){
  const area=$(textareaId);
  if(area) area.value='';
  v58Status(statusId,'ňĚ▓ŠŞůšę║ŃÇéňĆ»ń╗ąÚçŹŠľ░Ŕ¬×Úč│Ŕ╝ŞňůąŠłľŠëôňşŚŃÇé');
}

function extractVideoFrames(file,count=3){
  return new Promise((resolve,reject)=>{
    const video=document.createElement('video');
    const url=URL.createObjectURL(file);
    video.src=url;
    video.muted=true;
    video.playsInline=true;
    video.preload='metadata';
    const frames=[];
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    video.onloadedmetadata=()=>{
      const dur=Math.min(video.duration || 1, 20);
      const times=[dur*0.2,dur*0.5,dur*0.8].map(x=>Math.max(0.1,Math.min(dur-0.1,x)));
      let i=0;
      const grab=()=>{ if(i>=Math.min(count,times.length)){URL.revokeObjectURL(url);resolve(frames);return;} video.currentTime=times[i++]; };
      video.onseeked=()=>{
        canvas.width=Math.min(video.videoWidth || 640, 900);
        canvas.height=Math.round(canvas.width*((video.videoHeight||360)/(video.videoWidth||640)));
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        frames.push(canvas.toDataURL('image/jpeg',0.78));
        grab();
      };
      grab();
    };
    video.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('video load failed'));};
  });
}

function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();

function compressImageFile(file,maxDim=1200,quality=0.66){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=reject;
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        const scale=Math.min(1, maxDim/Math.max(w,h));
        w=Math.round(w*scale); h=Math.round(h*scale);
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#fff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        let data=canvas.toDataURL('image/jpeg',quality);
        // V81 adaptive compression: keep each image roughly under 650KB where possible.
        if(data.length>650*1024){
          const scale2=Math.sqrt((650*1024)/data.length);
          const c2=document.createElement('canvas');
          c2.width=Math.max(800,Math.round(w*scale2));
          c2.height=Math.max(800,Math.round(h*scale2));
          const x2=c2.getContext('2d');
          x2.fillStyle='#fff'; x2.fillRect(0,0,c2.width,c2.height);
          x2.drawImage(img,0,0,c2.width,c2.height);
          data=c2.toDataURL('image/jpeg',0.58);
        }
        resolve(data);
      };
      img.onerror=reject;
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function v83ShrinkDataUrl(dataUrl,maxDim=850,quality=0.48){
  return new Promise(resolve=>{
    try{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        const scale=Math.min(1,maxDim/Math.max(w,h));
        w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        let out=canvas.toDataURL('image/jpeg',quality);
        if(out.length>420*1024){
          const c2=document.createElement('canvas');
          const s2=Math.sqrt((420*1024)/out.length);
          c2.width=Math.max(650,Math.round(w*s2));
          c2.height=Math.max(650,Math.round(h*s2));
          const x2=c2.getContext('2d');
          x2.fillStyle='#fff'; x2.fillRect(0,0,c2.width,c2.height);
          x2.drawImage(img,0,0,c2.width,c2.height);
          out=c2.toDataURL('image/jpeg',0.42);
        }
        resolve(out);
      };
      img.onerror=()=>resolve(dataUrl);
      img.src=dataUrl;
    }catch(e){resolve(dataUrl);}
  });
}

function v9615ArithmeticFacts(question){
  const q=String(question||'');

  const a=parseInt(m[1],10), b=parseInt(m[3],10), op=m[2];

  return {a,b,op,twoDigit,carry:/[+]/.test(op) && (a%10)+(b%10)>=10,borrow:/-/.test(op) && (a%10)<(b%10)};
}

function v61ApplyPrepSuggestion(force=false){
  const nameEl=$('rName');
  const prepEl=$('rPrep');
  const impactEl=$('rImpact');
  const reminderEl=$('rReminder');
  if(!nameEl || !prepEl) return;
  const name=nameEl.value.trim();
  if(!name) return;
  const suggestion=v61SmartPrepItems(name).join('ŃÇü');
  const shouldFill = force || !prepEl.value.trim() || prepEl.dataset.autoPrep==='1';
  if(shouldFill){
    prepEl.value=suggestion;
    prepEl.dataset.autoPrep='1';
  }
  if(impactEl && (!impactEl.value || force)) impactEl.value=v61SmartImpact(name);
  if(reminderEl && (!reminderEl.value.trim() || force)) reminderEl.value='ňëŹńŞÇŠÖÜ 8:00 PM';
  v61ShowPrepSuggestion(name, suggestion);
}
function v61ShowPrepSuggestion(name, suggestion){
  const anchor=$('rPrep');
  if(!anchor) return;
  let box=$('v61PrepSuggestBox');
  if(!box){
    box=document.createElement('div');
    box.id='v61PrepSuggestBox';
    box.className='prepSuggestBox';
    anchor.parentNode.insertBefore(box, anchor.nextSibling);
  }
  const chips=suggestion.split('ŃÇü').filter(Boolean).map(x=>`<button type="button" class="prepChip" onclick="v61AddPrepChip('${String(x).replace(/'/g,"\\'")}')">${esc(x)}</button>`).join('');

}
function v61AddPrepChip(item){
  const prepEl=$('rPrep');

  const arr=prepEl.value.split(/[ŃÇü,´╝î]/).map(x=>x.trim()).filter(Boolean);
