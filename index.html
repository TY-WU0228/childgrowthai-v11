<!doctype html>
<html lang="zh-Hant">
<head>
<!-- V73 Slogan Fix Only -->
  <meta name="childgrowth-version" content="v60-routine-restore-click-fix">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#eff6ff" />
  <title>ChildGrowth AI v73 Slogan Fix Only</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#f4f8ff;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbeafe;
      --blue:#2563eb;--purple:#7c3aed;--pink:#db2777;--green:#15803d;--orange:#9a3412;
      --soft-blue:#eff6ff;--soft-purple:#f5f3ff;--soft-green:#ecfdf5;--soft-orange:#fff7ed;
      --shadow:0 16px 45px rgba(15,23,42,.07);--r:28px;--navh:86px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC","PingFang TC",sans-serif;
      font-weight:800;-webkit-font-smoothing:antialiased;padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom));
    }
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .app{max-width:860px;margin:0 auto;}
    .top{
      display:none!important;
    }
    .brand{font-size:34px;font-weight:1000;letter-spacing:-.06em;line-height:1}
    .sub{font-size:16px;color:var(--muted);font-weight:900;margin-top:7px;line-height:1.25}
    .version{font-size:13px;color:var(--muted);font-weight:900;margin-top:4px}
    .page{display:none;padding:calc(14px + env(safe-area-inset-top)) 16px 28px}.page.active{display:block}
    .card{
      background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);
      padding:18px;margin:14px 0;box-shadow:var(--shadow);overflow:hidden;
    }
    .card h2{font-size:28px;margin:0 0 8px;letter-spacing:-.05em;color:var(--ink)}
    .card h3{font-size:21px;margin:16px 0 8px;letter-spacing:-.04em;color:var(--ink)}
    .muted{color:var(--muted);line-height:1.45;font-weight:850}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .metric{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:14px;min-width:0}
    .metric b{display:block;color:var(--pink);font-size:30px;line-height:1.05;word-break:break-word}
    .metric span{display:block;color:var(--muted);font-size:13px;margin-top:5px;font-weight:900}
    .notice,.insight{
      border-radius:18px;padding:12px;margin-top:12px;line-height:1.45;font-weight:900
    }
    .insight{background:#ecfeff;border:1px solid #67e8f9;color:#155e75}
    .notice{background:var(--soft-orange);border:1px solid #fed7aa;color:var(--orange)}
    .good{background:var(--soft-green);border:1px solid #bbf7d0;color:var(--green)}
    .bluebox{background:var(--soft-blue);border:1px solid #bfdbfe;color:#1e3a8a}
    label{display:block;color:var(--muted);font-weight:950;margin:12px 0 6px}
    input,textarea,select{
      width:100%;border:1px solid #e5e7eb;border-radius:18px;background:#fff;padding:14px 15px;
      color:var(--ink);outline:none;font-weight:850;min-height:54px;
    }
    textarea{min-height:120px;resize:vertical}
    input:focus,textarea:focus,select:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(147,197,253,.22)}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .btn{
      border:1px solid #dbeafe;background:#fff;color:#1d4ed8;border-radius:999px;
      padding:10px 14px;font-weight:1000;width:auto;margin:0;white-space:nowrap;
    }
    .btn.primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none}
    .btn.danger{background:#fee2e2;color:#991b1b;border:none}
    .btn.soft{background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe}
    .row{
      background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:12px;margin-top:10px;
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;
    }
    .row b{color:var(--ink);font-weight:1000}
    .row small{display:block;color:var(--muted);line-height:1.45;margin-top:4px;font-weight:850}
    .rowActions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
    .chip{display:inline-flex;align-items:center;border-radius:999px;background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;padding:6px 10px;margin:4px 4px 0 0;font-size:13px;font-weight:950}
    .bottomnav{
      position:fixed;left:0;right:0;bottom:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
      border-top:1px solid #e5e7eb;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
      display:flex;justify-content:center;gap:6px;
    }
    .navbtn{
      border:0;background:transparent;color:#64748b;border-radius:24px;padding:8px 9px;min-width:64px;font-weight:1000;
      display:flex;flex-direction:column;align-items:center;gap:3px;font-size:14px
    }
    .navbtn .ico{font-size:24px;line-height:1}
    .navbtn.active{background:#eef2ff;color:#3730a3}
    .modal{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.38);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
    .modal.show{display:flex}
    .sheet{width:min(100%,860px);max-height:88vh;overflow:auto;background:#fff;border-radius:30px 30px 0 0;padding:20px 16px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -24px 70px rgba(15,23,42,.22)}
    .sheetHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
    .sheetHead h2{margin:0;font-size:26px;letter-spacing:-.04em}
    .weekDay{background:#f8fafc;border:1px solid #e5e7eb;border-radius:20px;padding:12px;margin-top:10px}
    .weekDay.today{background:#eff6ff;border-color:#93c5fd}
    .weekHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.weekTitle{font-size:18px;font-weight:1000}
    .count{border:1px solid #c7d2fe;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:950}
    .collapsed .weekDay:not(.today):not(.hasItems){display:none}
    .preview{max-width:100%;max-height:260px;border:1px solid #e5e7eb;border-radius:18px;object-fit:contain;background:#f8fafc;margin-top:10px;display:none}
    .hidden{display:none!important}
    @media(max-width:430px){
      .brand{font-size:30px}.card{border-radius:24px;padding:16px}.card h2{font-size:24px}
      .grid,.grid3{grid-template-columns:1fr}.navbtn{min-width:56px;font-size:13px}
      .row{align-items:flex-start}.metric b{font-size:25px}
    }
  
    input[type="time"]{
      -webkit-appearance:none;
      appearance:none;
      min-height:56px;
      letter-spacing:.02em;
      background:#fff;
    }
    .top .version{display:none!important}

  
    /* V48 UI Polish + Report Quality */
    body{font-weight:760}
    .card{padding:17px;margin:13px 0}
    .card h2{font-size:25px;line-height:1.12}
    .card h3{font-size:19px;line-height:1.18}
    .muted{font-size:15px}
    .heroSummary{
      background:linear-gradient(135deg,#eff6ff,#f5f3ff);
      border:1px solid #bfdbfe;
      border-radius:22px;
      padding:14px;
      margin-top:14px;
    }
    .heroSummary .big{
      font-size:20px;
      font-weight:1000;
      letter-spacing:-.04em;
      color:#0f172a;
      line-height:1.25;
    }
    .heroSummary .subline{
      color:#475569;
      font-weight:850;
      line-height:1.45;
      margin-top:7px;
    }
    .priorityStrip{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .priority{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:999px;
      padding:7px 10px;
      color:#334155;
      font-size:13px;
      font-weight:950;
    }
    .reportBlock{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:20px;
      padding:13px;
      margin-top:10px;
    }
    .reportBlock b{
      display:block;
      color:#0f172a;
      font-size:17px;
      margin-bottom:6px;
    }
    .reportBlock ul{
      margin:8px 0 0 20px;
      padding:0;
      color:#475569;
      font-weight:820;
      line-height:1.5;
    }
    .reportBlock li{margin:4px 0}
    .sectionTag{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:5px 9px;
      background:#ecfeff;
      border:1px solid #67e8f9;
      color:#155e75;
      font-size:12px;
      font-weight:950;
      margin-bottom:8px;
    }
    .noticeDone{
      opacity:.68;
      filter:saturate(.7);
    }
    .noticeDone b{text-decoration:line-through}
    .premiumDivider{
      height:1px;
      background:linear-gradient(90deg,transparent,#dbeafe,transparent);
      margin:14px 0;
    }
    @media(max-width:430px){
      .card h2{font-size:23px}
      .heroSummary .big{font-size:18px}
      .priority{font-size:12px}
    }

  
    /* V49 Activity Progress AI */
    .activityModeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
    .modeBtn{border:1px solid #dbeafe;background:#fff;color:#1d4ed8;border-radius:18px;padding:10px 8px;font-weight:950;text-align:center;min-height:58px}
    .modeBtn.active{background:#eef2ff;color:#3730a3;border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.10)}
    .activityPreview{max-width:100%;max-height:240px;object-fit:contain;border:1px solid #e5e7eb;border-radius:18px;background:#f8fafc;margin-top:10px;display:none}
    .activityFrameGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    .activityFrameGrid img{width:100%;height:90px;object-fit:cover;border:1px solid #e5e7eb;border-radius:14px;background:#f8fafc}
    @media(max-width:430px){.activityModeGrid{grid-template-columns:1fr 1fr}.activityFrameGrid{grid-template-columns:1fr 1fr 1fr}.activityFrameGrid img{height:72px}}

  
    /* V50 Coach Voice Notes */
    .coachVoiceBox{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #bfdbfe;color:#1e3a8a;border-radius:20px;padding:13px;margin:12px 0}
    .coachVoiceBox b{display:block;color:#0f172a;margin-bottom:6px;font-size:17px}
    .coachVoiceRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .coachVoiceRow select{width:auto;min-width:145px;min-height:44px;padding:8px 12px;border-radius:999px;background:#fff}
    .voiceStatus{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:10px;color:#334155;font-weight:850;line-height:1.45;margin-top:10px;min-height:42px}
    .voiceLive{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .voiceWarn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}

  
    /* V51 Home Repair + Splash */
    .splashScreen{
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:#0f172a;text-align:center;
      transition:opacity .45s ease, visibility .45s ease;
    }
    .splashScreen.hide{opacity:0;visibility:hidden;pointer-events:none}
    .splashLogo{font-size:54px;line-height:1;margin-bottom:12px;animation:splashFloat 1.3s ease-in-out infinite alternate}
    .splashTitle{font-size:34px;font-weight:1000;letter-spacing:-.06em;margin-bottom:8px}
    .splashSlogan{font-size:18px;font-weight:950;color:#334155;margin-bottom:6px}
    .splashSub{font-size:14px;font-weight:850;color:#64748b}
    @keyframes splashFloat{from{transform:translateY(0)}to{transform:translateY(-7px)}}
    .bootError{
      margin:calc(18px + env(safe-area-inset-top)) 16px;
      background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;
      border-radius:22px;padding:16px;font-weight:850;line-height:1.45;
    }

  
    /* V52 Splash Timeout + Purple Cover */
    .splashScreen{
      position:fixed!important;
      inset:0!important;
      z-index:9999!important;
      display:flex!important;
      align-items:center!important;
      justify-content:center!important;
      overflow:hidden!important;
      background:
        radial-gradient(circle at 20% 18%, rgba(216,180,254,.45), transparent 32%),
        radial-gradient(circle at 82% 70%, rgba(244,114,182,.32), transparent 28%),
        linear-gradient(155deg,#f8fbff 0%,#eef2ff 38%,#f5f3ff 70%,#fff7fb 100%)!important;
      color:#0f172a!important;
      text-align:center!important;
      transition:opacity .55s ease, visibility .55s ease!important;
    }
    .splashScreen.hide{
      opacity:0!important;
      visibility:hidden!important;
      pointer-events:none!important;
    }
    .splashContent{
      position:relative;
      z-index:2;
      width:min(86vw,520px);
      padding:34px 24px;
      border-radius:34px;
      background:rgba(255,255,255,.34);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:0 24px 80px rgba(88,28,135,.14);
      backdrop-filter:blur(12px);
    }
    .splashLogo{
      font-size:62px!important;
      line-height:1!important;
      margin-bottom:14px!important;
      animation:splashFloat 1.2s ease-in-out infinite alternate!important;
      filter:drop-shadow(0 10px 18px rgba(219,39,119,.22));
    }
    .splashTitle{
      font-size:38px!important;
      font-weight:1000!important;
      letter-spacing:-.065em!important;
      margin-bottom:12px!important;
      color:#0f172a!important;
    }
    .splashSlogan{
      font-size:20px!important;
      font-weight:950!important;
      color:#334155!important;
      margin-bottom:8px!important;
    }
    .splashSub{
      font-size:15px!important;
      font-weight:850!important;
      color:#64748b!important;
    }
@keyframes splashFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.03)}}
    @keyframes splashSlow{from{transform:translateY(0) rotate(-12deg)}to{transform:translateY(-12px) rotate(8deg)}}

  
    /* V53 Voice + Activity Mode Fix */
    .voiceMiniBox{
      background:linear-gradient(135deg,#eff6ff,#f5f3ff);
      border:1px solid #bfdbfe;
      border-radius:18px;
      padding:12px;
      margin:10px 0 12px;
      color:#1e3a8a;
    }
    .voiceMiniBox b{
      display:block;
      color:#0f172a;
      margin-bottom:5px;
      font-size:16px;
    }
    .voiceMiniRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:9px;
    }
    .voiceMiniRow select{
      width:auto;
      min-width:140px;
      min-height:42px;
      padding:8px 12px;
      border-radius:999px;
      background:#fff;
    }
    .voiceMiniStatus{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:9px 10px;
      margin-top:9px;
      color:#334155;
      font-weight:850;
      line-height:1.45;
      min-height:38px;
    }
    .voiceMiniStatus.live{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .voiceMiniStatus.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
    .modeBtn{touch-action:manipulation}
    .modeBtn:active{transform:scale(.98)}

  
    /* V54 Activity Input Cleanup */
    #activityUnifiedInput{
      background:linear-gradient(135deg,#eff6ff,#f5f3ff);
      border:1px solid #bfdbfe;
      border-radius:22px;
      padding:14px;
      margin:14px 0;
      color:#1e3a8a;
    }
    #activityUnifiedInput h3{
      margin:0 0 8px;
      color:#0f172a;
      font-size:21px;
      letter-spacing:-.04em;
    }
    .v54SmallSafety{
      background:#fff7ed;
      border:1px solid #fed7aa;
      color:#9a3412;
      border-radius:14px;
      padding:9px 10px;
      margin:9px 0;
      font-size:13px;
      font-weight:850;
      line-height:1.45;
    }
    .v54VoiceRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin:10px 0;
    }
    .v54VoiceRow select{
      width:auto;
      min-width:145px;
      min-height:44px;
      padding:8px 12px;
      border-radius:999px;
      background:#fff;
    }
    .v54ActivityStatus{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:15px;
      padding:9px 10px;
      margin-top:10px;
      color:#334155;
      font-weight:850;
      line-height:1.45;
      min-height:38px;
    }
    .v54ActivityStatus.live{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .v54ActivityStatus.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
    .v54FileHint{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:10px;
      margin-top:10px;
      color:#475569;
      font-weight:850;
      line-height:1.45;
    }
    /* Hide duplicated V50/V53 voice UI inside Activity Progress only. Teacher voice remains visible. */
    #activityUnifiedInput ~ .coachVoiceBox,
    #activityUnifiedInput ~ .voiceMiniBox{
      display:none!important;
    }

  
    /* V55 Activity Clean DOM */
    #activityProgressCard > #activityFileWrap,
    #activityProgressCard > .coachVoiceBox,
    #activityProgressCard > .voiceMiniBox,
    #activityProgressCard > textarea#activityNote,
    #activityProgressCard > textarea#activityNote + .actions{
      display:none!important;
    }
    #activityProgressCard > label:has(+ textarea#activityNote),
    #activityProgressCard > label:has(+ #activityFileWrap){
      display:none!important;
    }

  
    /* V57 Capture + Calendar + Neutral Cover */
    .splashScreen{
      position:fixed!important;
      inset:0!important;
      z-index:9999!important;
      display:flex!important;
      align-items:center!important;
      justify-content:center!important;
      overflow:hidden!important;
      background:
        radial-gradient(circle at 14% 12%, rgba(59,130,246,.16), transparent 30%),
        radial-gradient(circle at 86% 76%, rgba(20,184,166,.14), transparent 28%),
        linear-gradient(155deg,#f8fbff 0%,#eef6ff 46%,#f7fbff 100%)!important;
      color:#0f172a!important;
      text-align:center!important;
      transition:opacity .55s ease, visibility .55s ease!important;
    }
    .splashScreen.hide{opacity:0!important;visibility:hidden!important;pointer-events:none!important}
    .splashContent{
      position:relative;z-index:2;width:min(86vw,520px);padding:34px 24px;border-radius:34px;
      background:rgba(255,255,255,.48);border:1px solid rgba(255,255,255,.72);
      box-shadow:0 24px 80px rgba(30,64,175,.12);backdrop-filter:blur(12px);
    }
    .splashLogo{
      width:72px;height:72px;border-radius:24px;margin:0 auto 16px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#2563eb,#14b8a6);
      color:white!important;font-size:26px!important;font-weight:1000!important;letter-spacing:-.08em!important;
      box-shadow:0 16px 45px rgba(37,99,235,.20);
      animation:splashFloat 1.2s ease-in-out infinite alternate!important;
    }
    .splashTitle{font-size:36px!important;font-weight:1000!important;letter-spacing:-.065em!important;margin-bottom:12px!important;color:#0f172a!important}
    .splashSlogan{font-size:19px!important;font-weight:950!important;color:#334155!important;margin-bottom:8px!important}
    .splashSub{font-size:15px!important;font-weight:850!important;color:#64748b!important}
    .splashPattern{position:absolute;border:1px solid rgba(37,99,235,.12);border-radius:38px;pointer-events:none;opacity:.55}
    .splashPattern1{width:210px;height:210px;left:-58px;top:12%;transform:rotate(18deg);background:rgba(255,255,255,.25)}
    .splashPattern2{width:170px;height:170px;right:-46px;bottom:16%;transform:rotate(-22deg);background:rgba(20,184,166,.10)}
    .splashPattern3{width:120px;height:120px;right:18%;top:12%;border-radius:999px;background:rgba(59,130,246,.08)}
    @keyframes splashFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-7px) scale(1.02)}}

    .captureHero{
      background:linear-gradient(135deg,#eff6ff,#ecfeff);
      border:1px solid #bfdbfe;
      border-radius:24px;
      padding:15px;
      margin-top:13px;
    }
    .captureHero h3{margin:0 0 7px;font-size:21px;color:#0f172a;letter-spacing:-.04em}
    .captureExamples{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .captureExample{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:10px;
      color:#334155;
      font-weight:850;
      line-height:1.35;
      font-size:13px;
    }
    .captureModeGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .captureModeBtn{
      border:1px solid #dbeafe;
      background:#fff;
      color:#1d4ed8;
      border-radius:18px;
      padding:12px 9px;
      font-weight:950;
      text-align:left;
      min-height:70px;
    }
    .captureModeBtn.active{
      background:#eef2ff;
      border-color:#818cf8;
      color:#3730a3;

(function(){
'use strict';

const DATA_KEY='cg_app_v46';
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_LABEL={Monday:'星期一',Tuesday:'星期二',Wednesday:'星期三',Thursday:'星期四',Friday:'星期五',Saturday:'星期六',Sunday:'星期日'};
let currentTab='home';

let taskEditId=null;
let noticePending=null;
let homeworkImage='';
let homeworkImages=[];

const DEFAULT_DATA={
  version:46,
  profile:{
    childName:'Janice', year:'Year 2', age:'8 歲左右', school:'Oakleigh South Primary School',
    region:'Australia / Victoria', language:'繁體中文 / Cantonese',
    focus:'Academic + Emotional Balance',
    strengths:['記憶力好','音感 / piano 潛能','畫畫 / 創意'],
    watchAreas:['數學規律可培養','閱讀細節要慢慢練'],
    parentGoals:['穩定節奏','清楚步驟','保持自信']
  },
  routines:[],
  todayTasks:[],
  schoolNotices:[],
  emotions:[],
  teacherComments:[],
  homeworkReports:[],
  activityReports:[],
  captureHistory:[],

function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function readJSON(k,f){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch(e){return f}}
function save(){app.version=46;localStorage.setItem(DATA_KEY,JSON.stringify(app));mirrorLegacy();}
function todayISO(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10)}
function dayName(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toLocaleDateString('en-AU',{weekday:'long'})}
function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,'').replace(/[^\w\u4e00-\u9fff]/g,'')}
function timeToMin(t){
  if(!t)return null;let s=String(t).trim().toLowerCase().replace(/\s+/g,'').replace('：',':');
  s=s.replace(/上午|早上/g,'am').replace(/下午|晚上|夜晚/g,'pm').replace(/點半|点半/g,':30').replace(/點|点|時|时/g,':00');
  const m=s.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/); if(!m)return null;
  let h=+m[1],mm=+(m[2]||0),ap=m[3]||''; if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;if(!ap&&h>=1&&h<=7)h+=12; return h*60+mm;
}
function minText(m){m=((m%1440)+1440)%1440;let h=Math.floor(m/60),mm=m%60,ap=h>=12?'PM':'AM';let hh=h%12;if(!hh)hh=12;return `${hh}:${String(mm).padStart(2,'0')} ${ap}`}
function timeInputValue(t){
  const m=timeToMin(t);
  if(m===null) return '';
  const h=Math.floor(m/60), mm=m%60;
  return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function timeInputDisplay(v){
  if(!v) return '';
  const m=String(v).match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return v;
  return minText((+m[1])*60+(+m[2]));
}
function readTimeField(id, fallback=''){
  const el=$(id);
  if(!el) return fallback;
  return timeInputDisplay(el.value) || fallback;
}
function sortByTime(a,b){const am=timeToMin(a.start||a.time),bm=timeToMin(b.start||b.time);if(am===null&&bm===null)return String(a.name||a.title).localeCompare(String(b.name||b.title));if(am===null)return 1;if(bm===null)return -1;return am-bm}
function nextFutureTime(preferred='6:30 PM'){
  const now=new Date(), cur=now.getHours()*60+now.getMinutes(); let pref=timeToMin(preferred)??1110;
  if(cur<pref-10)return minText(pref); let next=Math.ceil((cur+10)/30)*30; if(next>21*60)next=21*60; return minText(next);
}
function routineKey(r){return [r.day||'',norm(r.name),r.start||'',r.oneOffDate||''].join('|')}

function migrate(){
  let existing=readJSON(DATA_KEY,null);
  let data=existing || JSON.parse(JSON.stringify(DEFAULT_DATA));

  // Profile migration
  const p30=readJSON('cg_child_profile_v30',null);
  const old=readJSON('childgrowthai-v8',null);
  if(!existing){
    if(p30&&typeof p30==='object'){
      data.profile.childName=p30.childName||data.profile.childName;
      data.profile.year=p30.currentYear||data.profile.year;
      data.profile.age=p30.age||data.profile.age;
      data.profile.school=p30.school||data.profile.school;
      data.profile.region=p30.region||data.profile.region;
      data.profile.language=p30.mainLanguage||data.profile.language;
      data.profile.strengths=Array.isArray(p30.strengths)?p30.strengths:data.profile.strengths;
      data.profile.watchAreas=Array.isArray(p30.watchAreas)?p30.watchAreas:data.profile.watchAreas;
      data.profile.parentGoals=Array.isArray(p30.parentGoals)?p30.parentGoals:data.profile.parentGoals;
    } else if(old&&old.profile){
      data.profile.childName=old.profile.name||old.profile.childName||data.profile.childName;
      data.profile.year=old.profile.year||old.profile.currentYear||data.profile.year;
      data.profile.school=old.profile.school||data.profile.school;
    }
  }

  // Routine migration
  const routineSources=[
    readJSON('cg_v33_weekly_routines',[]),
    readJSON('cg_v24_custom_activities',[])
  ];
  const routineList=existing?.routines?.length?existing.routines:[];
  routineSources.flat().forEach(x=>{
    if(!x || typeof x!=='object')return;
    let r={
      id:x.id||('r_'+Date.now()+Math.random()),
      day:x.day||'Monday',
      name:x.name||x.title||'Activity',
      start:x.start||x.time||'',
      end:x.end||'',
      prep:x.prep||x.note||'',
      reminder:x.reminder||'前一晚 8:00 PM',
      impact:x.impact||'正常',
      oneOffDate:x.oneOffDate||'',
      source:x.source||'migrated'
    };
    if(!routineList.some(y=>routineKey(y)===routineKey(r)))routineList.push(r);
  });
  data.routines=routineList;

  // Tasks
  const taskSources=[readJSON('cg_v28_today_tasks',[]),readJSON('cg_today_tasks',[]),readJSON('cg_v45_today_tasks',[])];
  const tasks=existing?.todayTasks?.length?existing.todayTasks:[];
  taskSources.flat().forEach(x=>{
    if(!x||typeof x!=='object')return;
    const t={id:x.id||('task_'+Date.now()+Math.random()),date:x.date||todayISO(),title:x.title||x.name||x.task||'Today task',time:x.time||'',note:x.note||x.notes||''};
    if(!tasks.some(y=>y.id===t.id || (y.date===t.date&&y.title===t.title&&y.time===t.time)))tasks.push(t);
  });
  data.todayTasks=tasks;

  // Notices
  const ns=readJSON('cg_v44_school_notices',[]);
  const notices=existing?.schoolNotices?.length?existing.schoolNotices:[];
  ns.forEach(n=>{if(!notices.some(x=>x.id===n.id || (x.date===n.date&&x.title===n.title)))notices.push(n)});
  data.schoolNotices=notices;

  // Emotions
  const recs=readJSON('childgrowth_records',[]);
  const emotions=existing?.emotions?.length?existing.emotions:[];
  if(Array.isArray(recs)){
    recs.filter(x=>x.type==='emotion').forEach(x=>{
      emotions.push({id:x.id||('em_'+Date.now()+Math.random()),date:x.date||x.createdAt||new Date().toISOString(),mood:x.mood||x.value||'Normal',context:x.context||''});
    });
  }
  data.emotions=emotions.slice(-80);

  return data;
}
let app=migrate();
app.activityReports = Array.isArray(app.activityReports) ? app.activityReports : [];
app.captureHistory = Array.isArray(app.captureHistory) ? app.captureHistory : [];

save();

}

function routinesForDay(day, includeOneOff=true){
  const iso = DAYS.includes(day) ? null : day;
  const d = iso ? new Date(iso+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long'}) : day;
  return app.routines.filter(r=>r.day===d && (includeOneOff || !r.oneOffDate) && (!r.oneOffDate || !iso || r.oneOffDate===iso)).sort(sortByTime);
}
function todayTasks(){return app.todayTasks.filter(t=>!t.date||t.date===todayISO()).sort(sortByTime)}
function upcomingNotices(){const now=todayISO();return app.schoolNotices.filter(n=>!n.date||n.date>=now).sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999'))).slice(0,5)}
function rowHTML(title,small,actions=''){return `<div class="row"><div><b>${title}</b><small>${small||''}</small></div>${actions?`<div class="rowActions">${actions}</div>`:''}</div>`}
function freeWindows(day,items){
  const weekday=!['Saturday','Sunday'].includes(day); const start=weekday?15*60+30:9*60, end=20*60+30;
  const blocks=items.map(r=>{let s=timeToMin(r.start),e=timeToMin(r.end);if(s===null)return null;if(e===null||e<=s)e=s+60;return{s,e}}).filter(Boolean).sort((a,b)=>a.s-b.s);
  let cur=start,free=[];blocks.forEach(b=>{if(b.s>cur+20)free.push([cur,b.s]);cur=Math.max(cur,b.e)}); if(end>cur+20)free.push([cur,end]); return free;
}

function todaySummaryHTML(day, routines, tasks, notices){
  const mainSchool = routines.find(r=>/school|primary|返學|學校|学校/i.test(r.name||'')) || routines[0];
  const afterSchool = routines.filter(r=>r!==mainSchool).slice(0,2);

/* V62 Calendar / iPhone reminder export - clean ICS */
function icsEscape(s){
  const raw=String(s||'').replace(/\\n/g,'\n');
  return raw.replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
}
function pad2(n){return String(n).padStart(2,'0')}
function dateForDay(day){
  const today=new Date();
  const idx=DAYS.indexOf(day);
  if(idx<0) return today;
  const target=(idx+1)%7; // JS Sunday=0; our Monday index=0
  let diff=(target-today.getDay()+7)%7;
  if(diff===0) diff=7;
  const d=new Date(today); d.setDate(today.getDate()+diff); return d;
}
function parseTimeParts(t, fallback='09:00'){
  const m=timeToMin(t);
  const mins=m===null?timeToMin(fallback):m;
  return {h:Math.floor(mins/60),m:mins%60};
}
function icsDateTime(date, timeText){
  const p=parseTimeParts(timeText);
  return `${date.getFullYear()}${pad2(date.getMonth()+1)}${pad2(date.getDate())}T${pad2(p.h)}${pad2(p.m)}00`;
}
function icsStamp(){
  return new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
}
function icsTitle(s, fallback='Activity'){
  const cleaned=String(s||fallback).replace(/^[^A-Za-z0-9\u4e00-\u9fff]+/,'').trim();
  return cleaned || fallback;
}
function icsUID(id, prefix='childgrowthai'){
  return `${String(id||Date.now()).replace(/[^\w-]/g,'_')}@${prefix}`;
}
function icsBuild(lines){
  return lines.filter(x=>x!==null && x!==undefined && x!=='').join('\r\n') + '\r\n';
}
function downloadICS(filename, content){
  const blob=new Blob([content],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},800);
}
function safeICSFilename(name){
  return (icsTitle(name,'calendar_event')).replace(/[^\w\u4e00-\u9fff]+/g,'_')+'.ics';
}
function addDays(date, days){
  const d=new Date(date);
  d.setDate(d.getDate()+days);
  return d;
}
function formalEventAlarms(title){
  // Formal event keeps the useful 1-hour reminder.
  return [
    'BEGIN:VALARM',
    'TRIGGER:-PT60M',
    'ACTION:DISPLAY',
    `DESCRIPTION:${icsEscape('1小時後：'+title)}`,
    'END:VALARM'
  ];
}
function prepEventLines(baseId, title, eventDate, prep='', repeatWeekly=false){
  // V72: Instead of relying on iOS "1 day before", create a real separate prep event at previous 8:00 PM.
  const prepDate=addDays(eventDate,-1);
  const prepTitle='準備：'+title;
  const prepText=prep || '檢查書包、水樽、功課、制服/活動用品。';
  return [
    'BEGIN:VEVENT',
    `UID:${icsUID(baseId+'-prep','prep.childgrowthai')}`,
    `DTSTAMP:${icsStamp()}`,
    `SUMMARY:${icsEscape(prepTitle)}`,
    `DTSTART:${icsDateTime(prepDate,'8:00 PM')}`,
    `DTEND:${icsDateTime(prepDate,'8:05 PM')}`,
    repeatWeekly?'RRULE:FREQ=WEEKLY':'',
    `DESCRIPTION:${icsEscape('前一晚8:00準備提醒\\n活動：'+title+'\\n準備：'+prepText+'\\n由 ChildGrowth AI 匯出')}`,
    'BEGIN:VALARM',
    'TRIGGER:PT0M',
    'ACTION:DISPLAY',
    `DESCRIPTION:${icsEscape(prepTitle+'｜'+prepText)}`,
    'END:VALARM',
    'END:VEVENT'
  ];
}
function eventAlarms(title, prep='', startTime='09:00'){
  // Kept for compatibility. Formal event only uses 1-hour reminder.
  return formalEventAlarms(title);
}
function calendarForRoutine(id){
  const r=app.routines.find(x=>String(x.id)===String(id));
  if(!r){alert('找不到行程');return;}
  const title=icsTitle(r.name||'Activity','Activity');
  const dt = r.oneOffDate ? new Date(r.oneOffDate+'T12:00:00') : dateForDay(r.day);
  const start=icsDateTime(dt,r.start||'09:00');
  const end=icsDateTime(dt,r.end||r.start||'10:00');
  const repeatWeekly=!r.oneOffDate;
  const prep=r.prep||'';
  const desc=`正式活動：${title}\n準備：${prep||'請檢查需要帶的物品'}\n前一晚8:00會另有「準備：${title}」提醒\n由 ChildGrowth AI 匯出`;
  const lines=[
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'PRODID:-//ChildGrowthAI//Calendar//EN',
    'BEGIN:VEVENT',
    `UID:${icsUID(r.id,'routine.childgrowthai')}`,
    `DTSTAMP:${icsStamp()}`,
    `SUMMARY:${icsEscape(title)}`,
    `DTSTART:${start}`,
    `DTEND:${end}`,
    repeatWeekly?'RRULE:FREQ=WEEKLY':'',
    `DESCRIPTION:${icsEscape(desc)}`,
    ...formalEventAlarms(title),
    'END:VEVENT',
    ...prepEventLines(r.id,title,dt,prep,repeatWeekly),
    'END:VCALENDAR'
  ];
  downloadICS(safeICSFilename(title+'_with_prep'),icsBuild(lines));
}
function calendarForNotice(id){

    'BEGIN:VEVENT',

function calendarForTask(id){

function v60RoutineKey(r){
  return norm((r.day||'')+'_'+(r.name||'').replace(/[^\w\u4e00-\u9fff]+/g,'')+'_'+(r.start||''));
}
function v60RestoreJaniceRoutines(force=false){
  try{
    app.routines = Array.isArray(app.routines) ? app.routines : [];
    const child = String(app.profile?.childName || '').toLowerCase();
    const isJanice = child.includes('janice') || child.includes('珍妮') || child==='';
    if(!isJanice && !force) return false;

    // Correct accidental old school name if present.
    app.routines.forEach(r=>{
      if(/all\s*prime/i.test(r.name||'')) r.name='🏫 Oakleigh South Primary School';
    });

    const defaults = v60JaniceDefaultRoutines();
    const existing = new Set(app.routines.map(v60RoutineKey));
    let added = 0;

    const hasWeekdaySchool = ['Monday','Tuesday','Wednesday','Thursday','Friday'].every(day =>
      app.routines.some(r => r.day===day && /school|primary|oakleigh/i.test(r.name||''))
    );

    // If weekday school is missing, restore all core defaults. If force, restore missing defaults.
    if(force || !hasWeekdaySchool || app.routines.length===0){
      defaults.forEach((d,idx)=>{
        const item={...d,id:'v60_'+idx+'_'+Date.now(),source:'v60-restore'};
        const key=v60RoutineKey(item);
        if(!existing.has(key)){
          app.routines.push(item);
          existing.add(key);
          added++;
        }
      });
    }
    if(added>0){ save(); return true; }
    return false;
  }catch(e){
    console.warn('v60 routine restore failed', e);
    return false;
  }
}
function v60ManualRestoreRoutines(){
  const ok = confirm('要修復 Janice 預設固定行程嗎？會補回 Monday–Friday school、Thursday swimming、Friday chess、Saturday Chinese 等；不會刪除你現有資料。');

}

  card.querySelectorAll('#activityFileWrap,.coachVoiceBox,.voiceMiniBox,#activityNote,#v54ActivityFile,#v54ActivityNote').forEach(el=>el.remove());

function v60BindActivityClicks(){
  document.addEventListener('click', function(e){
    const btn=e.target.closest && e.target.closest('#modePhoto,#modeVideo,#modeVoice,#modeCoach');
    if(!btn) return;
    const map={modePhoto:'photo',modeVideo:'video',modeVoice:'voice',modeCoach:'coach'};
    if(map[btn.id] && typeof window.setActivityMode==='function'){
      e.preventDefault();
      e.stopPropagation();
      window.setActivityMode(map[btn.id]);
      v60HardCleanActivityDom();
      return false;
    }
  }, true);
}

/* V58 clean Activity Progress + shared voice dictation */
let v58ActivityMode = 'photo';
let v58ActivityImage = '';
let v58ActivityVideoFrames = [];
let v58Recognition = null;
let v58VoiceTimer = null;
let v58VoiceStatusId = null;

function v58Status(id, text, mode=''){
  const el=$(id);
  if(!el) return;
  el.className='activityStatusLine ' + (mode==='live'?'live':mode==='warn'?'warn':'');
  el.innerHTML=text;
}
function v58AppendText(textareaId, text){
  const area=$(textareaId);
  if(!area || !text) return;
  const current=area.value.trim();
  area.value=current ? current + '\n' + text.trim() : text.trim();
  area.dispatchEvent(new Event('input',{bubbles:true}));
}
function v53StartDictation(textareaId, statusId, langSelectId, label='語音輸入'){
  const SR=window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    v58Status(statusId,'⚠️ 呢個 browser 暫時唔支援語音，請直接打字。','warn');
    return;
  }
  v53StopDictation(false);
  v58VoiceStatusId=statusId;
  const lang=($(langSelectId)?.value)||'zh-HK';
  v58Recognition=new SR();
  v58Recognition.lang=lang;
  v58Recognition.interimResults=true;
  v58Recognition.continuous=false;
  v58Recognition.maxAlternatives=1;
  let finalText='';
  let interimText='';
  v58Status(statusId,`🎙️ 正在聽 ${label}，可以中英夾雜，最多約 25 秒。`,'live');

  v58VoiceTimer=setTimeout(()=>{
    const text=(finalText || interimText || '').trim();
    try{v58Recognition && v58Recognition.stop();}catch(e){}
    if(text){
      v58AppendText(textareaId,text);
      v58Status(statusId,'✅ 已加入語音文字，請檢查後再儲存 / Analyze。','live');
    }else{
      v58Status(statusId,'⚠️ 未聽到清楚內容，可以再試一次或直接打字。','warn');
    }
    v58Recognition=null;
  },25000);

  v58Recognition.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const part=e.results[i][0].transcript || '';
      if(e.results[i].isFinal) finalText += part;
      else interim += part;
    }
    interimText=interim;
    const display=(finalText || interim || '').trim();
    if(display) v58Status(statusId,'🎙️ 聽到：'+esc(display),'live');
  };
  v58Recognition.onerror=(e)=>{
    clearTimeout(v58VoiceTimer);
    v58Recognition=null;
    v58Status(statusId,'⚠️ 語音輸入未成功：'+esc(e.error||'unknown')+'。可以再試或直接打字。','warn');
  };
  v58Recognition.onend=()=>{
    clearTimeout(v58VoiceTimer);
    const text=(finalText || interimText || '').trim();
    if(text){
      v58AppendText(textareaId,text);
      v58Status(statusId,'✅ 已加入語音文字，請檢查後再儲存 / Analyze。','live');
    }else{
      v58Status(statusId,'語音已停止。如未加入文字，可以再試一次。','warn');
    }
    v58Recognition=null;
  };
  try{v58Recognition.start();}catch(e){
    v58Recognition=null;
    v58Status(statusId,'⚠️ 語音功能啟動失敗，請直接打字。','warn');
  }
}
function v53StopDictation(show=true){
  if(v58VoiceTimer) clearTimeout(v58VoiceTimer);
  v58VoiceTimer=null;
  try{ if(v58Recognition) v58Recognition.stop(); }catch(e){}
  v58Recognition=null;
  if(show && v58VoiceStatusId) v58Status(v58VoiceStatusId,'已停止語音。','warn');
}
function v53ClearTextarea(textareaId, statusId){
  const area=$(textareaId);
  if(area) area.value='';
  v58Status(statusId,'已清空。可以重新語音輸入或打字。');
}

function extractVideoFrames(file,count=3){
  return new Promise((resolve,reject)=>{
    const video=document.createElement('video');
    const url=URL.createObjectURL(file);
    video.src=url;
    video.muted=true;
    video.playsInline=true;
    video.preload='metadata';
    const frames=[];
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    video.onloadedmetadata=()=>{
      const dur=Math.min(video.duration || 1, 20);
      const times=[dur*0.2,dur*0.5,dur*0.8].map(x=>Math.max(0.1,Math.min(dur-0.1,x)));
      let i=0;
      const grab=()=>{ if(i>=Math.min(count,times.length)){URL.revokeObjectURL(url);resolve(frames);return;} video.currentTime=times[i++]; };
      video.onseeked=()=>{
        canvas.width=Math.min(video.videoWidth || 640, 900);
        canvas.height=Math.round(canvas.width*((video.videoHeight||360)/(video.videoWidth||640)));
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        frames.push(canvas.toDataURL('image/jpeg',0.78));
        grab();
      };
      grab();
    };
    video.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('video load failed'));};
  });
}

function parseNaturalDate(text){
  const now=new Date(); const t=String(text||''); const l=t.toLowerCase(); const fmt=d=>d.toISOString().slice(0,10);
  if(/today|今日|今天/.test(l))return fmt(now); if(/tomorrow|聽日|明天/.test(l)){let d=new Date(now);d.setDate(d.getDate()+1);return fmt(d)}
  const map=[['monday',1,'星期一'],['tuesday',2,'星期二'],['wednesday',3,'星期三'],['thursday',4,'星期四'],['friday',5,'星期五'],['saturday',6,'星期六'],['sunday',0,'星期日']];
  for(const [en,idx,cn] of map){if(l.includes(en)||t.includes(cn)){let d=new Date(now),diff=(idx-d.getDay()+7)%7;if(/next|下個|下星期|下周/.test(l+t)||diff===0)diff+=7;d.setDate(d.getDate()+diff);return fmt(d)}}
  let m=t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/); if(m){let y=m[3]?+m[3]:now.getFullYear(); if(y<100)y+=2000; return fmt(new Date(y,+m[2]-1,+m[1]));}
  return '';
}
function fallbackNotice(text){

  if(/ice\s*pops?|icy\s*pole|雪條|冰條/.test(l))title='Ice pops / icy pole event';
  else if(/dress|costume|book week|打扮/.test(l))title='Dress up / Book Week event';
  else if(/excursion|incursion|camp|旅行/.test(l))title='Excursion / school activity';
  else if(/photo|照片|相/.test(l))title='School photo day';
  const money=(text.match(/\$\s?\d+(?:\.\d{1,2})?|\d+\s?(?:dollars?|元|蚊)/i)||[])[0]||'';
  const bring=[]; if(money)bring.push(money); if(/dress|costume|打扮/.test(l))bring.push('dress-up / costume'); if(/water|水樽|snack|hat|帽/.test(l))bring.push('water bottle / snack / hat if needed');
  return {id:'notice_'+Date.now(),title,date:parseNaturalDate(text),time:(text.match(/(\d{1,2}(?::\d{2})?\s?(?:am|pm|AM|PM))/)||[])[1]||'',category:money?'payment':'school event',bringItems:bring.length?bring:['請按通知內容準備'],payment:money,deadline:'',reminders:['前一晚 8:00 PM','當日早上 7:30 AM'],confidence:parseNaturalDate(text)?'medium':'low',summary:text.slice(0,320),parentAction:bring.length?'準備：'+bring.join('、'):'請檢查通知日期和要帶物品'};
}

async function bindHomeworkFiles(){
  const f=$('hwFile');
  if(!f) return;
  f.onchange=async e=>{
    const files=[...(e.target.files||[])].slice(0,6);
    homeworkImages=[];
    homeworkImage='';
    $('hwPreviewGrid').innerHTML='';
    if($('hwImageInfo')) {$('hwImageInfo').style.display='block';$('hwImageInfo').textContent='正在準備圖片...';}
    if(!files.length) return;
    let info=[];
    for(const file of files){
      try{
        const data=await compressImageFile(file,1500,0.76);
        homeworkImages.push(data);
        if(!homeworkImage) homeworkImage=data;
        const img=document.createElement('img');
        img.src=data;
        $('hwPreviewGrid').appendChild(img);
        info.push(`${file.name||'image'}：${Math.round(file.size/1024)}KB → ${Math.round(data.length/1024)}KB`);
      }catch(err){
        const data=await fileToDataURL(file);
        homeworkImages.push(data);
        if(!homeworkImage) homeworkImage=data;
        const img=document.createElement('img');
        img.src=data;
        $('hwPreviewGrid').appendChild(img);
        info.push(`${file.name||'image'}：未能壓縮，使用原圖`);
      }
    }
    const sendCount=Math.min(homeworkImages.length,3);

    if($('hwImageInfo')) $('hwImageInfo').textContent=`已準備 ${homeworkImages.length} 張；會送頭 ${sendCount} 張去 AI。估計傳送大小：${kb}KB\n`+info.join('\n');
    $('hwStatus').innerHTML=`<div class="notice good">已選擇 ${homeworkImages.length} 張圖片。V65 會先壓縮再分析；如果 3 張仍失敗，請試「只分析第一張」。</div>`;
  };
}
function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=ev=>resolve(ev.target.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
function compressImageFile(file,maxDim=1500,quality=0.76){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=reject;
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        const scale=Math.min(1, maxDim/Math.max(w,h));
        w=Math.round(w*scale); h=Math.round(h*scale);
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#fff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject;
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function sectionBetween(raw, startMarkers, endMarkers){
  const text=String(raw||'');
  let start=-1, marker='';
  for(const m of startMarkers){
    const i=text.indexOf(m);
    if(i>=0 && (start<0 || i<start)){start=i; marker=m;}
  }
  if(start<0) return '';
  let from=start+marker.length;
  let end=text.length;
  for(const m of endMarkers){
    const i=text.indexOf(m, from);
    if(i>=0 && i<end) end=i;
  }
  return text.slice(from,end).replace(/^[:：\s-]+/,'').trim();
}
function bulletsFrom(section, max=4){
  return String(section||'')
    .split(/\n+/)
    .map(x=>x.replace(/^[\s\-•*]+/,'').trim())
    .filter(Boolean)
    .slice(0,max);
}
function firstUsefulLine(section){
  return String(section||'').split(/\n+/).map(x=>x.replace(/^[\s\-•*]+/,'').trim()).find(Boolean)||'';
}

function v67IsActuallyPositiveLine(line){
  const s=String(line||'');
  // Error wording wins over positive wording.
  if(/明確錯|需家長確認|需要覆核|應該係|應為|應是|正確應該|Janice 寫\s*\d+|AI 疑似讀到|疑似錯|計錯|錯誤/.test(s)) return false;
  // Positive / no-error wording should never stay inside review points.
  return /答對|答啱|正確|寫得正確|答案正確|已做對|全部正確|成功推算|順利找到|未見錯誤|暫時未見到錯誤|未見到錯誤|值得肯定|做得好|right|correct/i.test(s);
}
function v68IsClearErrorLine(line){
  const s=String(line||'');
  return /正確應該係|應該係|應為|應是|Janice\s*寫|寫\s*\d+|明確錯/.test(s) && /[0-9]/.test(s);
}
function v67SoftenReviewLine(line){
  let s=String(line||'').trim();
  if(!s) return '';
  if(v68IsClearErrorLine(s)){
    return s.replace(/請家長確認：/g,'').replace(/【需家長確認】/g,'【明確錯】');
  }
  s=s.replace(/明顯計錯/g,'AI 視覺疑似需要家長確認');
  s=s.replace(/明確計錯/g,'AI 視覺疑似需要家長確認');
  s=s.replace(/計錯/g,'疑似需覆核');
  s=s.replace(/Janice 寫/g,'AI 疑似讀到 Janice 寫');
  if(!/家長|覆核|確認|看不清|不清|疑似/.test(s)){
    s='請家長確認：'+s;
  }
  return s;
}
function v69ClassifyReviewLine(line){
  const s=String(line||'').trim();
  if(!s) return 'empty';
  if(v67IsActuallyPositiveLine(s)) return 'positive';
  if(/未見錯誤|暫時未見到錯誤|其餘答案|都能清楚看到|大部分.*正確/.test(s)) return 'positive';
  if(/明確錯|正確應該係|應該係|應為|應是|Janice\s*寫|寫\s*\d+/.test(s) && /[0-9]/.test(s)) return 'review';
  if(/需家長確認|看不清|不清楚|未完成|漏|空白/.test(s)) return 'review';
  return 'review';
}
function v67CleanReviewPoints(points){
  const movedToGood=[];
  const review=[];
  (Array.isArray(points)?points:[]).forEach(p=>{
    const s=String(p||'').trim();
    if(!s) return;
    const cls=v69ClassifyReviewLine(s);
    if(cls==='positive'){
      movedToGood.push(s.replace(/^[-•\s]+/,''));
    }else if(cls==='review'){
      review.push(v67SoftenReviewLine(s));
    }
  });
  return {review,movedToGood};
}


function v70NormalizeLine(line){
  return String(line||'').replace(/\*\*/g,'').replace(/\s+/g,' ').trim();
}
function v70LineClass(line, source=''){
  const s=v70NormalizeLine(line);
  if(!s) return 'empty';
  // Error / review wins over positive wording when the line explicitly says the correct answer is different.
  if(/明確錯|正確應該係|正確應是|正確是|應該係|應為|應是|答案應該|答案應為/.test(s) && /[0-9]/.test(s)) return 'review';
  if(/Janice\s*(寫|答).{0,12}\d+/.test(s) && /(正確應該|應該係|應為|應是|明確錯)/.test(s)) return 'review';
  if(/需家長確認|需要家長確認|看不清|睇唔清|不清楚|未完成|漏做|空白|未填|漏填/.test(s)) return 'review';
  // Positive / no-error wording must not stay in review.
  if(/答對|答啱|寫得正確|答案正確|正確完成|已做對|全部正確|成功推算|順利找到|未見錯誤|暫未見錯誤|暫時未見到錯誤|未見到錯誤|都正確|做得好|值得肯定|right|correct/i.test(s)) return 'good';
  // If AI writes "其餘答案..." with no-error wording, it is not a review item.
  if(/其餘答案|其他答案|大部分答案/.test(s) && /正確|未見錯|清楚/.test(s)) return 'good';
  // Ambiguous line from the review section remains review; ambiguous line from strengths remains good.
  return source==='review' ? 'review' : 'good';
}
function v70ReviewLine(line){
  let s=v70NormalizeLine(line);
  if(!s) return '';
  if(/明確錯|需家長確認/.test(s)) return s;
  if(/正確應該係|正確應是|正確是|應該係|應為|應是|答案應該|答案應為/.test(s) && /[0-9]/.test(s)){
    return '【明確錯】 '+s;
  }
  if(/看不清|睇唔清|不清楚|未完成|漏做|空白|未填|漏填/.test(s)){
    return '【需家長確認】 '+s;
  }
  return '【需家長確認】 '+s;
}
function v70Unique(arr){
  const seen=new Set();
  return (arr||[]).map(v70NormalizeLine).filter(Boolean).filter(x=>{
    const key=x.toLowerCase();
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
}
function v70SanitizeHomeworkReport(r){
  r=r||{};
  const goods=[];
  const reviews=[];
  const sourceGood=Array.isArray(r.strengths)?r.strengths:bulletsFrom(r.strengths||'',4);
  const sourceReview=Array.isArray(r.checkPoints)?r.checkPoints:bulletsFrom(r.checkPoints||'',6);
  sourceGood.forEach(line=>{
    const cls=v70LineClass(line,'good');
    if(cls==='review') reviews.push(v70ReviewLine(line));
    else if(cls==='good') goods.push(v70NormalizeLine(line));
  });
  sourceReview.forEach(line=>{
    const cls=v70LineClass(line,'review');
    if(cls==='good') goods.push(v70NormalizeLine(line));
    else if(cls==='review') reviews.push(v70ReviewLine(line));
  });
  r.strengths=v70Unique(goods).slice(0,6);
  r.checkPoints=v70Unique(reviews).slice(0,6);
  return r;
}

function normalizeHomeworkReport(data, text, imageCount){
  if(data?.report){
    const r=data.report;
    r.rawAnalysis = r.rawAnalysis || r.fullAnalysis || r.analysis || '';
    r.shortSummary = r.shortSummary || String(r.summary||'').slice(0,180);
    return r;
  }
  const raw=data?.analysis || data?.output || data?.summary || '';
  if(raw){
    const level=sectionBetween(raw,['🌟 0. Learning level awareness','0. Learning level awareness','Learning level awareness'],['📌 1.','1. 我大約','⚠️ 2.']);
    const content=sectionBetween(raw,['📌 1. 我大約睇到嘅功課內容','1. 我大約睇到嘅功課內容','我大約睇到嘅功課內容'],['⚠️ 2.','✅ 2b.','🧠 3.']);
    const check=sectionBetween(raw,['⚠️ 2. 需要覆核的位置','2. 需要覆核的位置','需要覆核的位置'],['✅ 2b.','🧠 3.','💬 4.']);
    const good=sectionBetween(raw,['✅ 2b. 已做得好的地方','2b. 已做得好的地方','已做得好的地方'],['🧠 3.','💬 4.','📈 5.']);
    const reason=sectionBetween(raw,['🧠 3. 可能出錯原因','3. 可能出錯原因','可能出錯原因'],['💬 4.','📈 5.','✅ 6.']);
    const parent=sectionBetween(raw,['💬 4. 給家長的簡短解讀','4. 給家長的簡短解讀','給家長的簡短解讀'],['📈 5.','✅ 6.']);
    const tips=sectionBetween(raw,['✅ 6. 下次做題小貼士','6. 下次做題小貼士','下次做題小貼士'],[]);
    const reportObj={
      title:'AI 功課分析',
      shortSummary:firstUsefulLine(parent)||firstUsefulLine(level)||raw.slice(0,180),
      summary:content || raw.slice(0,360),
      levelAwareness:level || '已按圖片內容和目前年級作初步觀察；詳情見完整分析。',
      strengths:bulletsFrom(good,4),
      checkPoints:bulletsFrom(check,6),
      reasons:bulletsFrom(reason,5),
      parentInterpretation:parent,
      nextStep:firstUsefulLine(tips)||'今晚只揀一題最有代表性的題目慢慢講解。',
      confidence:'medium',
      rawAnalysis:raw
    };
    return v70SanitizeHomeworkReport(reportObj);
  }
  return homeworkFallbackReport(text,imageCount,'AI 回傳格式不完整。');
}
async function sendHomeworkToAI(imagesToSend){
  const text=$('hwText').value.trim();
  const payload={
    text,
    note:text,
    images:imagesToSend,
    image:imagesToSend[0]||'',
    imageDataList:imagesToSend,
    subject:'Homework',
    status:'uploaded',
    child:{name:app.profile.childName,year:app.profile.year},
    learningContext:{
      childCurrentYear:app.profile.year,
      childName:app.profile.childName,
      instruction:'Please compare worksheet level detected from image with child current year, and return a complete parent-friendly homework report.'
    }
  };
  const res=await fetch('/.netlify/functions/analyze-homework',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  const raw=await res.text();
  let data={};
  try{ data=JSON.parse(raw||'{}'); }catch(e){ data={error:'Function did not return JSON', raw:raw.slice(0,300)}; }
  if(!res.ok) throw new Error(data.error || data.detail || data.message || data.raw || ('AI function failed: HTTP '+res.status));
  return data;
}
async function runHomeworkAnalysis(imagesToSend, modeLabel){
  const text=$('hwText').value.trim();

  const baseRecord={id:'hw_'+Date.now(),date:new Date().toISOString(),imageCount:imagesToSend.length,note:text};
  try{
    const data=await sendHomeworkToAI(imagesToSend);
    const report=normalizeHomeworkReport(data,text,imagesToSend.length);
    app.homeworkReports.push({...baseRecord,report,offline:false,route:data.route,model:data.model});
    save();
    renderHomework();
    setTimeout(()=>viewHomeworkReport(baseRecord.id, true),80);

/* V61 Smart Prep Suggestions */
function v61SmartPrepItems(activityName=''){
  const s=String(activityName||'').toLowerCase();
  const rules=[
    {keys:['basketball','籃球'],items:['水樽','運動鞋 / basketball shoes','毛巾','snack','替換衣服']},
    {keys:['soccer','football','足球'],items:['水樽','足球鞋 / 運動鞋','shin pads','毛巾','snack','外套']},
    {keys:['swim','swimming','游水','泳'],items:['泳衣','毛巾','goggles','水樽','拖鞋','膠袋放濕衫']},
    {keys:['tennis','網球'],items:['網球拍','水樽','運動鞋','帽','防曬','毛巾','snack']},
    {keys:['piano','琴','鋼琴'],items:['琴書','功課簿','鉛筆','記錄本','水樽']},
    {keys:['chess','棋'],items:['chess book','鉛筆','水樽','snack']},
    {keys:['chinese','中文','普通話','粵語'],items:['中文書','功課','鉛筆袋','水樽']},
    {keys:['coding','minecraft','編程'],items:['iPad / laptop 如需要','login 資料','耳機','水樽','snack']},
    {keys:['art','畫','drawing','painting'],items:['畫簿','鉛筆袋','圍裙 / 舊衫','作品袋','水樽']},
    {keys:['dance','ballet','跳舞','芭蕾'],items:['舞衣','舞鞋','水樽','毛巾','替換衣服']},
    {keys:['gym','gymnastics','體操'],items:['運動服','水樽','毛巾','snack','頭髮綁好']},
    {keys:['school','primary','學校','返學'],items:['書包','lunch box','水樽','帽','reader bag']},
  ];
  for(const r of rules){
    if(r.keys.some(k=>s.includes(k))) return r.items;
  }
  if(/ball|sport|training|class|lesson|club|運動|訓練|球/.test(s)){
    return ['水樽','運動鞋','毛巾','snack','替換衣服'];
  }
  return ['水樽','snack','相關功課 / 教材','外套'];
}
function v61SmartImpact(activityName=''){
  const s=String(activityName||'').toLowerCase();
  if(/swim|soccer|football|basketball|tennis|dance|gym|運動|游水|足球|籃球|網球|體操/.test(s)) return '輕量功課日';
  return '正常';
}
function v61ApplyPrepSuggestion(force=false){
  const nameEl=$('rName');
  const prepEl=$('rPrep');
  const impactEl=$('rImpact');
  const reminderEl=$('rReminder');
  if(!nameEl || !prepEl) return;
  const name=nameEl.value.trim();
  if(!name) return;
  const suggestion=v61SmartPrepItems(name).join('、');
  const shouldFill = force || !prepEl.value.trim() || prepEl.dataset.autoPrep==='1';
  if(shouldFill){
    prepEl.value=suggestion;
    prepEl.dataset.autoPrep='1';
  }
  if(impactEl && (!impactEl.value || force)) impactEl.value=v61SmartImpact(name);
  if(reminderEl && (!reminderEl.value.trim() || force)) reminderEl.value='前一晚 8:00 PM';
  v61ShowPrepSuggestion(name, suggestion);
}
function v61ShowPrepSuggestion(name, suggestion){
  const anchor=$('rPrep');
  if(!anchor) return;
  let box=$('v61PrepSuggestBox');
  if(!box){
    box=document.createElement('div');
    box.id='v61PrepSuggestBox';
    box.className='prepSuggestBox';
    anchor.parentNode.insertBefore(box, anchor.nextSibling);
  }
  const chips=suggestion.split('、').filter(Boolean).map(x=>`<button type="button" class="prepChip" onclick="v61AddPrepChip('${String(x).replace(/'/g,"\\'")}')">${esc(x)}</button>`).join('');
  box.innerHTML=`AI 建議準備物品：${esc(suggestion)}<small>根據活動名稱「${esc(name)}」自動建議；可以自己改。</small><div class="prepChipRow">${chips}</div>`;
}
function v61AddPrepChip(item){
  const prepEl=$('rPrep');
  if(!prepEl) return;
  const arr=prepEl.value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean);
  if(!arr.includes(item)) arr.push(item);
  prepEl.value=arr.join('、');
  prepEl.dataset.autoPrep='0';
}
function v61BindSmartPrep(){
  const nameEl=$('rName');
  const prepEl=$('rPrep');
  if(!nameEl || nameEl.v61Bound) return;
  nameEl.v61Bound=true;
  nameEl.addEventListener('input',()=>v61ApplyPrepSuggestion(false));
  nameEl.addEventListener('change',()=>v61ApplyPrepSuggestion(false));
  if(prepEl){prepEl.addEventListener('input',()=>{prepEl.dataset.autoPrep='0';});}
  setTimeout(()=>v61ApplyPrepSuggestion(false),60);
}
