<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#eff6ff" />
  <title>ChildGrowth AI v52 Splash Timeout + Purple Cover</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#f4f8ff;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbeafe;
      --blue:#2563eb;--purple:#7c3aed;--pink:#db2777;--green:#15803d;--orange:#9a3412;
      --soft-blue:#eff6ff;--soft-purple:#f5f3ff;--soft-green:#ecfdf5;--soft-orange:#fff7ed;
      --shadow:0 16px 45px rgba(15,23,42,.07);--r:28px;--navh:86px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC","PingFang TC",sans-serif;
      font-weight:800;-webkit-font-smoothing:antialiased;padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom));
    }
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .app{max-width:860px;margin:0 auto;}
    .top{
      display:none!important;
    }
    .brand{font-size:34px;font-weight:1000;letter-spacing:-.06em;line-height:1}
    .sub{font-size:16px;color:var(--muted);font-weight:900;margin-top:7px;line-height:1.25}
    .version{font-size:13px;color:var(--muted);font-weight:900;margin-top:4px}
    .page{display:none;padding:calc(14px + env(safe-area-inset-top)) 16px 28px}.page.active{display:block}
    .card{
      background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);
      padding:18px;margin:14px 0;box-shadow:var(--shadow);overflow:hidden;
    }
    .card h2{font-size:28px;margin:0 0 8px;letter-spacing:-.05em;color:var(--ink)}
    .card h3{font-size:21px;margin:16px 0 8px;letter-spacing:-.04em;color:var(--ink)}
    .muted{color:var(--muted);line-height:1.45;font-weight:850}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .metric{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:14px;min-width:0}
    .metric b{display:block;color:var(--pink);font-size:30px;line-height:1.05;word-break:break-word}
    .metric span{display:block;color:var(--muted);font-size:13px;margin-top:5px;font-weight:900}
    .notice,.insight{
      border-radius:18px;padding:12px;margin-top:12px;line-height:1.45;font-weight:900
    }
    .insight{background:#ecfeff;border:1px solid #67e8f9;color:#155e75}
    .notice{background:var(--soft-orange);border:1px solid #fed7aa;color:var(--orange)}
    .good{background:var(--soft-green);border:1px solid #bbf7d0;color:var(--green)}
    .bluebox{background:var(--soft-blue);border:1px solid #bfdbfe;color:#1e3a8a}
    label{display:block;color:var(--muted);font-weight:950;margin:12px 0 6px}
    input,textarea,select{
      width:100%;border:1px solid #e5e7eb;border-radius:18px;background:#fff;padding:14px 15px;
      color:var(--ink);outline:none;font-weight:850;min-height:54px;
    }
    textarea{min-height:120px;resize:vertical}
    input:focus,textarea:focus,select:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(147,197,253,.22)}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .btn{
      border:1px solid #dbeafe;background:#fff;color:#1d4ed8;border-radius:999px;
      padding:10px 14px;font-weight:1000;width:auto;margin:0;white-space:nowrap;
    }
    .btn.primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none}
    .btn.danger{background:#fee2e2;color:#991b1b;border:none}
    .btn.soft{background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe}
    .row{
      background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:12px;margin-top:10px;
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;
    }
    .row b{color:var(--ink);font-weight:1000}
    .row small{display:block;color:var(--muted);line-height:1.45;margin-top:4px;font-weight:850}
    .rowActions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
    .chip{display:inline-flex;align-items:center;border-radius:999px;background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;padding:6px 10px;margin:4px 4px 0 0;font-size:13px;font-weight:950}
    .bottomnav{
      position:fixed;left:0;right:0;bottom:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
      border-top:1px solid #e5e7eb;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
      display:flex;justify-content:center;gap:6px;
    }
    .navbtn{
      border:0;background:transparent;color:#64748b;border-radius:24px;padding:8px 9px;min-width:64px;font-weight:1000;
      display:flex;flex-direction:column;align-items:center;gap:3px;font-size:14px
    }
    .navbtn .ico{font-size:24px;line-height:1}
    .navbtn.active{background:#eef2ff;color:#3730a3}
    .modal{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.38);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
    .modal.show{display:flex}
    .sheet{width:min(100%,860px);max-height:88vh;overflow:auto;background:#fff;border-radius:30px 30px 0 0;padding:20px 16px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -24px 70px rgba(15,23,42,.22)}
    .sheetHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
    .sheetHead h2{margin:0;font-size:26px;letter-spacing:-.04em}
    .weekDay{background:#f8fafc;border:1px solid #e5e7eb;border-radius:20px;padding:12px;margin-top:10px}
    .weekDay.today{background:#eff6ff;border-color:#93c5fd}
    .weekHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.weekTitle{font-size:18px;font-weight:1000}
    .count{border:1px solid #c7d2fe;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:950}
    .collapsed .weekDay:not(.today):not(.hasItems){display:none}
    .preview{max-width:100%;max-height:260px;border:1px solid #e5e7eb;border-radius:18px;object-fit:contain;background:#f8fafc;margin-top:10px;display:none}
    .hidden{display:none!important}
    @media(max-width:430px){
      .brand{font-size:30px}.card{border-radius:24px;padding:16px}.card h2{font-size:24px}
      .grid,.grid3{grid-template-columns:1fr}.navbtn{min-width:56px;font-size:13px}
      .row{align-items:flex-start}.metric b{font-size:25px}
    }
  
    input[type="time"]{
      -webkit-appearance:none;
      appearance:none;
      min-height:56px;
      letter-spacing:.02em;
      background:#fff;
    }
    .top .version{display:none!important}

  
    /* V48 UI Polish + Report Quality */
    body{font-weight:760}
    .card{padding:17px;margin:13px 0}
    .card h2{font-size:25px;line-height:1.12}
    .card h3{font-size:19px;line-height:1.18}
    .muted{font-size:15px}
    .heroSummary{
      background:linear-gradient(135deg,#eff6ff,#f5f3ff);
      border:1px solid #bfdbfe;
      border-radius:22px;
      padding:14px;
      margin-top:14px;
    }
    .heroSummary .big{
      font-size:20px;
      font-weight:1000;
      letter-spacing:-.04em;
      color:#0f172a;
      line-height:1.25;
    }
    .heroSummary .subline{
      color:#475569;
      font-weight:850;
      line-height:1.45;
      margin-top:7px;
    }
    .priorityStrip{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .priority{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:999px;
      padding:7px 10px;
      color:#334155;
      font-size:13px;
      font-weight:950;
    }
    .reportBlock{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:20px;
      padding:13px;
      margin-top:10px;
    }
    .reportBlock b{
      display:block;
      color:#0f172a;
      font-size:17px;
      margin-bottom:6px;
    }
    .reportBlock ul{
      margin:8px 0 0 20px;
      padding:0;
      color:#475569;
      font-weight:820;
      line-height:1.5;
    }
    .reportBlock li{margin:4px 0}
    .sectionTag{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:5px 9px;
      background:#ecfeff;
      border:1px solid #67e8f9;
      color:#155e75;
      font-size:12px;
      font-weight:950;
      margin-bottom:8px;
    }
    .noticeDone{
      opacity:.68;
      filter:saturate(.7);
    }
    .noticeDone b{text-decoration:line-through}
    .premiumDivider{
      height:1px;
      background:linear-gradient(90deg,transparent,#dbeafe,transparent);
      margin:14px 0;
    }
    @media(max-width:430px){
      .card h2{font-size:23px}
      .heroSummary .big{font-size:18px}
      .priority{font-size:12px}
    }

  
    /* V49 Activity Progress AI */
    .activityModeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
    .modeBtn{border:1px solid #dbeafe;background:#fff;color:#1d4ed8;border-radius:18px;padding:10px 8px;font-weight:950;text-align:center;min-height:58px}
    .modeBtn.active{background:#eef2ff;color:#3730a3;border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.10)}
    .activityPreview{max-width:100%;max-height:240px;object-fit:contain;border:1px solid #e5e7eb;border-radius:18px;background:#f8fafc;margin-top:10px;display:none}
    .activityFrameGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    .activityFrameGrid img{width:100%;height:90px;object-fit:cover;border:1px solid #e5e7eb;border-radius:14px;background:#f8fafc}
    @media(max-width:430px){.activityModeGrid{grid-template-columns:1fr 1fr}.activityFrameGrid{grid-template-columns:1fr 1fr 1fr}.activityFrameGrid img{height:72px}}

  
    /* V50 Coach Voice Notes */
    .coachVoiceBox{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #bfdbfe;color:#1e3a8a;border-radius:20px;padding:13px;margin:12px 0}
    .coachVoiceBox b{display:block;color:#0f172a;margin-bottom:6px;font-size:17px}
    .coachVoiceRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .coachVoiceRow select{width:auto;min-width:145px;min-height:44px;padding:8px 12px;border-radius:999px;background:#fff}
    .voiceStatus{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:10px;color:#334155;font-weight:850;line-height:1.45;margin-top:10px;min-height:42px}
    .voiceLive{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .voiceWarn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}

  
    /* V51 Home Repair + Splash */
    .splashScreen{
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:#0f172a;text-align:center;
      transition:opacity .45s ease, visibility .45s ease;
    }
    .splashScreen.hide{opacity:0;visibility:hidden;pointer-events:none}
    .splashLogo{font-size:54px;line-height:1;margin-bottom:12px;animation:splashFloat 1.3s ease-in-out infinite alternate}
    .splashTitle{font-size:34px;font-weight:1000;letter-spacing:-.06em;margin-bottom:8px}
    .splashSlogan{font-size:18px;font-weight:950;color:#334155;margin-bottom:6px}
    .splashSub{font-size:14px;font-weight:850;color:#64748b}
    @keyframes splashFloat{from{transform:translateY(0)}to{transform:translateY(-7px)}}
    .bootError{
      margin:calc(18px + env(safe-area-inset-top)) 16px;
      background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;
      border-radius:22px;padding:16px;font-weight:850;line-height:1.45;
    }

  
    /* V52 Splash Timeout + Purple Cover */
    .splashScreen{
      position:fixed!important;
      inset:0!important;
      z-index:9999!important;
      display:flex!important;
      align-items:center!important;
      justify-content:center!important;
      overflow:hidden!important;
      background:
        radial-gradient(circle at 20% 18%, rgba(216,180,254,.45), transparent 32%),
        radial-gradient(circle at 82% 70%, rgba(244,114,182,.32), transparent 28%),
        linear-gradient(155deg,#f8fbff 0%,#eef2ff 38%,#f5f3ff 70%,#fff7fb 100%)!important;
      color:#0f172a!important;
      text-align:center!important;
      transition:opacity .55s ease, visibility .55s ease!important;
    }
    .splashScreen.hide{
      opacity:0!important;
      visibility:hidden!important;
      pointer-events:none!important;
    }
    .splashContent{
      position:relative;
      z-index:2;
      width:min(86vw,520px);
      padding:34px 24px;
      border-radius:34px;
      background:rgba(255,255,255,.34);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:0 24px 80px rgba(88,28,135,.14);
      backdrop-filter:blur(12px);
    }
    .splashLogo{
      font-size:62px!important;
      line-height:1!important;
      margin-bottom:14px!important;
      animation:splashFloat 1.2s ease-in-out infinite alternate!important;
      filter:drop-shadow(0 10px 18px rgba(219,39,119,.22));
    }
    .splashTitle{
      font-size:38px!important;
      font-weight:1000!important;
      letter-spacing:-.065em!important;
      margin-bottom:12px!important;
      color:#0f172a!important;
    }
    .splashSlogan{
      font-size:20px!important;
      font-weight:950!important;
      color:#334155!important;
      margin-bottom:8px!important;
    }
    .splashSub{
      font-size:15px!important;
      font-weight:850!important;
      color:#64748b!important;
    }
    .splashBgFlower{
      position:absolute;
      z-index:1;
      opacity:.18;
      filter:blur(.2px);
      pointer-events:none;
      animation:splashSlow 5s ease-in-out infinite alternate;
    }
    .splashBgFlower1{
      font-size:190px;
      left:-38px;
      top:11%;
      transform:rotate(-18deg);
    }
    .splashBgFlower2{
      font-size:150px;
      right:-28px;
      bottom:15%;
      transform:rotate(16deg);
      opacity:.14;
    }
    .splashOrb{
      position:absolute;
      border-radius:999px;
      pointer-events:none;
      filter:blur(2px);
    }
    .splashOrb1{
      width:210px;height:210px;
      background:rgba(139,92,246,.20);
      left:10%;bottom:20%;
    }
    .splashOrb2{
      width:170px;height:170px;
      background:rgba(236,72,153,.18);
      right:12%;top:18%;
    }
    @keyframes splashFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.03)}}
    @keyframes splashSlow{from{transform:translateY(0) rotate(-12deg)}to{transform:translateY(-12px) rotate(8deg)}}

  </style>
</head>
<body>
<div id="splashScreen" class="splashScreen">
  <div class="splashBgFlower splashBgFlower1">🌸</div>
  <div class="splashBgFlower splashBgFlower2">🌺</div>
  <div class="splashOrb splashOrb1"></div>
  <div class="splashOrb splashOrb2"></div>
  <div class="splashContent">
    <div class="splashLogo">🌸</div>
    <div class="splashTitle">ChildGrowth AI</div>
    <div class="splashSlogan">陪孩子成長，看見每一步</div>
    <div class="splashSub">Let’s grow together, one step at a time.</div>
  </div>
</div>
<div class="app">
  <header class="top">
    <div class="brand">🌸 ChildGrowth AI</div>
    <div class="sub" id="headerProfile">Your child · Learning + Emotion + Routine</div>
    <div class="version">v52 Splash Timeout · Purple cover restored</div>
  </header>

  <main>
    <section id="home" class="page active"></section>
    <section id="record" class="page"></section>
    <section id="homework" class="page"></section>
    <section id="analytics" class="page"></section>
    <section id="profile" class="page"></section>
  </main>
</div>

<nav class="bottomnav">
  <button class="navbtn active" data-tab="home"><span class="ico">🏠</span><span>首頁</span></button>
  <button class="navbtn" data-tab="record"><span class="ico">🎙️</span><span>記錄</span></button>
  <button class="navbtn" data-tab="homework"><span class="ico">📚</span><span>功課</span></button>
  <button class="navbtn" data-tab="analytics"><span class="ico">🤖</span><span>分析</span></button>
  <button class="navbtn" data-tab="profile"><span class="ico">👤</span><span>我的</span></button>
</nav>

<div id="routineModal" class="modal"><div class="sheet" id="routineSheet"></div></div>
<div id="setupModal" class="modal"><div class="sheet" id="setupSheet"></div></div>

<script>
(function(){
'use strict';

const DATA_KEY='cg_app_v46';
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_LABEL={Monday:'星期一',Tuesday:'星期二',Wednesday:'星期三',Thursday:'星期四',Friday:'星期五',Saturday:'星期六',Sunday:'星期日'};
let currentTab='home';
let routineEditId=null;
let taskEditId=null;
let noticePending=null;
let homeworkImage='';

const DEFAULT_DATA={
  version:46,
  profile:{
    childName:'Janice', year:'Year 2', age:'8 歲左右', school:'Oakleigh South Primary School',
    region:'Australia / Victoria', language:'繁體中文 / Cantonese',
    focus:'Academic + Emotional Balance',
    strengths:['記憶力好','音感 / piano 潛能','畫畫 / 創意'],
    watchAreas:['數學規律可培養','閱讀細節要慢慢練'],
    parentGoals:['穩定節奏','清楚步驟','保持自信']
  },
  routines:[],
  todayTasks:[],
  schoolNotices:[],
  emotions:[],
  teacherComments:[],
  homeworkReports:[],
  activityReports:[],
  settings:{weekExpanded:false, onboardingDone:true}
};

function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function readJSON(k,f){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch(e){return f}}
function save(){app.version=46;localStorage.setItem(DATA_KEY,JSON.stringify(app));mirrorLegacy();}
function todayISO(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10)}
function dayName(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toLocaleDateString('en-AU',{weekday:'long'})}
function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,'').replace(/[^\w\u4e00-\u9fff]/g,'')}
function timeToMin(t){
  if(!t)return null;let s=String(t).trim().toLowerCase().replace(/\s+/g,'').replace('：',':');
  s=s.replace(/上午|早上/g,'am').replace(/下午|晚上|夜晚/g,'pm').replace(/點半|点半/g,':30').replace(/點|点|時|时/g,':00');
  const m=s.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/); if(!m)return null;
  let h=+m[1],mm=+(m[2]||0),ap=m[3]||''; if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;if(!ap&&h>=1&&h<=7)h+=12; return h*60+mm;
}
function minText(m){m=((m%1440)+1440)%1440;let h=Math.floor(m/60),mm=m%60,ap=h>=12?'PM':'AM';let hh=h%12;if(!hh)hh=12;return `${hh}:${String(mm).padStart(2,'0')} ${ap}`}
function timeInputValue(t){
  const m=timeToMin(t);
  if(m===null) return '';
  const h=Math.floor(m/60), mm=m%60;
  return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function timeInputDisplay(v){
  if(!v) return '';
  const m=String(v).match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return v;
  return minText((+m[1])*60+(+m[2]));
}
function readTimeField(id, fallback=''){
  const el=$(id);
  if(!el) return fallback;
  return timeInputDisplay(el.value) || fallback;
}
function sortByTime(a,b){const am=timeToMin(a.start||a.time),bm=timeToMin(b.start||b.time);if(am===null&&bm===null)return String(a.name||a.title).localeCompare(String(b.name||b.title));if(am===null)return 1;if(bm===null)return -1;return am-bm}
function nextFutureTime(preferred='6:30 PM'){
  const now=new Date(), cur=now.getHours()*60+now.getMinutes(); let pref=timeToMin(preferred)??1110;
  if(cur<pref-10)return minText(pref); let next=Math.ceil((cur+10)/30)*30; if(next>21*60)next=21*60; return minText(next);
}
function routineKey(r){return [r.day||'',norm(r.name),r.start||'',r.oneOffDate||''].join('|')}

function migrate(){
  let existing=readJSON(DATA_KEY,null);
  let data=existing || JSON.parse(JSON.stringify(DEFAULT_DATA));

  // Profile migration
  const p30=readJSON('cg_child_profile_v30',null);
  const old=readJSON('childgrowthai-v8',null);
  if(!existing){
    if(p30&&typeof p30==='object'){
      data.profile.childName=p30.childName||data.profile.childName;
      data.profile.year=p30.currentYear||data.profile.year;
      data.profile.age=p30.age||data.profile.age;

function freeWindows(day,items){
  const weekday=!['Saturday','Sunday'].includes(day); const start=weekday?15*60+30:9*60, end=20*60+30;
  const blocks=items.map(r=>{let s=timeToMin(r.start),e=timeToMin(r.end);if(s===null)return null;if(e===null||e<=s)e=s+60;return{s,e}}).filter(Boolean).sort((a,b)=>a.s-b.s);
  let cur=start,free=[];blocks.forEach(b=>{if(b.s>cur+20)free.push([cur,b.s]);cur=Math.max(cur,b.e)}); if(end>cur+20)free.push([cur,end]); return free;
}

function extractVideoFrames(file,count=3){
  return new Promise((resolve,reject)=>{
    const video=document.createElement('video'); const url=URL.createObjectURL(file); video.src=url; video.muted=true; video.playsInline=true; video.preload='metadata';
    const frames=[], canvas=document.createElement('canvas'), ctx=canvas.getContext('2d');
    video.onloadedmetadata=()=>{const dur=Math.min(video.duration||1,20); const times=[dur*0.2,dur*0.5,dur*0.8].map(x=>Math.max(0.1,Math.min(dur-0.1,x))); let i=0;
      const grab=()=>{if(i>=times.length){URL.revokeObjectURL(url); resolve(frames); return;} video.currentTime=times[i++];};
      video.onseeked=()=>{canvas.width=Math.min(video.videoWidth||640,900); canvas.height=Math.round(canvas.width*((video.videoHeight||360)/(video.videoWidth||640))); ctx.drawImage(video,0,0,canvas.width,canvas.height); frames.push(canvas.toDataURL('image/jpeg',0.78)); grab();}; grab();
    };
    video.onerror=()=>{URL.revokeObjectURL(url); reject(new Error('video load failed'))};
  });
}

let coachRecognition=null;
let coachVoiceTimer=null;
let coachInterimText='';
function setVoiceStatus(text, mode=''){const el=$('coachVoiceStatus');if(!el)return;el.className='voiceStatus '+(mode==='live'?'voiceLive ':mode==='warn'?'voiceWarn ':'');el.innerHTML=text;}
function appendCoachText(text){const area=$('activityNote');if(!area||!text)return;const current=area.value.trim();area.value=current?current+'\n'+text.trim():text.trim();}
function startCoachVoiceNote(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setVoiceStatus('⚠️ 呢個 browser 暫時唔支援語音。請直接打字輸入 coach comment。','warn');return;}
  stopCoachVoiceNote(false);
  const lang=($('coachVoiceLang')?.value)||'zh-HK';
  coachRecognition=new SR();coachRecognition.lang=lang;coachRecognition.interimResults=true;coachRecognition.continuous=false;coachRecognition.maxAlternatives=1;
  let finalText='';coachInterimText='';
  setVoiceStatus('🎙️ 正在聽你講 coach comment。可以中英夾雜，最多約 25 秒。','live');
  coachVoiceTimer=setTimeout(()=>{const text=(finalText||coachInterimText||'').trim();try{coachRecognition&&coachRecognition.stop()}catch(e){} if(text){appendCoachText(text);setVoiceStatus('✅ 已加入語音文字。你可以補充更多，或直接 Analyze Activity。','live');}else{setVoiceStatus('⚠️ 未聽到清楚內容。可以再試一次或直接打字。','warn');} coachRecognition=null;},25000);
  coachRecognition.onresult=(e)=>{let interim='';for(let i=e.resultIndex;i<e.results.length;i++){const part=e.results[i][0].transcript||'';if(e.results[i].isFinal)finalText+=part;else interim+=part;}coachInterimText=interim;const display=(finalText||interim||'').trim();if(display)setVoiceStatus('🎙️ 聽到：'+esc(display),'live');};
  coachRecognition.onerror=(e)=>{clearTimeout(coachVoiceTimer);coachRecognition=null;setVoiceStatus('⚠️ 語音輸入未成功：'+esc(e.error||'unknown')+'。可以再試或直接打字。','warn');};
  coachRecognition.onend=()=>{clearTimeout(coachVoiceTimer);const text=(finalText||coachInterimText||'').trim();if(text){appendCoachText(text);setVoiceStatus('✅ 已加入語音文字。請檢查後 Analyze Activity。','live');}else{setVoiceStatus('語音已停止。如未加入文字，可以再試一次。','warn');}coachRecognition=null;};
  try{coachRecognition.start();}catch(e){setVoiceStatus('⚠️ 語音功能啟動失敗。請直接打字。','warn');coachRecognition=null;}
}
function stopCoachVoiceNote(show=true){if(coachVoiceTimer)clearTimeout(coachVoiceTimer);coachVoiceTimer=null;try{if(coachRecognition)coachRecognition.stop();}catch(e){}coachRecognition=null;if(show)setVoiceStatus('已停止語音。','warn');}
function clearCoachVoiceNote(){const area=$('activityNote');if(area)area.value='';setVoiceStatus('已清空。可以重新語音輸入或打字。');}

function parseNaturalDate(text){
  const now=new Date(); const t=String(text||''); const l=t.toLowerCase(); const fmt=d=>d.toISOString().slice(0,10);
  if(/today|今日|今天/.test(l))return fmt(now); if(/tomorrow|聽日|明天/.test(l)){let d=new Date(now);d.setDate(d.getDate()+1);return fmt(d)}
  const map=[['monday',1,'星期一'],['tuesday',2,'星期二'],['wednesday',3,'星期三'],['thursday',4,'星期四'],['friday',5,'星期五'],['saturday',6,'星期六'],['sunday',0,'星期日']];
  for(const [en,idx,cn] of map){if(l.includes(en)||t.includes(cn)){let d=new Date(now),diff=(idx-d.getDay()+7)%7;if(/next|下個|下星期|下周/.test(l+t)||diff===0)diff+=7;d.setDate(d.getDate()+diff);return fmt(d)}}
  let m=t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/); if(m){let y=m[3]?+m[3]:now.getFullYear(); if(y<100)y+=2000; return fmt(new Date(y,+m[2]-1,+m[1]));}
  return '';
}
function fallbackNotice(text){
  const l=text.toLowerCase(); let title='School notice';
  if(/ice\s*pops?|icy\s*pole|雪條|冰條/.test(l))title='Ice pops / icy pole event';
  else if(/dress|costume|book week|打扮/.test(l))title='Dress up / Book Week event';
  else if(/excursion|incursion|camp|旅行/.test(l))title='Excursion / school activity';
  else if(/photo|照片|相/.test(l))title='School photo day';
  const money=(text.match(/\$\s?\d+(?:\.\d{1,2})?|\d+\s?(?:dollars?|元|蚊)/i)||[])[0]||'';
  const bring=[]; if(money)bring.push(money); if(/dress|costume|打扮/.test(l))bring.push('dress-up / costume'); if(/water|水樽|snack|hat|帽/.test(l))bring.push('water bottle / snack / hat if needed');
  return {id:'notice_'+Date.now(),title,date:parseNaturalDate(text),time:(text.match(/(\d{1,2}(?::\d{2})?\s?(?:am|pm|AM|PM))/)||[])[1]||'',category:money?'payment':'school event',bringItems:bring.length?bring:['請按通知內容準備'],payment:money,deadline:'',reminders:['前一晚 8:00 PM','當日早上 7:30 AM'],confidence:parseNaturalDate(text)?'medium':'low',summary:text.slice(0,320),parentAction:bring.length?'準備：'+bring.join('、'):'請檢查通知日期和要帶物品'};
}

    <h2>🧾 Weekly Review / 家長小結</h2>
    ${weeklyReportHTML()}
  </div>`;
}
function weeklyReportHTML(){
  const total=app.todayTasks.length+app.schoolNotices.length+app.routines.length+app.emotions.length+app.homeworkReports.length+app.teacherComments.length+(app.activityReports||[]).length;
  const recentMoods=app.emotions.slice(-7).map(e=>e.mood);
  const tired=recentMoods.filter(m=>/tired|frustrated/i.test(m)).length;
  const busyDays=DAYS.map(d=>[d,routinesForDay(d,false).length]).sort((a,b)=>b[1]-a[1]);
  const topBusy=busyDays[0];
  const latestHW=app.homeworkReports.slice(-1)[0]?.report;
  const latestAct=(app.activityReports||[]).slice(-1)[0]?.report;
  const openNotices=app.schoolNotices.filter(n=>!n.done && (!n.date || n.date>=todayISO()));
  const observations=[
    app.routines.length?`固定行程已建立 ${app.routines.filter(r=>!r.oneOffDate).length} 項，可開始比較活動量與功課狀態。`:'固定行程資料仍不足，建議先加入 Mon–Fri school 及主要課外活動。',
    recentMoods.length?`最近情緒記錄：${recentMoods.join('、')}。${tired?'有疲倦/挫敗訊號，活動多的日子要減量。':'暫時未見明顯疲倦模式。'}`:'未有足夠情緒記錄。',
    openNotices.length?`有 ${openNotices.length} 個未完成學校通知，需檢查要帶物品 / 付款 / deadline。`:'暫時沒有未完成學校通知。',
    latestHW?`最近功課重點：${latestHW.nextStep||latestHW.summary||'可按 homework report 下一步跟進。'}`:'未有足夠功課分析資料.',
    latestAct?`最近活動重點：${latestAct.nextPractice||latestAct.summary||'可按 Activity Progress report 下一步跟進。'}`:'未有活動進度分析資料。'
  ];
  const nextActions=[
    '下星期只揀一個學習重點，例如 number patterns / reading details。',
    '每天最多記錄一個情緒或一張功課相，保持資料穩定。',
    topBusy&&topBusy[1]>=2?`${DAY_LABEL[topBusy[0]]} 較忙，當日功課建議輕量。`:'活動量暫時不算密集，可以安排短練習。'
  ];
  return `<div class="reportBlock"><b>1. 本週資料</b><ul><li>目前共有 ${total} 項資料。</li><li>固定行程：${app.routines.filter(r=>!r.oneOffDate).length} 項。</li><li>功課分析：${app.homeworkReports.length} 份；老師 comment：${app.teacherComments.length} 條；活動進度：${(app.activityReports||[]).length} 份。</li></ul></div>
  <div class="reportBlock"><b>2. AI 觀察</b>${compactList(observations)}</div>
  <div class="reportBlock"><b>3. 家長下一步</b>${compactList(nextActions)}</div>
  <div class="notice">提醒：呢份 weekly review 係 beta，資料越穩定越準；唔需要每日填好多，最重要係持續。</div>`;
}

    <div class="actions"><button class="btn primary" onclick="quickWeekdaySchool()">Mon–Fri School</button><button class="btn" onclick="syncJanice()">同步 Janice 常用行程</button></div>
  </div>
  <div class="card">
    <h2>📅 一週固定行程總覽</h2>
    <div class="muted">一次過檢查 Monday–Sunday 固定行程、重複項目和空檔。</div>
    <div id="weekList" class="${app.settings.weekExpanded?'':'collapsed'}">${DAYS.map(dayWeekHTML).join('')}</div>
    <div class="actions"><button class="btn" onclick="toggleWeek()">${app.settings.weekExpanded?'收起空白日':'展開全部一週'}</button><button class="btn primary" onclick="openRoutineManager()">管理固定行程</button></div>
  </div>
  <div class="card">
    <h2>🛡️ Privacy / Beta</h2>

function dayWeekHTML(day){
  const items=routinesForDay(day,false); const today=day===dayName(0); const free=freeWindows(day,items);
  return `<div class="weekDay ${today?'today':''} ${items.length?'hasItems':''}">
    <div class="weekHead"><div class="weekTitle">${DAY_LABEL[day]} · ${day}</div><div class="count">${items.length} 個活動</div></div>
    ${items.length?items.map(routineRow).join(''):'<div class="notice bluebox">未有固定行程。</div>'}
    <div class="notice good">🟢 空檔參考：${free.length?free.slice(0,3).map(([s,e])=>`${minText(s)} – ${minText(e)}`).join('、'):'活動較密，暫時未見明顯空檔'}</div>
  </div>`;
}
window.toggleWeek=()=>{app.settings.weekExpanded=!app.settings.weekExpanded;save();renderProfile()}

function openRoutineManager(){
  routineEditId=null;
  $('routineModal').classList.add('show'); renderRoutineSheet();
}
window.openRoutineManager=openRoutineManager;
function closeRoutineManager(){$('routineModal').classList.remove('show'); routineEditId=null}
window.closeRoutineManager=closeRoutineManager;
function renderRoutineSheet(){
  const r=routineEditId?app.routines.find(x=>x.id===routineEditId):null;
  $('routineSheet').innerHTML=`<div class="sheetHead"><h2>🗓️ 管理固定行程</h2><button class="btn" onclick="closeRoutineManager()">關閉</button></div>
  <div class="notice bluebox">固定行程是長期安排，例如 Mon–Fri school、Thursday swimming、Friday chess。每項都可以修改 / 刪除。</div>
  ${routineEditId?'<div class="notice">正在修改行程。改完後按保存修改。</div>':''}
  <div class="grid">
    <div><label>活動名稱</label><input id="rName" value="${esc(r?.name||'')}" placeholder="例：Oakleigh South Primary School / Swimming"></div>
    <div><label>星期</label><select id="rDay"><option value="Monday–Friday">Monday–Friday</option>${DAYS.map(d=>`<option ${r?.day===d?'selected':''}>${d}</option>`).join('')}</select></div>
    <div><label>開始時間</label><input id="rStart" type="time" value="${esc(timeInputValue(r?.start||''))}"></div>
    <div><label>結束時間</label><input id="rEnd" type="time" value="${esc(timeInputValue(r?.end||''))}"></div>
  </div>
  <label>準備物品 / 備註</label><textarea id="rPrep" placeholder="例：書包、水樽、reader bag">${esc(r?.prep||'')}</textarea>
  <div class="grid">
    <div><label>提醒時間</label><input id="rReminder" value="${esc(r?.reminder||'前一晚 8:00 PM')}"></div>
    <div><label>功課影響</label><select id="rImpact">${['正常','輕量功課日','不建議額外 worksheet'].map(x=>`<option ${r?.impact===x?'selected':''}>${x}</option>`).join('')}</select></div>
  </div>
  <div class="actions">
    <button class="btn primary" onclick="saveRoutineFromForm()">${routineEditId?'💾 保存修改':'➕ 加入固定行程'}</button>
    ${routineEditId?'<button class="btn" onclick="cancelRoutineEdit()">取消修改</button>':''}
    <button class="btn" onclick="prefillSchool()">Oakleigh South PS</button>
    <button class="btn" onclick="prefill('🏊 Swimming','6:00 PM','6:45 PM','泳衣、毛巾、goggles、水樽','輕量功課日')">Swimming</button>
    <button class="btn" onclick="prefill('♟️ Chess','3:30 PM','4:30 PM','水樽、snack、chess book 如需要','正常')">Chess</button>
  </div>
  <h3>已加入固定行程</h3>
  ${app.routines.filter(x=>!x.oneOffDate).sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day)||sortByTime(a,b)).map(routineManageRow).join('')||'<div class="notice bluebox">未有固定行程。</div>'}`;
}
function routineManageRow(r){return rowHTML(`${esc(r.day)} ${[r.start,r.end].filter(Boolean).join(' – ')} · ${esc(r.name)}`,`${r.prep?'準備：'+esc(r.prep)+'<br>':''}提醒：${esc(r.reminder||'前一晚 8:00 PM')}<br>功課安排：${esc(r.impact||'正常')}`,`<button class="btn" onclick="editRoutine('${esc(r.id)}')">修改</button><button class="btn danger" onclick="deleteRoutine('${esc(r.id)}')">刪除</button>`)}
window.prefill=(n,s,e,p,i)=>{$('rName').value=n;$('rStart').value=timeInputValue(s);$('rEnd').value=timeInputValue(e);$('rPrep').value=p;$('rImpact').value=i}
window.prefillSchool=()=>{$('rName').value='🏫 Oakleigh South Primary School';$('rStart').value=timeInputValue('8:45 AM');$('rEnd').value=timeInputValue('3:30 PM');$('rPrep').value='書包、lunch box、水樽、帽、reader bag';$('rReminder').value='前一晚 8:00 PM';$('rImpact').value='正常';$('rDay').value='Monday–Friday'}
window.saveRoutineFromForm=()=>{
  const name=$('rName').value.trim(), day=$('rDay').value, start=readTimeField('rStart'), end=readTimeField('rEnd'), prep=$('rPrep').value.trim(), reminder=$('rReminder').value.trim()||'前一晚 8:00 PM', impact=$('rImpact').value;
  if(!name||!start){alert('請最少填活動名稱和開始時間。');return}
  if(routineEditId){const r=app.routines.find(x=>x.id===routineEditId); if(r)Object.assign(r,{day:day==='Monday–Friday'?'Monday':day,name,start,end,prep,reminder,impact,updatedAt:new Date().toISOString()}); routineEditId=null;}
  else{
    const ds=day==='Monday–Friday'?DAYS.slice(0,5):[day];
    const keys=new Set(app.routines.map(routineKey));
    ds.forEach(d=>{const item={id:'r_'+Date.now()+'_'+d+'_'+Math.random().toString(36).slice(2,5),day:d,name,start,end,prep,reminder,impact,createdAt:new Date().toISOString()}; if(!keys.has(routineKey(item))){app.routines.push(item);keys.add(routineKey(item))}})
  }
  save();renderRoutineSheet();renderProfile();renderHome();
}
window.editRoutine=(id)=>{routineEditId=id;renderRoutineSheet();$('rName').scrollIntoView({behavior:'smooth',block:'center'})}
window.cancelRoutineEdit=()=>{routineEditId=null;renderRoutineSheet()}
window.deleteRoutine=(id)=>{if(confirm('刪除這個固定行程？')){app.routines=app.routines.filter(r=>r.id!==id);save();renderRoutineSheet();renderProfile();renderHome()}}
function addRoutines(items){const keys=new Set(app.routines.map(routineKey));let added=0;items.forEach(item=>{if(!keys.has(routineKey(item))){app.routines.push({id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2),createdAt:new Date().toISOString(),...item});keys.add(routineKey(item));added++}});save();return added}
window.quickWeekdaySchool=()=>{const added=addRoutines(DAYS.slice(0,5).map(day=>({day,name:'🏫 Oakleigh South Primary School',start:'8:45 AM',end:'3:30 PM',prep:'書包、lunch box、水樽、帽、reader bag',reminder:'前一晚 8:00 PM',impact:'正常'})));alert(`已加入 ${added} 個返學行程，已存在的不會重複。`);renderProfile();renderHome()}
window.syncJanice=()=>{const added=addRoutines([
  ...DAYS.slice(0,5).map(day=>({day,name:'🏫 Oakleigh South Primary School',start:'8:45 AM',end:'3:30 PM',prep:'書包、lunch box、水樽、帽、reader bag',reminder:'前一晚 8:00 PM',impact:'正常'})),
  {day:'Thursday',name:'⚽ Soccer',start:'3:30 PM',end:'4:30 PM',prep:'水樽、運動鞋、外套',reminder:'前一晚 8:00 PM',impact:'輕量功課日'},
  {day:'Thursday',name:'🏊 Swimming',start:'6:00 PM',end:'6:45 PM',prep:'泳衣、毛巾、goggles、水樽',reminder:'前一晚 8:00 PM',impact:'輕量功課日'},
  {day:'Friday',name:'♟️ Chess',start:'3:30 PM',end:'4:30 PM',prep:'水樽、snack、chess book 如需要',reminder:'前一晚 8:00 PM',impact:'正常'}
]);alert(`已同步 Janice 常用行程：新增 ${added} 項，已存在不重複。`);renderProfile();renderHome()}

    <div class="grid">
      <div><label>小朋友名字</label><input id="pName" value="${esc(p.childName)}"></div>

window.openSetup=openSetup;
window.closeSetup=()=>{$('setupModal').classList.remove('show')}
window.saveSetup=()=>{
  Object.assign(app.profile,{childName:$('pName').value.trim()||app.profile.childName,year:$('pYear').value.trim()||app.profile.year,age:$('pAge').value.trim(),region:$('pRegion').value.trim(),school:$('pSchool').value.trim(),strengths:$('pStrengths').value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean),watchAreas:$('pWatch').value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean),parentGoals:$('pGoals').value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean)});
  save();updateHeader();window.closeSetup();renderProfile();renderHome();
}


function hideSplash(){setTimeout(()=>{const s=document.getElementById('splashScreen'); if(s) s.classList.add('hide');},1200);}
window.addEventListener('error', function(e){
  const home=document.getElementById('home');
  if(home && !home.innerHTML.trim()){
    home.innerHTML='<div class="bootError">⚠️ App 載入時遇到錯誤。請先重新整理；如果仍然空白，請重新 upload V51 package。<br><small>'+String(e.message||'unknown error')+'</small></div>';
  }
  const s=document.getElementById('splashScreen'); if(s) s.classList.add('hide');
});

function renderCurrent(){updateHeader();({home:renderHome,record:renderRecord,homework:renderHomework,analytics:renderAnalytics,profile:renderProfile}[currentTab]||renderHome)()}
window.renderCurrent=renderCurrent;
renderCurrent();

})();
</script>

<script>
(function(){
  function hideV52Splash(){
    var s=document.getElementById('splashScreen');
    if(s) s.classList.add('hide');
  }
  function ensureNotBlank(){
    var home=document.getElementById('home');
    var active=document.querySelector('.page.active');
    var target=active || home;
    if(target && !String(target.innerHTML||'').trim()){
      target.innerHTML='<div class="bootError">⚠️ App 已停止喺 loading 畫面，V52 已自動放行。若首頁仍然空白，請重新整理或重新 upload V52 package。</div>';
    }
  }
  window.addEventListener('load', function(){
    setTimeout(hideV52Splash, 1200);
    setTimeout(function(){ hideV52Splash(); ensureNotBlank(); }, 2200);
  });
  // iOS PWA sometimes does not fire load predictably after cache restore.
  setTimeout(hideV52Splash, 1600);
  setTimeout(function(){ hideV52Splash(); ensureNotBlank(); }, 2600);
})();
</script>
