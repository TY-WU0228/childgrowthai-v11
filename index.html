<!doctype html>
<html lang="zh-Hant">
<head>
<!-- V73 Slogan Fix Only -->
  <meta name="childgrowth-version" content="v60-routine-restore-click-fix">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#eff6ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>ChildGrowth AI V93 Report Integrity + Parent Fail-safe Fix</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#f4f8ff;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#dbeafe;
      --blue:#2563eb;--purple:#7c3aed;--pink:#db2777;--green:#15803d;--orange:#9a3412;
      --soft-blue:#eff6ff;--soft-purple:#f5f3ff;--soft-green:#ecfdf5;--soft-orange:#fff7ed;
      --shadow:0 16px 45px rgba(15,23,42,.07);--r:28px;--navh:86px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans TC","PingFang TC",sans-serif;
      font-weight:800;-webkit-font-smoothing:antialiased;padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom));
    }
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .app{max-width:860px;margin:0 auto;}
    .top{
      display:none!important;
    }
    .brand{font-size:34px;font-weight:1000;letter-spacing:-.06em;line-height:1}
    .sub{font-size:16px;color:var(--muted);font-weight:900;margin-top:7px;line-height:1.25}
    .version{font-size:13px;color:var(--muted);font-weight:900;margin-top:4px}
    .page{display:none;padding:calc(14px + env(safe-area-inset-top)) 16px 28px}.page.active{display:block}
    .card{
      background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:var(--r);
      padding:18px;margin:14px 0;box-shadow:var(--shadow);overflow:hidden;
    }
    .card h2{font-size:28px;margin:0 0 8px;letter-spacing:-.05em;color:var(--ink)}
    .card h3{font-size:21px;margin:16px 0 8px;letter-spacing:-.04em;color:var(--ink)}
    .muted{color:var(--muted);line-height:1.45;font-weight:850}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .metric{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:14px;min-width:0}
    .metric b{display:block;color:var(--pink);font-size:30px;line-height:1.05;word-break:break-word}
    .metric span{display:block;color:var(--muted);font-size:13px;margin-top:5px;font-weight:900}
    .notice,.insight{
      border-radius:18px;padding:12px;margin-top:12px;line-height:1.45;font-weight:900
    }
    .insight{background:#ecfeff;border:1px solid #67e8f9;color:#155e75}
    .notice{background:var(--soft-orange);border:1px solid #fed7aa;color:var(--orange)}
    .good{background:var(--soft-green);border:1px solid #bbf7d0;color:var(--green)}
    .bluebox{background:var(--soft-blue);border:1px solid #bfdbfe;color:#1e3a8a}
    label{display:block;color:var(--muted);font-weight:950;margin:12px 0 6px}
    input,textarea,select{
      width:100%;border:1px solid #e5e7eb;border-radius:18px;background:#fff;padding:14px 15px;
      color:var(--ink);outline:none;font-weight:850;min-height:54px;
    }
    textarea{min-height:120px;resize:vertical}
    input:focus,textarea:focus,select:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(147,197,253,.22)}
    .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .btn{
      border:1px solid #dbeafe;background:#fff;color:#1d4ed8;border-radius:999px;
      padding:10px 14px;font-weight:1000;width:auto;margin:0;white-space:nowrap;
    }
    .btn.primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .hwAnalyzing .notice.bluebox{border-color:#93c5fd;animation:hwPulse 1.2s ease-in-out infinite}
    @keyframes hwPulse{0%,100%{opacity:1}50%{opacity:.72}}
    .debugPill,.growthTag,.parentSkill,.parentMini,.wowSentence{max-width:100%;overflow-wrap:anywhere;word-break:break-word}
    .btn.danger{background:#fee2e2;color:#991b1b;border:none}
    .btn.soft{background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe}
    .row{
      background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:12px;margin-top:10px;
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;
    }
    .row b{color:var(--ink);font-weight:1000}
    .row small{display:block;color:var(--muted);line-height:1.45;margin-top:4px;font-weight:850}
    .rowActions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
    .chip{display:inline-flex;align-items:center;border-radius:999px;background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;padding:6px 10px;margin:4px 4px 0 0;font-size:13px;font-weight:950}
    .bottomnav{
      position:fixed;left:0;right:0;bottom:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);
      border-top:1px solid #e5e7eb;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
      display:flex;justify-content:center;gap:6px;
    }
    .navbtn{
      border:0;background:transparent;color:#64748b;border-radius:24px;padding:8px 9px;min-width:64px;font-weight:1000;
      display:flex;flex-direction:column;align-items:center;gap:3px;font-size:14px
    }
    .navbtn .ico{font-size:24px;line-height:1}
    .navbtn.active{background:#eef2ff;color:#3730a3}
    .modal{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.38);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
    .modal.show{display:flex}
    .sheet{width:min(100%,860px);max-height:88vh;overflow:auto;background:#fff;border-radius:30px 30px 0 0;padding:20px 16px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -24px 70px rgba(15,23,42,.22)}
    .sheetHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
    .sheetHead h2{margin:0;font-size:26px;letter-spacing:-.04em}
    .weekDay{background:#f8fafc;border:1px solid #e5e7eb;border-radius:20px;padding:12px;margin-top:10px}
    .weekDay.today{background:#eff6ff;border-color:#93c5fd}
    .weekHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.weekTitle{font-size:18px;font-weight:1000}
    .count{border:1px solid #c7d2fe;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:950}
    .collapsed .weekDay:not(.today):not(.hasItems){display:none}
    .preview{max-width:100%;max-height:260px;border:1px solid #e5e7eb;border-radius:18px;object-fit:contain;background:#f8fafc;margin-top:10px;display:none}
    .hidden{display:none!important}
    @media(max-width:430px){
      .brand{font-size:30px}.card{border-radius:24px;padding:16px}.card h2{font-size:24px}
      .grid,.grid3{grid-template-columns:1fr}.navbtn{min-width:56px;font-size:13px}
      .row{align-items:flex-start}.metric b{font-size:25px}
    }
  
    input[type="time"]{
      -webkit-appearance:none;
      appearance:none;
      min-height:56px;
      letter-spacing:.02em;
      background:#fff;
    }
    .top .version{display:none!important}

  
    /* V48 UI Polish + Report Quality */
    body{font-weight:760}
    .card{padding:17px;margin:13px 0}
    .card h2{font-size:25px;line-height:1.12}

    .heroSummary{

    }

    }

    .premiumDivider{
      height:1px;
      background:linear-gradient(90deg,transparent,#dbeafe,transparent);

    }
    @media(max-width:430px){
      .card h2{font-size:23px}
      .heroSummary .big{font-size:18px}
      .priority{font-size:12px}
    }

  
    /* V49 Activity Progress AI */
    .activityModeGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
    .modeBtn{border:1px solid #dbeafe;background:#fff;color:#1d4ed8;border-radius:18px;padding:10px 8px;font-weight:950;text-align:center;min-height:58px}
    .modeBtn.active{background:#eef2ff;color:#3730a3;border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.10)}
    .activityPreview{max-width:100%;max-height:240px;object-fit:contain;border:1px solid #e5e7eb;border-radius:18px;background:#f8fafc;margin-top:10px;display:none}
    .activityFrameGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    .activityFrameGrid img{width:100%;height:90px;object-fit:cover;border:1px solid #e5e7eb;border-radius:14px;background:#f8fafc}
    @media(max-width:430px){.activityModeGrid{grid-template-columns:1fr 1fr}.activityFrameGrid{grid-template-columns:1fr 1fr 1fr}.activityFrameGrid img{height:72px}}

  
    /* V50 Coach Voice Notes */
    .coachVoiceBox{background:linear-gradient(135deg,#eff6ff,#f5f3ff);border:1px solid #bfdbfe;color:#1e3a8a;border-radius:20px;padding:13px;margin:12px 0}
    .coachVoiceBox b{display:block;color:#0f172a;margin-bottom:6px;font-size:17px}
    .coachVoiceRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .coachVoiceRow select{width:auto;min-width:145px;min-height:44px;padding:8px 12px;border-radius:999px;background:#fff}
    .voiceStatus{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:10px;color:#334155;font-weight:850;line-height:1.45;margin-top:10px;min-height:42px}
    .voiceLive{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .voiceWarn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}

  
    /* V51 Home Repair + Splash */
    .splashScreen{
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
      color:#0f172a;text-align:center;
      transition:opacity .45s ease, visibility .45s ease;
    }
    .splashScreen.hide{opacity:0;visibility:hidden;pointer-events:none}
    .splashLogo{font-size:54px;line-height:1;margin-bottom:12px;animation:splashFloat 1.3s ease-in-out infinite alternate}
    .splashTitle{font-size:34px;font-weight:1000;letter-spacing:-.06em;margin-bottom:8px}
    .splashSlogan{font-size:18px;font-weight:950;color:#334155;margin-bottom:6px}
    .splashSub{font-size:14px;font-weight:850;color:#64748b}
    @keyframes splashFloat{from{transform:translateY(0)}to{transform:translateY(-7px)}}
    .bootError{
      margin:calc(18px + env(safe-area-inset-top)) 16px;
      background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;
      border-radius:22px;padding:16px;font-weight:850;line-height:1.45;
    }

  
    /* V52 Splash Timeout + Purple Cover */
    .splashScreen{
      position:fixed!important;
      inset:0!important;
      z-index:9999!important;
      display:flex!important;
      align-items:center!important;
      justify-content:center!important;
      overflow:hidden!important;
      background:
        radial-gradient(circle at 20% 18%, rgba(216,180,254,.45), transparent 32%),
        radial-gradient(circle at 82% 70%, rgba(244,114,182,.32), transparent 28%),

      color:#0f172a!important;
      text-align:center!important;
      transition:opacity .55s ease, visibility .55s ease!important;
    }
    .splashScreen.hide{
      opacity:0!important;
      visibility:hidden!important;
      pointer-events:none!important;
    }
    .splashContent{
      position:relative;
      z-index:2;
      width:min(86vw,520px);
      padding:34px 24px;
      border-radius:34px;
      background:rgba(255,255,255,.34);
      border:1px solid rgba(255,255,255,.55);
      box-shadow:0 24px 80px rgba(88,28,135,.14);
      backdrop-filter:blur(12px);
    }
    .splashLogo{
      font-size:62px!important;
      line-height:1!important;
      margin-bottom:14px!important;
      animation:splashFloat 1.2s ease-in-out infinite alternate!important;
      filter:drop-shadow(0 10px 18px rgba(219,39,119,.22));
    }
    .splashTitle{
      font-size:38px!important;
      font-weight:1000!important;
      letter-spacing:-.065em!important;
      margin-bottom:12px!important;
      color:#0f172a!important;
    }
    .splashSlogan{
      font-size:20px!important;
      font-weight:950!important;
      color:#334155!important;
      margin-bottom:8px!important;
    }
    .splashSub{
      font-size:15px!important;
      font-weight:850!important;
      color:#64748b!important;
    }
@keyframes splashFloat{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.03)}}
    @keyframes splashSlow{from{transform:translateY(0) rotate(-12deg)}to{transform:translateY(-12px) rotate(8deg)}}

  
    /* V53 Voice + Activity Mode Fix */
    .voiceMiniBox{
      background:linear-gradient(135deg,#eff6ff,#f5f3ff);
      border:1px solid #bfdbfe;
      border-radius:18px;
      padding:12px;
      margin:10px 0 12px;
      color:#1e3a8a;
    }
    .voiceMiniBox b{
      display:block;
      color:#0f172a;
      margin-bottom:5px;
      font-size:16px;
    }
    .voiceMiniRow{
      display:flex;

      margin-top:9px;
    }
    .voiceMiniRow select{

    }

    .voiceMiniStatus.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
    .modeBtn{touch-action:manipulation}
    .modeBtn:active{transform:scale(.98)}

      background:linear-gradient(135deg,#eff6ff,#f5f3ff);

      border-radius:22px;
      padding:14px;
      margin:14px 0;

    /* Hide duplicated V50/V53 voice UI inside Activity Progress only. Teacher voice remains visible. */
    #activityUnifiedInput ~ .coachVoiceBox,
    #activityUnifiedInput ~ .voiceMiniBox{
      display:none!important;
    }

  
    /* V55 Activity Clean DOM */
    #activityProgressCard > #activityFileWrap,
    #activityProgressCard > .coachVoiceBox,
    #activityProgressCard > .voiceMiniBox,
    #activityProgressCard > textarea#activityNote,
    #activityProgressCard > textarea#activityNote + .actions{
      display:none!important;
    }
    #activityProgressCard > label:has(+ textarea#activityNote),
    #activityProgressCard > label:has(+ #activityFileWrap){
      display:none!important;
    }

    .splashScreen{

    .captureHero{
      background:linear-gradient(135deg,#eff6ff,#ecfeff);
      border:1px solid #bfdbfe;
      border-radius:24px;
      padding:15px;
      margin-top:13px;
    }
    .captureHero h3{margin:0 0 7px;font-size:21px;color:#0f172a;letter-spacing:-.04em}
    .captureExamples{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    .captureExample{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:10px;
      color:#334155;
      font-weight:850;

<script>
(function(){

const DATA_KEY='cg_app_v46';
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_LABEL={Monday:'星期一',Tuesday:'星期二',Wednesday:'星期三',Thursday:'星期四',Friday:'星期五',Saturday:'星期六',Sunday:'星期日'};

let noticePending=null;

const DEFAULT_DATA={
  version:46,
  profile:{
    childName:'Janice', year:'Year 2', age:'8 歲左右', school:'Oakleigh South Primary School',
    region:'Australia / Victoria', language:'繁體中文 / Cantonese',
    focus:'Academic + Emotional Balance',

function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function readJSON(k,f){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch(e){return f}}
/* A4 (V95): parent-friendly storage failure warning (e.g. Safari Private mode / quota full). */
function cgShowStorageWarning(){
  try{
    if(typeof document==='undefined'||!document.body) return;
    if(document.getElementById('cgStorageWarning')) return;
    var el=document.createElement('div');
    el.id='cgStorageWarning';
    el.setAttribute('role','alert');
    el.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#b3261e;color:#fff;padding:12px 16px;font-size:14px;line-height:1.5;box-shadow:0 -2px 12px rgba(0,0,0,.25)';
    el.innerHTML='⚠️ 這部裝置暫時無法儲存資料（可能是 Safari 私密瀏覽，或儲存空間已滿）。你仍可以使用 App，但今次輸入或分析結果可能不會被保留。建議改用 Safari 正常模式，或從主畫面 icon 開啟。 <button type="button" style="margin-left:8px;background:#fff;color:#b3261e;border:none;border-radius:6px;padding:4px 12px;font-weight:600;cursor:pointer" onclick="var w=document.getElementById(\'cgStorageWarning\');if(w)w.remove();">知道了</button>';
    document.body.appendChild(el);
  }catch(e){/* never let the warning itself break the app */}
}
function save(){
  app.version=46;
  try{
    localStorage.setItem(DATA_KEY,JSON.stringify(app));
  }catch(e){
    console.log("[v0] save() localStorage failed:", e && (e.message||e));
    cgShowStorageWarning();
  }
  mirrorLegacy();
}
function todayISO(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10)}
function dayName(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return d.toLocaleDateString('en-AU',{weekday:'long'})}
function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,'').replace(/[^\w\u4e00-\u9fff]/g,'')}
function timeToMin(t){
  if(!t)return null;let s=String(t).trim().toLowerCase().replace(/\s+/g,'').replace('：',':');
  s=s.replace(/上午|早上/g,'am').replace(/下午|晚上|夜晚/g,'pm').replace(/點半|点半/g,':30').replace(/點|点|時|时/g,':00');
  const m=s.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/); if(!m)return null;
  let h=+m[1],mm=+(m[2]||0),ap=m[3]||''; if(ap==='pm'&&h<12)h+=12;if(ap==='am'&&h===12)h=0;if(!ap&&h>=1&&h<=7)h+=12; return h*60+mm;
}
function minText(m){m=((m%1440)+1440)%1440;let h=Math.floor(m/60),mm=m%60,ap=h>=12?'PM':'AM';let hh=h%12;if(!hh)hh=12;return `${hh}:${String(mm).padStart(2,'0')} ${ap}`}
function timeInputValue(t){
  const m=timeToMin(t);
  if(m===null) return '';
  const h=Math.floor(m/60), mm=m%60;
  return `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
}
function timeInputDisplay(v){
  if(!v) return '';
  const m=String(v).match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return v;
  return minText((+m[1])*60+(+m[2]));
}
function readTimeField(id, fallback=''){
  const el=$(id);
  if(!el) return fallback;
  return timeInputDisplay(el.value) || fallback;
}
function sortByTime(a,b){const am=timeToMin(a.start||a.time),bm=timeToMin(b.start||b.time);if(am===null&&bm===null)return String(a.name||a.title).localeCompare(String(b.name||b.title));if(am===null)return 1;if(bm===null)return -1;return am-bm}
function nextFutureTime(preferred='6:30 PM'){
  const now=new Date(), cur=now.getHours()*60+now.getMinutes(); let pref=timeToMin(preferred)??1110;
  if(cur<pref-10)return minText(pref); let next=Math.ceil((cur+10)/30)*30; if(next>21*60)next=21*60; return minText(next);
}
function routineKey(r){return [r.day||'',norm(r.name),r.start||'',r.oneOffDate||''].join('|')}

function migrate(){
  let existing=readJSON(DATA_KEY,null);
  let data=existing || JSON.parse(JSON.stringify(DEFAULT_DATA));

  // Profile migration
  const p30=readJSON('cg_child_profile_v30',null);
  const old=readJSON('childgrowthai-v8',null);
  if(!existing){
    if(p30&&typeof p30==='object'){
      data.profile.childName=p30.childName||data.profile.childName;
      data.profile.year=p30.currentYear||data.profile.year;
      data.profile.age=p30.age||data.profile.age;
      data.profile.school=p30.school||data.profile.school;
      data.profile.region=p30.region||data.profile.region;
      data.profile.language=p30.mainLanguage||data.profile.language;
      data.profile.strengths=Array.isArray(p30.strengths)?p30.strengths:data.profile.strengths;
      data.profile.watchAreas=Array.isArray(p30.watchAreas)?p30.watchAreas:data.profile.watchAreas;
      data.profile.parentGoals=Array.isArray(p30.parentGoals)?p30.parentGoals:data.profile.parentGoals;
    } else if(old&&old.profile){
      data.profile.childName=old.profile.name||old.profile.childName||data.profile.childName;
      data.profile.year=old.profile.year||old.profile.currentYear||data.profile.year;
      data.profile.school=old.profile.school||data.profile.school;
    }
  }

  // Routine migration
  const routineSources=[
    readJSON('cg_v33_weekly_routines',[]),
    readJSON('cg_v24_custom_activities',[])
  ];
  const routineList=existing?.routines?.length?existing.routines:[];
  routineSources.flat().forEach(x=>{
    if(!x || typeof x!=='object')return;
    let r={
      id:x.id||('r_'+Date.now()+Math.random()),
      day:x.day||'Monday',
      name:x.name||x.title||'Activity',
      start:x.start||x.time||'',
      end:x.end||'',
      prep:x.prep||x.note||'',
      reminder:x.reminder||'前一晚 8:00 PM',
      impact:x.impact||'正常',
      oneOffDate:x.oneOffDate||'',
      source:x.source||'migrated'
    };
    if(!routineList.some(y=>routineKey(y)===routineKey(r)))routineList.push(r);
  });
  data.routines=routineList;

  // Tasks
  const taskSources=[readJSON('cg_v28_today_tasks',[]),readJSON('cg_today_tasks',[]),readJSON('cg_v45_today_tasks',[])];
  const tasks=existing?.todayTasks?.length?existing.todayTasks:[];
  taskSources.flat().forEach(x=>{
    if(!x||typeof x!=='object')return;
    const t={id:x.id||('task_'+Date.now()+Math.random()),date:x.date||todayISO(),title:x.title||x.name||x.task||'Today task',time:x.time||'',note:x.note||x.notes||''};
    if(!tasks.some(y=>y.id===t.id || (y.date===t.date&&y.title===t.title&&y.time===t.time)))tasks.push(t);
  });
  data.todayTasks=tasks;

  // Notices
  const ns=readJSON('cg_v44_school_notices',[]);
  const notices=existing?.schoolNotices?.length?existing.schoolNotices:[];
  ns.forEach(n=>{if(!notices.some(x=>x.id===n.id || (x.date===n.date&&x.title===n.title)))notices.push(n)});
  data.schoolNotices=notices;

  // Emotions
  const recs=readJSON('childgrowth_records',[]);
  const emotions=existing?.emotions?.length?existing.emotions:[];
  if(Array.isArray(recs)){
    recs.filter(x=>x.type==='emotion').forEach(x=>{
      emotions.push({id:x.id||('em_'+Date.now()+Math.random()),date:x.date||x.createdAt||new Date().toISOString(),mood:x.mood||x.value||'Normal',context:x.context||''});
    });
  }
  data.emotions=emotions.slice(-80);

  return data;
}
let app=migrate();
app.activityReports = Array.isArray(app.activityReports) ? app.activityReports : [];
app.captureHistory = Array.isArray(app.captureHistory) ? app.captureHistory : [];
v60RestoreJaniceRoutines(false);
save();

function mirrorLegacy(){

    localStorage.setItem('cg_v33_weekly_routines',JSON.stringify(app.routines));

}

v60BindActivityClicks();

renderCurrent();
setTimeout(()=>{v60ExportInlineHandlers();v60HardCleanActivityDom();},250);}catch(e){console.error(e);const home=document.getElementById('home');if(home)home.innerHTML='<div class="bootError">⚠️ 首頁載入失敗，已阻止空白畫面。請更新到 V51 或重新整理。<br><small>'+String(e.message||e)+'</small></div>';}
hideSplash();
  window.scrollTo({top:0,behavior:'auto'});
}

document.querySelectorAll('.navbtn').forEach(b=>b.onclick=()=>go(b.dataset.tab));

function routinesForDay(day, includeOneOff=true){
  const iso = DAYS.includes(day) ? null : day;
  const d = iso ? new Date(iso+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long'}) : day;
  return app.routines.filter(r=>r.day===d && (includeOneOff || !r.oneOffDate) && (!r.oneOffDate || !iso || r.oneOffDate===iso)).sort(sortByTime);
}
function todayTasks(){return app.todayTasks.filter(t=>!t.date||t.date===todayISO()).sort(sortByTime)}
function upcomingNotices(){const now=todayISO();return app.schoolNotices.filter(n=>!n.date||n.date>=now).sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999'))).slice(0,5)}
function rowHTML(title,small,actions=''){return `<div class="row"><div><b>${title}</b><small>${small||''}</small></div>${actions?`<div class="rowActions">${actions}</div>`:''}</div>`}
function freeWindows(day,items){
  const weekday=!['Saturday','Sunday'].includes(day); const start=weekday?15*60+30:9*60, end=20*60+30;
  const blocks=items.map(r=>{let s=timeToMin(r.start),e=timeToMin(r.end);if(s===null)return null;if(e===null||e<=s)e=s+60;return{s,e}}).filter(Boolean).sort((a,b)=>a.s-b.s);

function icsEscape(s){
  const raw=String(s||'').replace(/\\n/g,'\n');
  return raw.replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
}
function pad2(n){return String(n).padStart(2,'0')}
function dateForDay(day){
  const today=new Date();
  const idx=DAYS.indexOf(day);
  if(idx<0) return today;
  const target=(idx+1)%7; // JS Sunday=0; our Monday index=0
  let diff=(target-today.getDay()+7)%7;
  if(diff===0) diff=7;
  const d=new Date(today); d.setDate(today.getDate()+diff); return d;
}
function parseTimeParts(t, fallback='09:00'){
  const m=timeToMin(t);
  const mins=m===null?timeToMin(fallback):m;
  return {h:Math.floor(mins/60),m:mins%60};
}
function icsDateTime(date, timeText){
  const p=parseTimeParts(timeText);
  return `${date.getFullYear()}${pad2(date.getMonth()+1)}${pad2(date.getDate())}T${pad2(p.h)}${pad2(p.m)}00`;
}
function icsStamp(){
  return new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
}
function icsTitle(s, fallback='Activity'){
  const cleaned=String(s||fallback).replace(/^[^A-Za-z0-9\u4e00-\u9fff]+/,'').trim();
  return cleaned || fallback;
}
function icsUID(id, prefix='childgrowthai'){
  return `${String(id||Date.now()).replace(/[^\w-]/g,'_')}@${prefix}`;
}
function icsBuild(lines){
  return lines.filter(x=>x!==null && x!==undefined && x!=='').join('\r\n') + '\r\n';
}
function downloadICS(filename, content){
  const blob=new Blob([content],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');

  setTimeout(()=>{URL.revokeObjectURL(url); a.remove();},800);

function safeICSFilename(name){

function v60RoutineKey(r){
  return norm((r.day||'')+'_'+(r.name||'').replace(/[^\w\u4e00-\u9fff]+/g,'')+'_'+(r.start||''));
}
function v60RestoreJaniceRoutines(force=false){
  try{
    app.routines = Array.isArray(app.routines) ? app.routines : [];
    const child = String(app.profile?.childName || '').toLowerCase();
    const isJanice = child.includes('janice') || child.includes('珍妮') || child==='';
    if(!isJanice && !force) return false;

    // Correct accidental old school name if present.
    app.routines.forEach(r=>{
      if(/all\s*prime/i.test(r.name||'')) r.name='🏫 Oakleigh South Primary School';
    });

    const defaults = v60JaniceDefaultRoutines();
    const existing = new Set(app.routines.map(v60RoutineKey));
    let added = 0;

    const hasWeekdaySchool = ['Monday','Tuesday','Wednesday','Thursday','Friday'].every(day =>
      app.routines.some(r => r.day===day && /school|primary|oakleigh/i.test(r.name||''))
    );

    // If weekday school is missing, restore all core defaults. If force, restore missing defaults.
    if(force || !hasWeekdaySchool || app.routines.length===0){
      defaults.forEach((d,idx)=>{
        const item={...d,id:'v60_'+idx+'_'+Date.now(),source:'v60-restore'};
        const key=v60RoutineKey(item);
        if(!existing.has(key)){
          app.routines.push(item);
          existing.add(key);
          added++;
        }
      });
    }
    if(added>0){ save(); return true; }
    return false;
  }catch(e){
    console.warn('v60 routine restore failed', e);
    return false;
  }
}
function v60ManualRestoreRoutines(){
  const ok = confirm('要修復 Janice 預設固定行程嗎？會補回 Monday–Friday school、Thursday swimming、Friday chess、Saturday Chinese 等；不會刪除你現有資料。');

}

/* V58 clean Activity Progress + shared voice dictation */
let v58ActivityMode = 'photo';
let v58ActivityImage = '';

let v58Recognition = null;
let v58VoiceTimer = null;
let v58VoiceStatusId = null;

function v58Status(id, text, mode=''){
  const el=$(id);
  if(!el) return;
  el.className='activityStatusLine ' + (mode==='live'?'live':mode==='warn'?'warn':'');
  el.innerHTML=text;
}
function v58AppendText(textareaId, text){
  const area=$(textareaId);
  if(!area || !text) return;
  const current=area.value.trim();
  area.value=current ? current + '\n' + text.trim() : text.trim();
  area.dispatchEvent(new Event('input',{bubbles:true}));
}
function v53StartDictation(textareaId, statusId, langSelectId, label='語音輸入'){
  const SR=window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    v58Status(statusId,'⚠️ 呢個 browser 暫時唔支援語音，請直接打字。','warn');
    return;
  }
  v53StopDictation(false);
  v58VoiceStatusId=statusId;
  const lang=($(langSelectId)?.value)||'zh-HK';
  v58Recognition=new SR();
  v58Recognition.lang=lang;
  v58Recognition.interimResults=true;
  v58Recognition.continuous=false;
  v58Recognition.maxAlternatives=1;
  let finalText='';
  let interimText='';
  v58Status(statusId,`🎙️ 正在聽 ${label}，可以中英夾雜，最多約 25 秒。`,'live');

  v58VoiceTimer=setTimeout(()=>{
    const text=(finalText || interimText || '').trim();
    try{v58Recognition && v58Recognition.stop();}catch(e){}
    if(text){
      v58AppendText(textareaId,text);
      v58Status(statusId,'✅ 已加入語音文字，請檢查後再儲存 / Analyze。','live');
    }else{
      v58Status(statusId,'未聽到清楚內容，可以再試一次或直接打字。','warn');
    }
    v58Recognition=null;
  },25000);

  v58Recognition.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const part=e.results[i][0].transcript || '';
      if(e.results[i].isFinal) finalText += part;
      else interim += part;
    }
    interimText=interim;
    const display=(finalText || interim || '').trim();
    if(display) v58Status(statusId,'🎙️ 聽到：'+esc(display),'live');
  };
  v58Recognition.onerror=(e)=>{
    clearTimeout(v58VoiceTimer);
    v58Recognition=null;
    v58Status(statusId,'⚠️ 語音輸入未成功：'+esc(e.error||'unknown')+'。可以再試或直接打字。','warn');
  };
  v58Recognition.onend=()=>{
    clearTimeout(v58VoiceTimer);
    const text=(finalText || interimText || '').trim();
    if(text){
      v58AppendText(textareaId,text);
      v58Status(statusId,'✅ 已加入語音文字，請檢查後再儲存 / Analyze。','live');
    }else{
      v58Status(statusId,'語音已停止。如未加入文字，可以再試一次。','warn');
    }
    v58Recognition=null;
  };
  try{v58Recognition.start();}catch(e){
    v58Recognition=null;
    v58Status(statusId,'⚠️ 語音功能啟動失敗，請直接打字。','warn');
  }
}
function v53StopDictation(show=true){
  if(v58VoiceTimer) clearTimeout(v58VoiceTimer);
  v58VoiceTimer=null;
  try{ if(v58Recognition) v58Recognition.stop(); }catch(e){}
  v58Recognition=null;
  if(show && v58VoiceStatusId) v58Status(v58VoiceStatusId,'已停止語音。','warn');
}
function v53ClearTextarea(textareaId, statusId){
  const area=$(textareaId);
  if(area) area.value='';
  v58Status(statusId,'已清空。可以重新語音輸入或打字。');
}

function bindActivityUpload(){

  f.v58Bound=true;

    const file=e.target.files && e.target.files[0];
    if(!file) return;
    resetActivityFilePreview();
    if(file.type.startsWith('image/')){
      const reader=new FileReader();
      reader.onload=ev=>{
        v58ActivityImage=ev.target.result;
        const img=$('activityPreviewClean');
        if(img){img.src=v58ActivityImage;img.style.display='block';}
      };
      reader.readAsDataURL(file);
    }else if(file.type.startsWith('video/')){
      if($('activityStatus')) $('activityStatus').innerHTML='<div class="notice bluebox">正在抽取短片畫面作 beta 分析...</div>';
      try{
        v58ActivityVideoFrames=await extractVideoFrames(file,3);

function extractVideoFrames(file,count=3){
  return new Promise((resolve,reject)=>{
    const video=document.createElement('video');
    const url=URL.createObjectURL(file);
    video.src=url;
    video.muted=true;
    video.playsInline=true;
    video.preload='metadata';
    const frames=[];
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    video.onloadedmetadata=()=>{
      const dur=Math.min(video.duration || 1, 20);
      const times=[dur*0.2,dur*0.5,dur*0.8].map(x=>Math.max(0.1,Math.min(dur-0.1,x)));
      let i=0;
      const grab=()=>{ if(i>=Math.min(count,times.length)){URL.revokeObjectURL(url);resolve(frames);return;} video.currentTime=times[i++]; };
      video.onseeked=()=>{
        canvas.width=Math.min(video.videoWidth || 640, 900);
        canvas.height=Math.round(canvas.width*((video.videoHeight||360)/(video.videoWidth||640)));
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        frames.push(canvas.toDataURL('image/jpeg',0.78));
        grab();
      };
      grab();
    };
    video.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('video load failed'));};
  });
}

function parseNaturalDate(text){
  const now=new Date(); const t=String(text||''); const l=t.toLowerCase(); const fmt=d=>d.toISOString().slice(0,10);
  if(/today|今日|今天/.test(l))return fmt(now); if(/tomorrow|聽日|明天/.test(l)){let d=new Date(now);d.setDate(d.getDate()+1);return fmt(d)}
  const map=[['monday',1,'星期一'],['tuesday',2,'星期二'],['wednesday',3,'星期三'],['thursday',4,'星期四'],['friday',5,'星期五'],['saturday',6,'星期六'],['sunday',0,'星期日']];
  for(const [en,idx,cn] of map){if(l.includes(en)||t.includes(cn)){let d=new Date(now),diff=(idx-d.getDay()+7)%7;if(/next|下個|下星期|下周/.test(l+t)||diff===0)diff+=7;d.setDate(d.getDate()+diff);return fmt(d)}}
  let m=t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/); if(m){let y=m[3]?+m[3]:now.getFullYear(); if(y<100)y+=2000; return fmt(new Date(y,+m[2]-1,+m[1]));}
  return '';
}
function fallbackNotice(text){
  const l=text.toLowerCase(); let title='School notice';
  if(/ice\s*pops?|icy\s*pole|雪條|冰條/.test(l))title='Ice pops / icy pole event';
  else if(/dress|costume|book week|打扮/.test(l))title='Dress up / Book Week event';
  else if(/excursion|incursion|camp|旅行/.test(l))title='Excursion / school activity';
  else if(/photo|照片|相/.test(l))title='School photo day';
  const money=(text.match(/\$\s?\d+(?:\.\d{1,2})?|\d+\s?(?:dollars?|元|蚊)/i)||[])[0]||'';
  const bring=[]; if(money)bring.push(money); if(/dress|costume|打扮/.test(l))bring.push('dress-up / costume'); if(/water|水樽|snack|hat|帽/.test(l))bring.push('water bottle / snack / hat if needed');
  return {id:'notice_'+Date.now(),title,date:parseNaturalDate(text),time:(text.match(/(\d{1,2}(?::\d{2})?\s?(?:am|pm|AM|PM))/)||[])[1]||'',category:money?'payment':'school event',bringItems:bring.length?bring:['請按通知內容準備'],payment:money,deadline:'',reminders:['前一晚 8:00 PM','當日早上 7:30 AM'],confidence:parseNaturalDate(text)?'medium':'low',summary:text.slice(0,320),parentAction:bring.length?'準備：'+bring.join('、'):'請檢查通知日期和要帶物品'};
}

function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=ev=>resolve(ev.target.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}
function compressImageFile(file,maxDim=1200,quality=0.66){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=reject;
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        const scale=Math.min(1, maxDim/Math.max(w,h));
        w=Math.round(w*scale); h=Math.round(h*scale);
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#fff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        let data=canvas.toDataURL('image/jpeg',quality);
        // V81 adaptive compression: keep each image roughly under 650KB where possible.
        if(data.length>650*1024){
          const scale2=Math.sqrt((650*1024)/data.length);
          const c2=document.createElement('canvas');
          c2.width=Math.max(800,Math.round(w*scale2));
          c2.height=Math.max(800,Math.round(h*scale2));
          const x2=c2.getContext('2d');
          x2.fillStyle='#fff'; x2.fillRect(0,0,c2.width,c2.height);
          x2.drawImage(img,0,0,c2.width,c2.height);
          data=c2.toDataURL('image/jpeg',0.58);
        }
        resolve(data);
      };
      img.onerror=reject;
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function sectionBetween(raw, startMarkers, endMarkers){
  const text=String(raw||'');

  for(const m of startMarkers){

    if(i>=0 && (start<0 || i<start)){start=i; marker=m;}
  }
  if(start<0) return '';
  let from=start+marker.length;
  let end=text.length;
  for(const m of endMarkers){

  return text.slice(from,end).replace(/^[:：\s-]+/,'').trim();

      const t2=(s0+maj)>>>0;
      hh=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0;
    }
    h[0]=(h[0]+a)>>>0;h[1]=(h[1]+b)>>>0;h[2]=(h[2]+c)>>>0;h[3]=(h[3]+d)>>>0;
    h[4]=(h[4]+e)>>>0;h[5]=(h[5]+f)>>>0;h[6]=(h[6]+g)>>>0;h[7]=(h[7]+hh)>>>0;

function rcBCanonicalSerialize(values){return JSON.stringify(values)}
function rcBNormalizeAuthorityString(value){

}
function rcBNormalizeSourceRowPayload(value){return rcBNormalizeAuthorityString(String(value??'').replace(/^[\s\-â€¢*]+/,''))||''}
function rcBCanonicalFingerprintInput(row){
  row=row||{};

    rcBNormalizeSourceRowPayload(row.sourceRowPayload),row.authoritySchemaVersion,row.page,row.questionId,
    row.question,row.studentAnswer,row.referenceAnswer,row.status,row.skill,row.subSkill,row.confidence,row.provenance?.sourceRowHash||null];
}
function rcBSourceEvidenceFingerprint(rows){return rcBSha256Hex(rcBCanonicalSerialize((rows||[]).map(rcBNormalizeSourceRowPayload)))}
function rcBCanonicalEvidenceFingerprint(rows){return rcBSha256Hex(rcBCanonicalSerialize((rows||[]).map(rcBCanonicalFingerprintInput)))}
function rcBPushAuthorityError(errors,code){if(!errors.includes(code)) errors.push(code)}
function rcBSameAuthorityValue(a,b){return JSON.stringify(a??null)===JSON.stringify(b??null)}

function validateServerEvidenceAuthorityV2(report,options={}){
  const extracted=Array.isArray(report?.extractedEvidence)?report.extractedEvidence:[];
  const canonical=Array.isArray(report?.canonicalEvidence)?report.canonicalEvidence:[];
  const authority=report?.evidenceAuthority;
  const engine=report?.engineV2;
  const errors=[], warnings=[];
  const legacySignal=!authority&&!canonical.length&&!!(engine||report?.summary||report?.rawAnalysis||report?.parentInterpretation||report?.strengths||report?.checkPoints);
  let authorityState=legacySignal?'legacy':(!authority?'missing':'invalid');
  if(!authority){
    rcBPushAuthorityError(errors,legacySignal?'LEGACY_AUTHORITY_UNSUPPORTED':'AUTHORITY_METADATA_MISSING');
  }else{
    if(authority.authority!=='structured_evidence'||authority.generatedFrom!=='report.extractedEvidence') rcBPushAuthorityError(errors,'AUTHORITY_SOURCE_MISMATCH');
    if(authority.schemaVersion!==2||authority.canonicalizerVersion!=='rc-b-v1') rcBPushAuthorityError(errors,'AUTHORITY_SCHEMA_UNSUPPORTED');
    if(!Array.isArray(authority.validationErrors)) rcBPushAuthorityError(errors,'AUTHORITY_VALIDATION_ERRORS_INVALID');
    else if(authority.validationErrors.length) authority.validationErrors.forEach(x=>rcBPushAuthorityError(errors,x?.code||'AUTHORITY_VALIDATION_FAILED'));
  }
  if(!canonical.length) rcBPushAuthorityError(errors,'CANONICAL_EVIDENCE_EMPTY');
  if(authority){
    if(authority.sourceEvidenceCount!==extracted.length) rcBPushAuthorityError(errors,'AUTHORITY_SOURCE_COUNT_MISMATCH');
    if(authority.canonicalEvidenceCount!==canonical.length) rcBPushAuthorityError(errors,'CANONICAL_COUNT_MISMATCH');
    if(!/^[a-f0-9]{64}$/.test(authority.sourceEvidenceFingerprint||'')||!/^([a-f0-9]{64})$/.test(authority.canonicalEvidenceFingerprint||'')) rcBPushAuthorityError(errors,'AUTHORITY_FINGERPRINT_INVALID');
    if(authority.sourceEvidenceFingerprint!==rcBSourceEvidenceFingerprint(extracted)||authority.canonicalEvidenceFingerprint!==rcBCanonicalEvidenceFingerprint(canonical)) rcBPushAuthorityError(errors,'AUTHORITY_FINGERPRINT_MISMATCH');
  }
  if(!engine||engine.version!=='v3'||engine.authority!=='structured_evidence'||engine.schemaVersion!==2||engine.generatedFrom!=='report.canonicalEvidence'||engine.rootSource!=='report.extractedEvidence'||engine.presentationRuleVersion!=='rc-b-v1'){
    rcBPushAuthorityError(errors,'ENGINE_AUTHORITY_INVALID');
  }
  if(!Array.isArray(engine?.evidence)) rcBPushAuthorityError(errors,'ENGINE_EVIDENCE_INVALID');
  else if(engine.evidence.length!==canonical.length) rcBPushAuthorityError(errors,'ENGINE_COUNT_MISMATCH');
  if(authority&&engine){
    ['sourceEvidenceCount','canonicalEvidenceCount','sourceEvidenceFingerprint','canonicalEvidenceFingerprint','reportLineageId','imageOrder','submittedImageCount'].forEach(key=>{
      if(!rcBSameAuthorityValue(engine[key],authority[key])) rcBPushAuthorityError(errors,key==='reportLineageId'?'LINEAGE_MISMATCH':'ENGINE_AUTHORITY_BINDING_MISMATCH');
    });
  }
  const lineage=report?.reportLineageId;
  if(!/^[A-Za-z0-9_-]{16,128}$/.test(lineage||'')||authority?.reportLineageId!==lineage||engine?.reportLineageId!==lineage) rcBPushAuthorityError(errors,'LINEAGE_MISMATCH');
  const submitted=Number(authority?.submittedImageCount);
  if(!Number.isInteger(submitted)||submitted<1||submitted>6) rcBPushAuthorityError(errors,'AUTHORITY_IMAGE_METADATA_INVALID');
  const mergedAuthority=authority?.imageOrder===null&&submitted>1;
  if(!mergedAuthority&&(!Number.isInteger(authority?.imageOrder)||authority.imageOrder<0||authority.imageOrder>=submitted)) rcBPushAuthorityError(errors,'AUTHORITY_IMAGE_METADATA_INVALID');

  const canonicalIds=new Set(), engineIds=new Set(), perImageNext=new Map();
  canonical.forEach((row,index)=>{
    const rowId=row?.sourceRowId;
    if(!/^[a-f0-9]{64}$/.test(rowId||'')) rcBPushAuthorityError(errors,'CANONICAL_SOURCE_ROW_BINDING_MISSING');
    else if(canonicalIds.has(rowId)) rcBPushAuthorityError(errors,'CANONICAL_SOURCE_ROW_BINDING_DUPLICATE');
    else canonicalIds.add(rowId);
    if(!/^[a-f0-9]{64}$/.test(row?.contentFingerprint||'')) rcBPushAuthorityError(errors,'CONTENT_FINGERPRINT_INVALID');
    if(row?.reportLineageId!==lineage||row?.provenance?.reportLineageId!==lineage) rcBPushAuthorityError(errors,'LINEAGE_MISMATCH');
    if(!Number.isInteger(row?.imageOrder)||row.imageOrder<0||row.imageOrder>=submitted||row?.provenance?.imageOrder!==row.imageOrder) rcBPushAuthorityError(errors,'ROW_IMAGE_ORDER_INVALID');
    const expectedIndex=perImageNext.get(row?.imageOrder)||0;
    if(!Number.isInteger(row?.sourceRowIndex)||row.sourceRowIndex!==expectedIndex||row?.provenance?.sourceRowIndex!==row.sourceRowIndex) rcBPushAuthorityError(errors,'SOURCE_ROW_INDEX_INVALID');
    perImageNext.set(row?.imageOrder,expectedIndex+1);
    if(index&&canonical[index-1]?.imageOrder>row?.imageOrder) rcBPushAuthorityError(errors,'CANONICAL_ORDER_INVALID');
    const normalizedPayload=rcBNormalizeSourceRowPayload(row?.sourceRowPayload);
    const expectedRowId=rcBSha256Hex(rcBCanonicalSerialize([lineage,row?.imageOrder,row?.sourceRowIndex,normalizedPayload]));
    const expectedContent=rcBSha256Hex(rcBCanonicalSerialize([row?.question,row?.studentAnswer||null,row?.referenceAnswer||null,row?.status,row?.skill||null]));
    if(rowId!==expectedRowId) rcBPushAuthorityError(errors,'SOURCE_ROW_ID_MISMATCH');
    if(row?.contentFingerprint!==expectedContent) rcBPushAuthorityError(errors,'CONTENT_FINGERPRINT_MISMATCH');
    if(row?.authoritySchemaVersion!==2||row?.provenance?.authority!=='structured_evidence'||row?.provenance?.sourcePath!=='report.extractedEvidence') rcBPushAuthorityError(errors,'ROW_PROVENANCE_INVALID');
    if(row?.provenance?.sourceRowHash!==rcBSha256Hex(normalizedPayload)) rcBPushAuthorityError(errors,'SOURCE_ROW_HASH_MISMATCH');
    const projected=engine?.evidence?.[index];
    if(!projected?.sourceRowId||!canonicalIds.has(projected.sourceRowId)) rcBPushAuthorityError(errors,'ENGINE_SOURCE_ROW_BINDING_MISSING');
    else if(engineIds.has(projected.sourceRowId)) rcBPushAuthorityError(errors,'ENGINE_SOURCE_ROW_BINDING_DUPLICATE');
    else engineIds.add(projected.sourceRowId);
    if(projected?.sourceRowId!==rowId) rcBPushAuthorityError(errors,'ENGINE_ROW_ORDER_MISMATCH');
    const projectedFields=['contentFingerprint','page','questionId','question','studentAnswer','referenceAnswer','status','skill','subSkill','confidence'];
    if(projectedFields.some(key=>!rcBSameAuthorityValue(projected?.[key],row?.[key]))||!rcBSameAuthorityValue(projected?.correctAnswer,row?.referenceAnswer)||projected?.source!=='structured_evidence'||!rcBSameAuthorityValue(projected?.provenance,row?.provenance)) rcBPushAuthorityError(errors,'ENGINE_ROW_PROJECTION_MISMATCH');
  });
  if(engineIds.size!==canonicalIds.size) rcBPushAuthorityError(errors,'ENGINE_SOURCE_ROW_BINDING_MISSING');

  if(report?.contentCoverage!=='unverified') rcBPushAuthorityError(errors,'CONTENT_COVERAGE_INVALID');
  if(!Array.isArray(report?.limitations)||!report.limitations.includes('QUESTION_COVERAGE_UNVERIFIED')) rcBPushAuthorityError(errors,'CONTENT_COVERAGE_INVALID');
  if(!options.skipProcessing){
    const p=report?.processing, coverage=rcBProcessingCoverage(p);
    const perImage=Array.isArray(p?.perImage)?p.perImage:[];
    const processingValid=p&&coverage===p.processingCoverage&&['complete','partial'].includes(coverage)&&
      Number.isInteger(p.attemptedRequestCount)&&p.attemptedRequestCount>=p.successfulResponseCount&&
      Number.isInteger(p.successfulResponseCount)&&p.successfulResponseCount>=p.acceptedResponseCount&&
      p.attemptedRequestCount===p.submittedImageCount&&
      perImage.filter(x=>x.status!=='failed').length===p.successfulResponseCount&&
      perImage.filter(x=>x.status==='accepted').length===p.acceptedResponseCount&&
      perImage.filter(x=>x.includedInMerge===true).length===p.includedResponseCount&&
      perImage.filter(x=>x.status!=='accepted').length===p.failedResponseCount&&
      new Set(perImage.map(x=>x.imageOrder)).size===perImage.length&&perImage.every(x=>Number.isInteger(x.imageOrder)&&x.imageOrder>=0&&x.imageOrder<p.submittedImageCount&&Number.isInteger(x.canonicalRowCount)&&x.canonicalRowCount>=0);
    if(!processingValid) rcBPushAuthorityError(errors,'PROCESSING_METADATA_INVALID');
    else{
      const includedOrders=new Set(perImage.filter(x=>x.status==='accepted'&&x.includedInMerge===true).map(x=>x.imageOrder));
      const rowCountFor=order=>canonical.filter(row=>row.imageOrder===order).length;
      if(canonical.some(row=>!includedOrders.has(row.imageOrder))||[...includedOrders].some(order=>!canonical.some(row=>row.imageOrder===order))||perImage.some(x=>x.canonicalRowCount!==(x.includedInMerge?rowCountFor(x.imageOrder):0))) rcBPushAuthorityError(errors,'PROCESSING_CANONICAL_MISMATCH');
    }
  }
  if(errors.length&&authorityState!=='legacy'&&authorityState!=='missing') authorityState=errors.some(x=>/LINEAGE|COUNT|BINDING|ORDER|PROCESSING_CANONICAL/.test(x))?'inconsistent':'invalid';
  if(!errors.length) authorityState='trusted';
  return {
    trusted:errors.length===0,
    authorityState,
    blockingErrors:errors,
    warnings,
    validatedCounts:{sourceEvidenceCount:extracted.length,canonicalEvidenceCount:canonical.length,engineEvidenceCount:Array.isArray(engine?.evidence)?engine.evidence.length:0}
  };
}

function rcBAcceptedServerAuthority(report,requestContext){
  const validation=validateServerEvidenceAuthorityV2(report,{skipProcessing:true});
  if(!validation.trusted) return {accepted:false,errorCode:validation.blockingErrors[0]||'AUTHORITY_VALIDATION_FAILED',validation};
  const a=report.evidenceAuthority;
  if(report.reportLineageId!==requestContext.reportLineageId||a.reportLineageId!==requestContext.reportLineageId) return {accepted:false,errorCode:'REPORT_LINEAGE_MISMATCH',validation};
  if(a.imageOrder!==requestContext.imageOrder||a.submittedImageCount!==requestContext.submittedImageCount) return {accepted:false,errorCode:'AUTHORITY_PROVENANCE_MISMATCH',validation};
  return {accepted:true,errorCode:null,validation};
}
function rcBProcessingCoverage(processing){
  const submitted=Number(processing?.submittedImageCount), accepted=Number(processing?.acceptedResponseCount), included=Number(processing?.includedResponseCount), failed=Number(processing?.failedResponseCount);
  const perImage=Array.isArray(processing?.perImage)?processing.perImage:[];
  const valid=Number.isInteger(submitted)&&submitted>0&&Number.isInteger(accepted)&&accepted>=0&&Number.isInteger(included)&&included>=0&&Number.isInteger(failed)&&failed>=0&&accepted+failed===submitted&&included<=accepted&&perImage.length===submitted;
  if(!valid) return 'unknown';
  if(accepted===submitted&&included===accepted&&failed===0&&perImage.every(x=>x.status==='accepted'&&x.includedInMerge===true)) return 'complete';
  if(accepted>0&&included>0&&(failed>0||included<accepted||perImage.some(x=>x.status!=='accepted'||x.includedInMerge!==true))) return 'partial';
  if(accepted===0&&included===0) return 'failed';
  return 'unknown';
}
function v81MergeHomeworkReports(reports, imageCount, authorityRun={}){
  const cleanReports=(reports||[]).filter(Boolean);
  const joined=(field)=>cleanReports.map(r=>r[field]).filter(Boolean).join('\n\n');
  const serverAuthorities=cleanReports.map(r=>r.rcBServerAuthority).filter(Boolean).sort((a,b)=>a.imageOrder-b.imageOrder);
  const extractedEvidence=serverAuthorities.flatMap(r=>
    Array.isArray(r.extractedEvidence)
      ? r.extractedEvidence.filter(x=>typeof x==='string'&&x.length)
      : []
  );
  const authorityErrors=[];
  if(serverAuthorities.length!==cleanReports.length) rcBPushAuthorityError(authorityErrors,'MERGE_AUTHORITY_INPUT_MISSING');
  serverAuthorities.forEach(snapshot=>{
    const check=validateServerEvidenceAuthorityV2(snapshot,{skipProcessing:true});
    check.blockingErrors.forEach(code=>rcBPushAuthorityError(authorityErrors,code));
    if(snapshot.reportLineageId!==authorityRun.reportLineageId) rcBPushAuthorityError(authorityErrors,'LINEAGE_MISMATCH');
  });
  const imageOrders=serverAuthorities.map(x=>x.imageOrder);
  if(new Set(imageOrders).size!==imageOrders.length||imageOrders.some((x,i)=>!Number.isInteger(x)||(i&&x<=imageOrders[i-1]))) rcBPushAuthorityError(authorityErrors,'MERGE_IMAGE_ORDER_INVALID');
  const canonicalEvidence=serverAuthorities.flatMap(x=>Array.isArray(x.canonicalEvidence)?x.canonicalEvidence:[]);
  const authoritativeEngineRows=serverAuthorities.flatMap(x=>Array.isArray(x.engineV2?.evidence)?x.engineV2.evidence:[]);
  const rowIds=canonicalEvidence.map(x=>x.sourceRowId);
  if(new Set(rowIds).size!==rowIds.length) rcBPushAuthorityError(authorityErrors,'CANONICAL_SOURCE_ROW_BINDING_DUPLICATE');
  const processing=authorityRun.processing||null;
  const includedOrders=new Set((processing?.perImage||[]).filter(x=>x.status==='accepted'&&x.includedInMerge===true).map(x=>x.imageOrder));
  if(serverAuthorities.some(x=>!includedOrders.has(x.imageOrder))||[...includedOrders].some(order=>!serverAuthorities.some(x=>x.imageOrder===order))) rcBPushAuthorityError(authorityErrors,'PROCESSING_CANONICAL_MISMATCH');
  const sourceEvidenceFingerprint=rcBSourceEvidenceFingerprint(extractedEvidence);
  const canonicalEvidenceFingerprint=rcBCanonicalEvidenceFingerprint(canonicalEvidence);
  const evidenceAuthority={
    authority:'structured_evidence',schemaVersion:2,canonicalizerVersion:'rc-b-v1',generatedFrom:'report.extractedEvidence',
    sourceEvidenceCount:extractedEvidence.length,canonicalEvidenceCount:canonicalEvidence.length,
    sourceEvidenceFingerprint,canonicalEvidenceFingerprint,reportLineageId:authorityRun.reportLineageId||null,
    imageOrder:null,submittedImageCount:Number(processing?.submittedImageCount)||imageCount,
    validationErrors:authorityErrors.map(code=>({code,message:code}))
  };
  const engineV2=authorityErrors.length?null:{
    version:'v3',authority:'structured_evidence',schemaVersion:2,generatedFrom:'report.canonicalEvidence',rootSource:'report.extractedEvidence',
    sourceEvidenceCount:extractedEvidence.length,canonicalEvidenceCount:canonicalEvidence.length,
    sourceEvidenceFingerprint,canonicalEvidenceFingerprint,reportLineageId:authorityRun.reportLineageId||null,
    imageOrder:null,submittedImageCount:evidenceAuthority.submittedImageCount,presentationRuleVersion:'rc-b-v1',
    evidence:authoritativeEngineRows
  };
  const strengths=v81UniqueLines(cleanReports.flatMap(r=>Array.isArray(r.strengths)?r.strengths:[]))
    .filter(x=>!/暫未見明確錯題|未見明確錯|無需覆核/.test(x)).slice(0,8);
  let checkPoints=v81UniqueLines(cleanReports.flatMap(r=>Array.isArray(r.checkPoints)?r.checkPoints:[]))
    .filter(x=>!/^\s*暫未見明確錯題/.test(x)).slice(0,8);
  if(!checkPoints.length) checkPoints=['暫未見明確錯題。'];
  const reasons=v81UniqueLines(cleanReports.flatMap(r=>Array.isArray(r.reasons)?r.reasons:[])).slice(0,6);
  const merged={
    title:'AI 功課分析',
    shortSummary: cleanReports.map(r=>r.shortSummary).filter(Boolean)[0] || '已分批完成分析。',
    summary: joined('summary') || '已分批讀取功課圖片。',
    levelAwareness: joined('levelAwareness') || '按圖片可見年級和目前年級作觀察。',
    strengths: strengths.length?strengths:['暫未有足夠資料'],
    checkPoints,
    reasons,
    parentInterpretation: joined('parentInterpretation') || cleanReports.map(r=>r.shortSummary).filter(Boolean).join(' '),
    nextStep: cleanReports.map(r=>r.nextStep).find(Boolean) || '今晚只揀一題最有代表性的題目慢慢講解。',
    confidence: cleanReports.some(r=>String(r.confidence||'').toLowerCase()==='low')?'medium':'medium',
    rawAnalysis: joined('rawAnalysis'),
    extractedEvidence,
    canonicalEvidence,
    evidenceAuthority,
    engineV2,
    reportLineageId: authorityRun.reportLineageId||null,
    processing,
    contentCoverage:'unverified',
    limitations:['QUESTION_COVERAGE_UNVERIFIED'],
    publishable:false,
    serverAuthorities,
    imageCount
  };
  const mergedValidation=validateServerEvidenceAuthorityV2(merged);
  merged.authorityValidation=mergedValidation;
  merged.authorityState=mergedValidation.authorityState;
  merged.publishable=mergedValidation.trusted&&processing?.processingCoverage==='complete';
  if(!mergedValidation.trusted&&merged.engineV2){
    merged.rejectedEngineV2=merged.engineV2;
    merged.engineV2=null;
  }
  return merged;
}

function v83IsTimeoutError(msg){
  return /timeout|逾時|aborted|504|Function did not return JSON|AI 分析逾時/i.test(String(msg||''));
}
function v83ImageKb(data){
  return Math.round(String(data||'').length/1024);
}
function v83DebugFromData(data){
  const d=data?.debug||{};
  const parts=[];
  if(data?.model) parts.push(`model: ${data.model}`);
  if(data?.route) parts.push(`route: ${data.route}`);
  if(data?.imageCount) parts.push(`${data.imageCount} 張`);
  if(d.timeoutMs) parts.push(`timeout ${d.timeoutMs}ms`);
  if(d.approxKB) parts.push(`${d.approxKB}KB`);
  if(data?.retries) parts.push(`retry ${data.retries}`);
  return parts;
}
function v83ShrinkDataUrl(dataUrl,maxDim=850,quality=0.48){
  return new Promise(resolve=>{
    try{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        const scale=Math.min(1,maxDim/Math.max(w,h));
        w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        let out=canvas.toDataURL('image/jpeg',quality);
        if(out.length>420*1024){
          const c2=document.createElement('canvas');
          const s2=Math.sqrt((420*1024)/out.length);
          c2.width=Math.max(650,Math.round(w*s2));
          c2.height=Math.max(650,Math.round(h*s2));
          const x2=c2.getContext('2d');
          x2.fillStyle='#fff'; x2.fillRect(0,0,c2.width,c2.height);
          x2.drawImage(img,0,0,c2.width,c2.height);
          out=c2.toDataURL('image/jpeg',0.42);
        }
        resolve(out);
      };
      img.onerror=()=>resolve(dataUrl);
      img.src=dataUrl;
    }catch(e){resolve(dataUrl);}
  });
}
async function sendHomeworkToAIWithRetry(imagesToSend, label='', requestContext={}){
  const originalKb=Math.round(JSON.stringify(imagesToSend||[]).length/1024);
  try{
    return await sendHomeworkToAI(imagesToSend,{aiMode:'fast',reliabilityMode:'v83-first',originalKb,...requestContext});
  }catch(e){
    const msg=e.message||String(e);
    if(!v83IsTimeoutError(msg) || !(imagesToSend||[]).length) throw e;
    if($('hwStatus')) $('hwStatus').innerHTML=`<div class="notice bluebox">AI 第一次逾時，正在自動 retry：改用超壓縮圖片 + fast model。${label?esc(label):''}</div>`;
    const smaller=[];
    for(const img of imagesToSend){ smaller.push(await v83ShrinkDataUrl(img,850,0.46)); }
    const retryKb=Math.round(JSON.stringify(smaller).length/1024);
    const data=await sendHomeworkToAI(smaller,{aiMode:'fast',reliabilityMode:'v83-retry-ultra-compressed',originalKb,retryKb,retry:true,...requestContext});
    data.retries=(data.retries||0)+1;
    data.debug={...(data.debug||{}),originalKb,retryKb,frontendRetry:true};
    return data;
  }
}

async function sendHomeworkToAIChunked(imagesToSend, authorityRun){
  // V83: one image per AI call is slower but much more reliable on serverless.
  const maxPerCall=1;
  const total=Math.ceil((imagesToSend||[]).length/maxPerCall);
  const all=[];
  const analyses=[];
  const errors=[];
  const perImage=[];
  let successfulResponseCount=0;
  let model='', route='chunked-v83', debugParts=[];
  for(let i=0;i<imagesToSend.length;i+=maxPerCall){
    const chunk=imagesToSend.slice(i,i+maxPerCall);
    const batchNo=Math.floor(i/maxPerCall)+1;
    const kb=Math.round(JSON.stringify(chunk).length/1024);
    if($('hwStatus')) $('hwStatus').innerHTML=`<div class="notice bluebox">正在逐張分析功課... 第 ${batchNo} / ${total} 張，約 ${kb}KB。</div>`;
    try{
      const requestContext={reportLineageId:authorityRun.reportLineageId,imageOrder:i,submittedImageCount:authorityRun.submittedImageCount};
      const data=await sendHomeworkToAIWithRetry(chunk,`第 ${batchNo} 張`,requestContext);
      successfulResponseCount++;
      const authorityCheck=rcBAcceptedServerAuthority(data?.report,requestContext);
      if(!authorityCheck.accepted){
        perImage.push({imageOrder:i,status:'rejected',includedInMerge:false,canonicalRowCount:0,blockingErrorCode:authorityCheck.errorCode});
        errors.push(`第 ${batchNo} 張：${authorityCheck.errorCode}`);
        continue;
      }
      const serverAuthority=JSON.parse(JSON.stringify({
        reportLineageId:data.report.reportLineageId,
        imageOrder:i,
        extractedEvidence:data.report.extractedEvidence,
        canonicalEvidence:data.report.canonicalEvidence,
        evidenceAuthority:data.report.evidenceAuthority,
        engineV2:data.report.engineV2,
        processing:data.report.processing,
        contentCoverage:data.report.contentCoverage,
        limitations:data.report.limitations,
        publishable:data.report.publishable
      }));
      const report=normalizeHomeworkReport(data,$('hwText')?.value?.trim()||'',chunk.length);
      report.rcBServerAuthority=serverAuthority;
      all.push(report);
      perImage.push({imageOrder:i,status:'accepted',includedInMerge:true,canonicalRowCount:serverAuthority.canonicalEvidence.length,blockingErrorCode:null});
      analyses.push(data.analysis||report.rawAnalysis||'');
      model=data.model||model;
      route=data.route||route;
      debugParts.push(...v83DebugFromData(data));
    }catch(e){
      perImage.push({imageOrder:i,status:'failed',includedInMerge:false,canonicalRowCount:0,blockingErrorCode:'REQUEST_FAILED'});
      errors.push(`第 ${batchNo} 張：${e.message||String(e)}`);
    }
  }
  const processing={
    processingCoverage:'unknown',

/* V96.7: deterministic fingerprint of an uploaded photo set. Same image bytes →
   same fingerprint, even when uploaded again later. Uses a stable 53-bit string
   hash (two 32-bit FNV-1a passes) over the raw image data plus the child name,
   so the same photos for the same child reuse the same normalized report. */
function v967HashString(str){
  let h1=0x811c9dc5, h2=0x01000193;
  for(let i=0;i<str.length;i++){
    const c=str.charCodeAt(i);
    h1^=c; h1=Math.imul(h1,0x01000193);
    h2^=c; h2=Math.imul(h2,0x85ebca6b);
  }
  h1>>>=0; h2>>>=0;
  return (h1.toString(16).padStart(8,'0'))+(h2.toString(16).padStart(8,'0'));

function v967Fingerprint(images, childName){
  const imgs=(images||[]).map(x=>String(x||''));

async function runHomeworkAnalysis(imagesToSend, modeLabel){

  // V96.7: if this exact photo set was already fully analysed, reuse that report so
  // identical uploads can never produce a different parent report.

  const bypassCache=!!($('hwBypassCache')&&$('hwBypassCache').checked);

  const cachedAnchor=v967CacheGet(fp);
  const cached=bypassCache?null:cachedAnchor;

    const report=v9611ApplyHomeworkCanonical(JSON.parse(JSON.stringify(cached.report)));

    app.homeworkReports.push({...baseRecord,report,offline:false,reusedFromCache:true});

    const reportFp=v9611ReportFp(report);

    $('hwStatus').innerHTML=`<div class="notice good">分析完成，已保存到最近功課分析。請看下面完整 report。${cacheParentNote}${v85AdminMode()?`<div class="debugPills"><span class="debugPill">cache hit</span><span class="debugPill">photo: ${fp.slice(0,8)}…</span><span class="debugPill">report: ${reportFp.slice(0,8)}…</span><span class="debugPill">S${counts.stable}|W${counts.definiteWrong}|R${counts.needsReview}|M${counts.missing}</span></div>`:''}</div>`;

  $('hwStatus').innerHTML=`<div class="notice bluebox">正在分析功課… ${modeLabel}，約 ${kb}KB。AI 需要一點時間，請保持此頁開啟；離開 App 可能會中斷分析。${imagesToSend.length>1?' 系統會逐張處理，減少失敗。':''}</div>`;
  // Track whether the page was hidden (user left the app) while analysis was running.
  let wentHidden=false;
  const onVis=()=>{ if(document.hidden) wentHidden=true; };
  document.addEventListener('visibilitychange',onVis);
  try{
    const data=await sendHomeworkToAIChunked(imagesToSend,{reportLineageId,submittedImageCount:imagesToSend.length});
    const partial=!!(data.partial || (data.debug&&Array.isArray(data.debug.errors)&&data.debug.errors.length));
    let report=normalizeHomeworkReport(data,text,imagesToSend.length);
    report.runtime={success:!partial,partial,incomplete:partial,model:data.model||'',route:data.route||'',debug:data.debug||{},imageCount:imagesToSend.length,completedAt:new Date().toISOString()};
    report.v967Fingerprint=fp;
    if(!partial) report=v9611ApplyHomeworkCanonical(report);
    let anchoredFresh=false;
    if(!partial && bypassCache && cachedAnchor && cachedAnchor.report){
      const freshRuntime=report.runtime||{};
      report=v9611ApplyHomeworkCanonical(JSON.parse(JSON.stringify(cachedAnchor.report)));
      report.v967Fingerprint=fp;
      report.v967CacheVersion=V967_CACHE_VERSION;
      report.v967CanonicalReportFp=v9611ReportFp(report);
      report.runtime={...(report.runtime||{}),...freshRuntime,parentAnchoredToFirstComplete:true,cacheVersion:V967_CACHE_VERSION};
      anchoredFresh=true;
    }
    // V96.7: only cache COMPLETE analyses, so partial/failed runs never poison reuse.
    if(!partial && !anchoredFresh) v967CachePut(fp, report);
    if(!partial){
      report.v967CacheVersion=V967_CACHE_VERSION;
      report.v967CanonicalReportFp=v9611ReportFp(report);
      if(report.runtime) report.runtime.cacheVersion=V967_CACHE_VERSION;

      : `圖片已保存，但今次 AI 未能完整完成所有分析。請看下面提示，或先用「只分析第一張」再試。`;
    // V96.8/V96.11: show counts, cache status, and drift detection for QA

    const reportFp=v9611ReportFp(report);
    const cacheStatusPill=anchoredFresh?'fresh + stable parent anchor':(bypassCache?'fresh (bypass)':'fresh analysis');
    // V96.11: robust drift detection - compare all components
    const cachedReport=v967CacheGet(fp);
    const cachedReportFp=cachedReport&&cachedReport.report?v9611ReportFp(cachedReport.report):null;
    const driftPill=(cachedReportFp && cachedReportFp!==reportFp)?'DRIFT':'stable';
    $('hwStatus').innerHTML= partial ? `<div class="notice">${partialMsg}${v85AdminMode()&&dbg.length?`<div class="debugPills">${dbg.map(x=>`<span class="debugPill">${esc(x)}</span>`).join('')}</div>`:''}</div>` : `<div class="notice good">分析完成，已保存到最近功課分析。請看下面完整 report。${v85AdminMode()?` Model: ${esc(data.model||'?')}<div class="debugPills"><span class="debugPill">${cacheStatusPill}</span><span class="debugPill">photo: ${fp.slice(0,8)}…</span><span class="debugPill">report: ${reportFp.slice(0,8)}…</span><span class="debugPill">${driftPill}</span><span class="debugPill">S${counts.stable}|W${counts.definiteWrong}|R${counts.needsReview}|M${counts.missing}</span>${dbg.map(x=>`<span class="debugPill">${esc(x)}</span>`).join('')}</div>`:''}</div>`;
  }catch(e){
    const backgrounded=wentHidden || document.hidden;
    const report=homeworkFallbackReport(text,imagesToSend.length,e.message||String(e));
    report.runtime={success:false,error:e.message||String(e),imageCount:imagesToSend.length,backgrounded,completedAt:new Date().toISOString()};

  }finally{
    document.removeEventListener('visibilitychange',onVis);

}

  const hasMath=/\d+\s*[+\-xX*×÷\/]\s*\d+/.test(q);
  const hasChoice=/\b[A-D]\b/.test(ans+corr) || /What |Who |Why |How |Which |tone|purpose|recipient|instruction|\?|？/i.test(q);
  const specific=!!(e.skill&&e.subSkill&&!v80IsGenericTag(e.skill)&&!v80IsGenericTag(e.subSkill));
  return hasMath || hasChoice || specific;
}
function v82EvidenceSignature(e){

  const ans=v9610NormalizeAnswer(e.studentAnswer||'');

  const a=parseInt(m[1],10), b=parseInt(m[3],10), op=m[2];

  return {a,b,op,twoDigit,carry:/[+]/.test(op) && (a%10)+(b%10)>=10,borrow:/-/.test(op) && (a%10)<(b%10)};

    if(v96QType(e)==='temperature'){ if(!inserted){ out.push(grouped); inserted=true; } }
    else out.push(e);

}
/* V96.6: page number for an evidence item (from an explicit field or the
   question text), used for a stable dedupe key and ordering. 0 when unknown. */
function v96PageOf(e){
  if(e && (e.page||e.page===0)){ const n=parseInt(e.page,10); if(!isNaN(n)) return n; }
  const m=String(e&&e.question||'').match(/\bpage\s*(\d+)\b|第\s*(\d+)\s*[頁页張张]/i);
  if(m){ const n=parseInt(m[1]||m[2],10); if(!isNaN(n)) return n; }
  return 0;
}
/* V96.6: stable, normalized dedupe key = cleaned question + page + expected answer.
   Same question at the same worksheet location with the same expected answer is
   one item; the same expression on different pages stays distinct. */
function v96StableKey(e){
  const q=v96CleanParentQuestion(String(e&&e.question||'')).toLowerCase().replace(/\s+/g,'');
  const page=v96PageOf(e);
  const expN=v96ArithExpected(e); const ref=v96RefNumber(e);
  const exp=(expN!==null)?('n'+expN):(ref!==null?('r'+ref):String(e&&e.correctAnswer||'').toLowerCase().replace(/\s+/g,''));
  return q+'|p'+page+'|'+exp;
}
/* V96.6: deterministic ordering — wrong first, then review, then missing; within
   each group by page, then question text, then a stable original index. This makes
   the visible list (and therefore every count) independent of AI response order. */
function v96StatusRank(d){ return d==='wrong'?0:(d==='review'?1:(d==='missing'?2:3)); }
function v96SortItems(rows){
  return rows.map((e,i)=>({e,i}))
    .sort((a,b)=>{
      const ra=v96StatusRank(v96DisplayStatus(a.e)), rb=v96StatusRank(v96DisplayStatus(b.e));
      if(ra!==rb) return ra-rb;
      const pa=v96PageOf(a.e), pb=v96PageOf(b.e);
      if(pa!==pb) return pa-pb;
      const qa=v96CleanParentQuestion(String(a.e.question||'')), qb=v96CleanParentQuestion(String(b.e.question||''));
      if(qa<qb) return -1; if(qa>qb) return 1;
      return a.i-b.i;
    })

}
/* V96.3/V96.6: the rows parents actually see — verified-correct items removed,
   stably deduped (question+page+expected), deterministically ordered, and
   temperature rows grouped. SINGLE source used by every count and the card list. */
function v96VisibleRows(report){
  const candidates=v93ReviewEvidence(report).filter(e=>v96DisplayStatus(e)!=='ok');
  // stable dedupe: keep the first occurrence per normalized key
  const seen=new Set(); const deduped=[];
  candidates.forEach(e=>{ const k=v9611ReviewDedupeKey(e); if(seen.has(k)) return; seen.add(k); deduped.push(e); });
  const ordered=v96SortItems(deduped);
  return v96GroupTemperature(ordered);
}
/* V96.6: count of items the child clearly got right (做得穩), derived from the
   SAME evidence the review list uses — AI-correct items plus any review
   candidates we locally verified as correct — deduped with the stable key. */
function v96StableCount(report){
  const seen=new Set(); let stable=0;
  (v82CleanEvidence(report?.engineV2?.evidence||[])||[]).forEach(e=>{
    if(String(e&&e.status||'').toLowerCase()!=='correct') return;
    const k=v96StableKey(e); if(seen.has(k)) return; seen.add(k); stable++;
  });
  v93ReviewEvidence(report).forEach(e=>{
    if(v96DisplayStatus(e)!=='ok') return;
    const k=v96StableKey(e); if(seen.has(k)) return; seen.add(k); stable++;
  });
  return stable;
}
/* V96.2: translate skill tags to natural Chinese and drop debug/unclear ones. */
function v96CleanSkillTags(e){
  return v84Unique([e.skill,e.subSkill].filter(Boolean).map(v96ZhSkill).filter(Boolean))
    .filter(t=>!/^(unclear|none|n\/?a|na|null|undefined|status|skill|sub[-\s]?skill|page|q\d+)/i.test(t)
      && !/handwriting|photo unclear|careless|rushing|看不清|不清楚|未能辨認/i.test(t));
}
/* V96.3: the status parents actually see. Returns 'ok' for items we can locally
   verify as correct (excluded from the list), 'wrong' only when we are certain,
   otherwise 'review' (需要覆核). Interpretation-heavy question types are never
   marked a definite mistake. */
function v96DisplayStatus(e){
  if(e.status==='missing') return 'missing';
  if(v96IsNoAnswer(e)) return 'missing'; // V96.5: 未寫 / no answer → 未完成 / 漏做
  const type=v96QType(e);
  const stu=v96StudentNumber(e);
  const ref=v96RefNumber(e);
  const exp=v96ArithExpected(e); // locally computed answer, when the question is arithmetic
  // V96.4 universal guard: if the child's FINAL numeric answer matches either the
  // reference answer or our locally computed answer, it is correct — NEVER 明確錯.
  if(stu!==null){
    if(exp!==null && Math.abs(stu-exp)<1e-9) return 'ok';
    if(ref!==null && Math.abs(stu-ref)<1e-9) return 'ok';
  }
  // Pure arithmetic: trust local computation over the AI.
  if(type==='arith'){
    // definite error only when we have a trusted target AND the child's final
    // number clearly differs from it.
    const target = (exp!==null)?exp:ref;
    if(stu!==null && target!==null && Math.abs(stu-target)>=1e-9) return 'wrong';
    return 'review';
  }
  // Questions that need human interpretation are never auto-marked 明確錯.
  if(type==='circle'||type==='money'||type==='time'||type==='temperature'||type==='unit'||type==='word') return 'review';
  // Generic: definite error only when AI is highly confident, we have both the
  // child's answer and a reference answer, AND (when both are numeric) the final
  // numbers genuinely differ.
  const conf=String(e.confidence||'').toLowerCase();
  const hasStudent=String(e.studentAnswer||'').trim()!=='';
  const hasCorrect=String(e.correctAnswer||'').trim()!=='';
  if(e.status==='wrong' && conf==='high' && hasStudent && hasCorrect){
    if(stu!==null && ref!==null && Math.abs(stu-ref)<1e-9) return 'review'; // numbers actually match → not a definite error
    return 'wrong';
  }
  return 'review';
}
function v96StatusLabelFromDisplay(d){
  if(d==='wrong') return '明確錯';

function v96StatusClassFromDisplay(d){

/* V96.3: parent-facing suggestion line per question type. */
function v96Suggestion(e, d){

  if(type==='money'||type==='word'||type==='unit') return '題目資料未完整顯示，建議家長先確認題目和孩子答案，再陪孩子重做一次。';

  return '請家長陪孩子重讀題目，確認圖片是否清晰，再做一題類似題。';

/* V96.3/V96.11: single source of truth for review counts — uses the V96.11

function v96ReviewCounts(report){
  const n=v9611NormalizedReport(report);
  if(!n) return {rows:[],definiteWrong:0,needsReview:0,missing:0,total:0,stable:0};
  return {

/* V61 Smart Prep Suggestions */
function v61SmartPrepItems(activityName=''){
  const s=String(activityName||'').toLowerCase();
  const rules=[
    {keys:['basketball','籃球'],items:['水樽','運動鞋 / basketball shoes','毛巾','snack','替換衣服']},
    {keys:['soccer','football','足球'],items:['水樽','足球鞋 / 運動鞋','shin pads','毛巾','snack','外套']},
    {keys:['swim','swimming','游水','泳'],items:['泳衣','毛巾','goggles','水樽','拖鞋','膠袋放濕衫']},
    {keys:['tennis','網球'],items:['網球拍','水樽','運動鞋','帽','防曬','毛巾','snack']},
    {keys:['piano','琴','鋼琴'],items:['琴書','功課簿','鉛筆','記錄本','水樽']},
    {keys:['chess','棋'],items:['chess book','鉛筆','水樽','snack']},
    {keys:['chinese','中文','普通話','粵語'],items:['中文書','功課','鉛筆袋','水樽']},
    {keys:['coding','minecraft','編程'],items:['iPad / laptop 如需要','login 資料','耳機','水樽','snack']},
    {keys:['art','畫','drawing','painting'],items:['畫簿','鉛筆袋','圍裙 / 舊衫','作品袋','水樽']},
    {keys:['dance','ballet','跳舞','芭蕾'],items:['舞衣','舞鞋','水樽','毛巾','替換衣服']},
    {keys:['gym','gymnastics','體操'],items:['運動服','水樽','毛巾','snack','頭髮綁好']},
    {keys:['school','primary','學校','返學'],items:['書包','lunch box','水樽','帽','reader bag']},
  ];
  for(const r of rules){
    if(r.keys.some(k=>s.includes(k))) return r.items;
  }
  if(/ball|sport|training|class|lesson|club|運動|訓練|球/.test(s)){
    return ['水樽','運動鞋','毛巾','snack','替換衣服'];
  }
  return ['水樽','snack','相關功課 / 教材','外套'];
}
function v61SmartImpact(activityName=''){
  const s=String(activityName||'').toLowerCase();
  if(/swim|soccer|football|basketball|tennis|dance|gym|運動|游水|足球|籃球|網球|體操/.test(s)) return '輕量功課日';
  return '正常';
}
function v61ApplyPrepSuggestion(force=false){
  const nameEl=$('rName');
  const prepEl=$('rPrep');
  const impactEl=$('rImpact');
  const reminderEl=$('rReminder');
  if(!nameEl || !prepEl) return;
  const name=nameEl.value.trim();
  if(!name) return;
  const suggestion=v61SmartPrepItems(name).join('、');
  const shouldFill = force || !prepEl.value.trim() || prepEl.dataset.autoPrep==='1';
  if(shouldFill){
    prepEl.value=suggestion;
    prepEl.dataset.autoPrep='1';
  }
  if(impactEl && (!impactEl.value || force)) impactEl.value=v61SmartImpact(name);
  if(reminderEl && (!reminderEl.value.trim() || force)) reminderEl.value='前一晚 8:00 PM';
  v61ShowPrepSuggestion(name, suggestion);
}
function v61ShowPrepSuggestion(name, suggestion){
  const anchor=$('rPrep');
  if(!anchor) return;
  let box=$('v61PrepSuggestBox');
  if(!box){
    box=document.createElement('div');
    box.id='v61PrepSuggestBox';
    box.className='prepSuggestBox';
    anchor.parentNode.insertBefore(box, anchor.nextSibling);
  }
  const chips=suggestion.split('、').filter(Boolean).map(x=>`<button type="button" class="prepChip" onclick="v61AddPrepChip('${String(x).replace(/'/g,"\\'")}')">${esc(x)}</button>`).join('');
  box.innerHTML=`AI 建議準備物品：${esc(suggestion)}<small>根據活動名稱「${esc(name)}」自動建議；可以自己改。</small><div class="prepChipRow">${chips}</div>`;
}
function v61AddPrepChip(item){
  const prepEl=$('rPrep');
  if(!prepEl) return;
  const arr=prepEl.value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean);
  if(!arr.includes(item)) arr.push(item);
  prepEl.value=arr.join('、');
  prepEl.dataset.autoPrep='0';
}
function v61BindSmartPrep(){
  const nameEl=$('rName');
  const prepEl=$('rPrep');
  if(!nameEl || nameEl.v61Bound) return;
  nameEl.v61Bound=true;
  nameEl.addEventListener('input',()=>v61ApplyPrepSuggestion(false));
  nameEl.addEventListener('change',()=>v61ApplyPrepSuggestion(false));
  if(prepEl){prepEl.addEventListener('input',()=>{prepEl.dataset.autoPrep='0';});}
  setTimeout(()=>v61ApplyPrepSuggestion(false),60);
}

    <label>強項（用逗號分隔）</label><input id="pStrengths" value="${esc((p.strengths||[]).join('、'))}">
    <label>需要留意（用逗號分隔）</label><input id="pWatch" value="${esc((p.watchAreas||[]).join('、'))}">
    <label>家長目標（用逗號分隔）</label><input id="pGoals" value="${esc((p.parentGoals||[]).join('、'))}">
    <div class="actions"><button class="btn primary" onclick="saveSetup()">保存</button></div>`;
}
window.openSetup=openSetup;
window.closeSetup=()=>{$('setupModal').classList.remove('show')}
window.saveSetup=()=>{
  Object.assign(app.profile,{childName:$('pName').value.trim()||app.profile.childName,year:$('pYear').value.trim()||app.profile.year,age:$('pAge').value.trim(),region:$('pRegion').value.trim(),school:$('pSchool').value.trim(),strengths:$('pStrengths').value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean),watchAreas:$('pWatch').value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean),parentGoals:$('pGoals').value.split(/[、,，]/).map(x=>x.trim()).filter(Boolean)});
  save();updateHeader();window.closeSetup();renderProfile();renderHome();
}


function hideSplash(){setTimeout(()=>{const s=document.getElementById('splashScreen'); if(s) s.classList.add('hide');},1200);}
window.addEventListener('error', function(e){
  const home=document.getElementById('home');
  if(home && !home.innerHTML.trim()){
    home.innerHTML='<div class="bootError">⚠️ App 載入時遇到錯誤。請先重新整理；如果仍然空白，請重新 upload V51 package。<br><small>'+String(e.message||'unknown error')+'</small></div>';
  }
  const s=document.getElementById('splashScreen'); if(s) s.classList.add('hide');
});

function renderCurrent(){
  if(v90ForceBetaOnboardingIfNeeded()) return renderBetaOnboarding();updateHeader(); if(typeof v86NeedsOnboarding==='function' && v86NeedsOnboarding()){renderBetaOnboarding(); return;} ({home:renderHome,record:renderRecord,homework:renderHomework,analytics:renderAnalytics,profile:renderProfile}[currentTab]||renderHome)()}
window.renderCurrent=renderCurrent;
function v78BootReady(){
  try{
    v60ExportInlineHandlers();
    v60BindActivityClicks();
    window.openCapture=openCapture;
    window.closeCapture=closeCapture;
    window.setCaptureMode=setCaptureMode;
  }catch(e){console.warn('V78 boot ready failed',e);}
}
document.addEventListener('click',function(e){
  const btn=e.target.closest('[data-capture-open]');
  if(btn){
    e.preventDefault();
    try{
      v78BootReady();
      if(typeof window.openCapture==='function') window.openCapture();
    }catch(err){alert('快速記錄暫時未載入，請再按一次。');}
  }
},true);
v78BootReady();
renderCurrent();
setTimeout(v78BootReady,100);
setTimeout(v78BootReady,800);

})();
</script>

<script>
(function(){
  function hideV52Splash(){
    var s=document.getElementById('splashScreen');
    if(s) s.classList.add('hide');
  }
  function ensureNotBlank(){
    var home=document.getElementById('home');
    var active=document.querySelector('.page.active');
    var target=active || home;
    if(target && !String(target.innerHTML||'').trim()){
      target.innerHTML='<div class="bootError">⚠️ App 已停止喺 loading 畫面，V52 已自動放行。如首頁仍然空白，請重新整理或重新 upload V52 package。</div>';
    }
  }
  window.addEventListener('load', function(){
    setTimeout(hideV52Splash, 1200);
    setTimeout(function(){ hideV52Splash(); ensureNotBlank(); }, 2200);
  });
  // iOS PWA sometimes does not fire load predictably after cache restore.
  setTimeout(hideV52Splash, 1600);
  setTimeout(function(){ hideV52Splash(); ensureNotBlank(); }, 2600);
})();


function v87FixBetaChoiceLayout(){
  document.querySelectorAll('.betaChoice').forEach(label=>{
    const input=label.querySelector('input[type="checkbox"],input[type="radio"]');
    if(input && !label.querySelector('.betaChoiceTextFixed')){
      const span=document.createElement('span');
      span.className='betaChoiceTextFixed';
      [...label.childNodes].forEach(n=>{ if(n!==input) span.appendChild(n); });
      label.appendChild(span);
    }
  });
}
document.addEventListener('DOMContentLoaded',v87FixBetaChoiceLayout);
setTimeout(v87FixBetaChoiceLayout,300);
setTimeout(v87FixBetaChoiceLayout,1000);

</script>
